services:
  - type: web
    name: bmmu-system
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bmmu-db
          property: connectionString
      - key: NODE_VERSION
        value: 20.11.0
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

databases:
  - name: bmmu-db
    plan: free
    databaseName: bmmu_db
    user: bmmu_user