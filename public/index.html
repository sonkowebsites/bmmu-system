<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BMMU — Member Management System</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* COPY ALL YOUR EXISTING CSS HERE - SAME AS BEFORE */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0F1117;--surface:#1A1D26;--surface2:#22263A;--border:#2E3352;
  --text:#E8ECF4;--text-sub:#8892B0;--text-muted:#4A5480;
  --accent:#5B6BF5;--accent-h:#7580F7;--success:#10B981;--warning:#F59E0B;
  --danger:#EF4444;--info:#3B82F6;--card:#1A1D26;--sidebar:#13151F;
  --header:#0F1117;--badge:#22263A;--ug-gold:#FCDC5F;--ug-red:#CC0001;
  --radius:8px;--radius-lg:12px;--radius-xl:16px;
}
body.light{
  --bg:#F0F2F8;--surface:#FFFFFF;--surface2:#F7F8FC;--border:#DDE3F0;
  --text:#1A1D2E;--text-sub:#4A5580;--text-muted:#8892B0;
  --accent:#4B5CF0;--accent-h:#3D4EE0;--success:#059669;--warning:#D97706;
  --danger:#DC2626;--info:#2563EB;--card:#FFFFFF;--sidebar:#FFFFFF;
  --header:#FFFFFF;--badge:#EEF0FA;--ug-gold:#D4A017;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;transition:background .25s,color .25s;min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
a{color:inherit;text-decoration:none}
input,select,textarea,button{font-family:inherit;font-size:14px}
input,select,textarea{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius);padding:9px 12px;color:var(--text);outline:none;width:100%;transition:border-color .15s,background .2s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);background:var(--surface)}
input::placeholder,textarea::placeholder{color:var(--text-muted)}
select option{background:var(--surface);color:var(--text)}
button{cursor:pointer;border:none;border-radius:var(--radius);font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff;padding:9px 18px}
.btn-primary:hover{background:var(--accent-h);transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0)}
.btn-secondary{background:transparent;color:var(--text);border:1.5px solid var(--border);padding:8px 16px}
.btn-secondary:hover{background:var(--surface2)}
.btn-danger{background:var(--danger);color:#fff;padding:9px 18px}
.btn-danger:hover{opacity:.88}
.btn-success{background:var(--success);color:#fff;padding:9px 18px}
.btn-ghost{background:transparent;color:var(--text-sub);padding:6px 10px;border-radius:6px}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-icon{background:transparent;color:var(--text-sub);padding:6px;border-radius:6px;font-size:16px}
.btn-icon:hover{background:var(--surface2);color:var(--text)}
.btn-sm{padding:6px 12px;font-size:13px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px}
.card-sm{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text-muted);padding:10px 14px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .15s}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);width:100%;max-width:660px;max-height:92vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.4);animation:slideUp .2s}
.modal-lg{max-width:880px}
.modal-sm{max-width:420px}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:5}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;background:var(--surface);position:sticky;bottom:0}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:11px;font-weight:700;letter-spacing:.05em;color:var(--text-sub);margin-bottom:6px;text-transform:uppercase}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.sidebar{width:250px;background:var(--sidebar);border-right:1px solid var(--border);height:100vh;position:fixed;top:0;left:0;display:flex;flex-direction:column;z-index:100;transition:transform .25s,background .25s,border-color .25s}
.sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid var(--border)}
.sidebar-nav{flex:1;overflow-y:auto;padding:10px 8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius);cursor:pointer;color:var(--text-sub);font-weight:500;transition:all .15s;margin-bottom:2px}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:rgba(91,107,245,.15);color:var(--accent)}
.nav-item .nav-icon{font-size:17px;width:22px;text-align:center;flex-shrink:0}
.nav-section{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);padding:14px 12px 6px}
.main-content{margin-left:250px;min-height:100vh;display:flex;flex-direction:column;transition:margin .25s}
.topbar{background:var(--header);border-bottom:1px solid var(--border);padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;transition:background .25s,border-color .25s}
.page{padding:28px;flex:1}
.page-header{margin-bottom:24px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px;transition:background .25s}
.avatar{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden;vertical-align:middle}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.search-wrap{position:relative}
.search-wrap input{padding-left:38px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:15px;pointer-events:none}
.tab-bar{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:22px}
.tab{padding:9px 16px;cursor:pointer;font-weight:500;color:var(--text-sub);transition:all .15s;border-bottom:2.5px solid transparent;font-size:13px}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);background:rgba(91,107,245,.06);border-radius:6px 6px 0 0}
.tab:hover:not(.active){color:var(--text);background:var(--surface2);border-radius:6px 6px 0 0}
.empty-state{text-align:center;padding:50px 20px;color:var(--text-muted)}
.alert{padding:11px 16px;border-radius:var(--radius);display:flex;align-items:center;gap:10px;font-size:13px}
.alert-success{background:rgba(16,185,129,.1);color:var(--success);border:1px solid rgba(16,185,129,.2)}
.alert-danger{background:rgba(239,68,68,.1);color:var(--danger);border:1px solid rgba(239,68,68,.2)}
.alert-info{background:rgba(59,130,246,.1);color:var(--info);border:1px solid rgba(59,130,246,.2)}
.alert-warning{background:rgba(245,158,11,.1);color:var(--warning);border:1px solid rgba(245,158,11,.2)}
.photo-drop{border:2px dashed var(--border);border-radius:var(--radius-lg);padding:28px;text-align:center;cursor:pointer;transition:all .15s}
.photo-drop:hover{border-color:var(--accent);background:rgba(91,107,245,.04)}
.divider{border:none;border-top:1px solid var(--border);margin:18px 0}
.id-card{background:linear-gradient(135deg,#161929 0%,#252b4a 100%);border:2px solid var(--ug-gold);border-radius:16px;padding:20px;color:#fff;position:relative;overflow:hidden;width:340px}
.id-card::before{content:'';position:absolute;top:-50px;right:-50px;width:180px;height:180px;border-radius:50%;background:rgba(252,220,95,.05)}
.id-card::after{content:'';position:absolute;bottom:-40px;left:-40px;width:140px;height:140px;border-radius:50%;background:rgba(204,0,1,.05)}
.ug-stripe{height:5px;background:linear-gradient(90deg,#000 33.33%,#FCDC5F 33.33%,#FCDC5F 66.66%,#CC0001 66.66%);border-radius:3px;margin-bottom:14px}
.spinner{width:20px;height:20px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite;display:inline-block}
.toggle-wrap{display:flex;align-items:center;gap:10px;cursor:pointer}
.toggle{width:40px;height:22px;border-radius:11px;background:var(--border);position:relative;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left .2s}
.toggle.on::after{left:21px}
.perm-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.perm-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius);border:1px solid var(--border);cursor:pointer;transition:all .15s;font-size:13px}
.perm-item:hover{border-color:var(--accent);background:rgba(91,107,245,.05)}
.perm-item.active{border-color:var(--accent);background:rgba(91,107,245,.1);color:var(--accent)}
.perm-check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .15s;flex-shrink:0}
.perm-item.active .perm-check{background:var(--accent);border-color:var(--accent);color:#fff}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:110px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{width:100%;border-radius:4px 4px 0 0;background:var(--accent);transition:height .5s cubic-bezier(.4,0,.2,1);min-height:3px}
.bar-label{font-size:10px;color:var(--text-muted);white-space:nowrap}
.bar-val{font-size:10px;color:var(--text-sub);font-weight:600}
.progress{height:7px;background:var(--surface2);border-radius:4px;overflow:hidden}
.progress-bar{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.role-badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:12px;background:var(--surface2);border:1px solid var(--border);color:var(--text-sub)}
.toast{position:fixed;bottom:24px;right:24px;z-index:9999;max-width:340px;animation:slideUp .2s}
.info-row{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start}
.info-row .ir-icon{font-size:14px;margin-top:1px;flex-shrink:0;width:18px;text-align:center}
.info-row .ir-body .ir-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;font-weight:700}
.info-row .ir-body .ir-val{font-size:13px;font-weight:500;margin-top:1px}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.mobile-menu-btn{display:none;background:transparent;border:1.5px solid var(--border);padding:6px 8px;border-radius:var(--radius);color:var(--text-sub);font-size:18px}
@media(max-width:800px){
  .sidebar{transform:translateX(-100%);z-index:200}
  .sidebar.open{transform:translateX(0)}
  .main-content{margin-left:0}
  .mobile-menu-btn{display:flex}
  .stat-grid{grid-template-columns:1fr 1fr}
  .form-row,.form-row-3{grid-template-columns:1fr}
  .page{padding:16px}
  .topbar{padding:0 16px}
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@media print{
  .sidebar,.topbar,.no-print{display:none!important}
  .main-content{margin-left:0!important}
  body{background:#fff;color:#000}
  .id-card{border:2px solid #000;background:#fff!important;color:#000!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>
</head>
<body>

<div id="app"></div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────
const API_BASE = window.location.origin;

const APP = {
  version: '2.0.0',
  org: 'BMMU',
  orgFull: 'Buganda Muslim Mass Union',
};

const ROLES = {
  superadmin: { label:'Super Admin', color:'#7C3AED', level:4 },
  admin:      { label:'Admin',       color:'#2563EB', level:3 },
  staff:      { label:'Staff',       color:'#059669', level:2 },
  guest:      { label:'Guest',       color:'#D97706', level:1 },
};

const ALL_PERMISSIONS = ['members_rw','members_r','staff_r','staff_rw','delete','reports'];
const PERM_LABELS = { members_rw:'Add & Edit Members', members_r:'View Members', staff_r:'View Staff', staff_rw:'Manage Staff', delete:'Delete Records', reports:'View Reports' };

const AREAS = ['Kampala Central','Kawempe','Makindye','Lubaga','Nakawa','Wakiso','Mukono','Jinja','Entebbe','Gulu','Mbarara','Fort Portal','Masaka','Mbale','Soroti','Arua'];
const RELATIONS = ['Spouse','Child','Parent','Sibling','Guardian','Other'];
const EDUCATION_LEVELS = ['Primary','Secondary (O-Level)','Secondary (A-Level)','Certificate','Diploma',"Bachelor's Degree","Master's Degree",'Doctorate','No Formal Education'];
const AVATAR_COLORS = ['#5B6BF5','#7C3AED','#059669','#0891B2','#D97706','#DC2626','#8B5CF6','#2563EB'];

// ─── APP STATE ────────────────────────────────────────────────
const State = {
  data: { members: [], staff: [] },
  theme: localStorage.getItem('bmmu_theme') || 'dark',
  user: null,
  page: 'login',
  section: 'dashboard',
  loading: false,
  toastTimer: null,

  set(key, val) { this[key] = val; },
  setTheme(t) {
    this.theme = t;
    localStorage.setItem('bmmu_theme', t);
    document.body.classList.toggle('light', t === 'light');
  },
};

// ─── API HELPERS ─────────────────────────────────────────────────
async function apiCall(method, endpoint, body = null) {
  try {
    const options = {
      method,
      headers: { 'Content-Type': 'application/json' },
    };
    if (body) options.body = JSON.stringify(body);
    
    const response = await fetch(`${API_BASE}${endpoint}`, options);
    if (!response.ok) {
      const error = await response.json();
      throw new Error(error.error || 'API request failed');
    }
    return await response.json();
  } catch (err) {
    console.error('API Error:', err);
    showToast(err.message, 'danger');
    throw err;
  }
}

async function loadMembers() {
  try {
    const members = await apiCall('GET', '/api/members');
    State.data.members = members;
    return members;
  } catch (err) {
    State.data.members = [];
    return [];
  }
}

async function loadStaff() {
  try {
    const staff = await apiCall('GET', '/api/staff');
    State.data.staff = staff;
    return staff;
  } catch (err) {
    State.data.staff = [];
    return [];
  }
}

async function saveMember(member, isEdit = false) {
  if (isEdit) {
    return await apiCall('PUT', `/api/members/${member.id}`, member);
  } else {
    return await apiCall('POST', '/api/members', member);
  }
}

async function deleteMember(id) {
  return await apiCall('DELETE', `/api/members/${id}`);
}

async function saveStaff(staff, isEdit = false) {
  if (isEdit) {
    return await apiCall('PUT', `/api/staff/${staff.id}`, staff);
  } else {
    return await apiCall('POST', '/api/staff', staff);
  }
}

async function deleteStaff(id) {
  return await apiCall('DELETE', `/api/staff/${id}`);
}

async function login(username, password) {
  return await apiCall('POST', '/api/login', { username, password });
}

async function loadStats() {
  try {
    return await apiCall('GET', '/api/stats');
  } catch (err) {
    return { total: 0, males: 0, females: 0, thisMonth: 0, byArea: [], byGender: [] };
  }
}

// ─── HELPERS ─────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const el = (tag, attrs={}, ...children) => {
  const e = document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)) {
    if (k === 'class') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else e.setAttribute(k, v);
  }
  children.forEach(c => { if(c==null) return; if(typeof c==='string') e.appendChild(document.createTextNode(c)); else if(c instanceof Node) e.appendChild(c); });
  return e;
};

const calcAge = dob => {
  if (!dob) return '—';
  const d = new Date(dob), now = new Date();
  let age = now.getFullYear() - d.getFullYear();
  const m = now.getMonth() - d.getMonth();
  if (m < 0 || (m===0 && now.getDate() < d.getDate())) age--;
  return age;
};

const fmtDate = d => {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-UG',{day:'2-digit',month:'short',year:'numeric'});
};

const initials = name => {
  if (!name) return '?';
  return name.split(' ').map(p=>p[0]).join('').toUpperCase().slice(0,2);
};

const avatarColor = name => AVATAR_COLORS[(name||'').charCodeAt(0) % AVATAR_COLORS.length];

const hasPerm = (user, perm) => {
  if (!user) return false;
  if (user.role === 'superadmin') return true;
  if (perm === 'members_r') {
    return (user.permissions||[]).includes('members_r') || (user.permissions||[]).includes('members_rw')
      || ROLES[user.role]?.level >= 2;
  }
  if (user.role === 'admin' && ['members_rw','reports','staff_r'].includes(perm)) return true;
  if (user.role === 'staff' && ['members_rw','reports'].includes(perm)) return true;
  return (user.permissions||[]).includes(perm);
};

function showToast(msg, type='success') {
  if (State.toastTimer) clearTimeout(State.toastTimer);
  const icons = { success:'✓', danger:'✕', info:'ℹ', warning:'⚠' };
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const t = el('div', { class:`toast alert alert-${type}` }, `${icons[type]||'ℹ'} ${msg}`);
  document.body.appendChild(t);
  State.toastTimer = setTimeout(() => t.remove(), 3500);
}

function avatarEl(name, photo, size=36, fontSize=13) {
  const a = el('div', {
    class:'avatar',
    style:`width:${size}px;height:${size}px;background:${avatarColor(name)};font-size:${fontSize}px;flex-shrink:0`
  });
  if (photo) {
    const img = el('img', { src:photo, alt:'' });
    a.appendChild(img);
  } else {
    a.textContent = initials(name);
  }
  return a;
}

// ─── RENDER ENGINE ────────────────────────────────────────────
function render() {
  document.body.classList.toggle('light', State.theme === 'light');
  const root = $('app');
  root.innerHTML = '';
  if (State.page === 'login') {
    root.appendChild(renderLogin());
  } else {
    root.appendChild(renderApp());
  }
}

// ─── LOGIN PAGE ───────────────────────────────────────────────
function renderLogin() {
  let loading = false;
  // loginMode: 'choose' | 'password' | 'otp-input' | 'otp-verify'
  let loginMode = 'choose';
  let otpMethod = ''; // 'email' or 'phone'
  let otpStaffId = null;
  let otpMasked = '';

  const wrap = el('div', { style:'min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative' });

  const themeBtn = el('button', {
    class:'btn-icon',
    style:'position:absolute;top:16px;right:16px;border:1.5px solid var(--border);background:var(--surface2);padding:8px;border-radius:var(--radius);font-size:18px',
    onclick: () => { State.setTheme(State.theme==='dark'?'light':'dark'); render(); }
  }, State.theme==='dark'?'☀️':'🌙');
  wrap.appendChild(themeBtn);

  const box = el('div', { style:'width:100%;max-width:430px' });

  const logoWrap = el('div', { style:'text-align:center;margin-bottom:32px' });
  logoWrap.innerHTML = `
    <div style="width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,#5B6BF5,#8B5CF6);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;box-shadow:0 8px 32px rgba(91,107,245,.4)">
      <span style="color:#fff;font-size:30px;font-weight:800">B</span>
    </div>
    <div style="font-size:24px;font-weight:800;color:var(--text)">${APP.org}</div>
    <div style="font-size:13px;color:var(--text-sub);margin-top:3px">${APP.orgFull}</div>
    <div style="display:flex;align-items:center;justify-content:center;gap:5px;margin-top:10px">
      <span style="width:20px;height:5px;background:#000;border-radius:2px;display:inline-block"></span>
      <span style="width:20px;height:5px;background:#FCDC5F;border-radius:2px;display:inline-block"></span>
      <span style="width:20px;height:5px;background:#CC0001;border-radius:2px;display:inline-block"></span>
      <span style="font-size:11px;color:var(--text-muted);margin-left:6px">Republic of Uganda</span>
    </div>
  `;
  box.appendChild(logoWrap);

  const card = el('div', { class:'card', style:'padding:28px' });
  box.appendChild(card);
  box.innerHTML += `<div id="login-footer" style="text-align:center;margin-top:20px;font-size:12px;color:var(--text-muted)">© ${new Date().getFullYear()} ${APP.orgFull} · Government of Uganda · v${APP.version}</div>`;
  wrap.appendChild(box);

  function renderCard() {
    card.innerHTML = '';

    // ── CHOOSE MODE ──
    if (loginMode === 'choose') {
      card.innerHTML = `
        <div style="font-size:17px;font-weight:700;margin-bottom:3px">Sign In</div>
        <div style="font-size:13px;color:var(--text-sub);margin-bottom:24px">Choose how you want to sign in</div>
        <div id="login-err" class="alert alert-danger" style="display:none;margin-bottom:16px"></div>
        <div style="display:flex;flex-direction:column;gap:12px">
          <button id="btn-email-otp" class="btn-secondary" style="width:100%;padding:13px;font-size:14px;justify-content:center;gap:10px">
            📧 Sign in with Email OTP
          </button>
          <button id="btn-phone-otp" class="btn-secondary" style="width:100%;padding:13px;font-size:14px;justify-content:center;gap:10px">
            📱 Sign in with Phone OTP
          </button>
          <div style="display:flex;align-items:center;gap:10px;margin:4px 0">
            <div style="flex:1;height:1px;background:var(--border)"></div>
            <span style="font-size:12px;color:var(--text-muted)">or</span>
            <div style="flex:1;height:1px;background:var(--border)"></div>
          </div>
          <button id="btn-password" class="btn-ghost" style="width:100%;padding:10px;font-size:13px;justify-content:center;color:var(--text-muted)">
            🔑 Admin: Username & Password
          </button>
        </div>
      `;
      requestAnimationFrame(() => {
        $('btn-email-otp')?.addEventListener('click', () => { otpMethod='email'; loginMode='otp-input'; renderCard(); });
        $('btn-phone-otp')?.addEventListener('click', () => { otpMethod='phone'; loginMode='otp-input'; renderCard(); });
        $('btn-password')?.addEventListener('click', () => { loginMode='password'; renderCard(); });
      });
    }

    // ── PASSWORD MODE ──
    else if (loginMode === 'password') {
      card.innerHTML = `
        <button id="back-btn" style="background:none;border:none;color:var(--text-sub);cursor:pointer;font-size:13px;padding:0;margin-bottom:16px;display:flex;align-items:center;gap:6px">← Back</button>
        <div style="font-size:17px;font-weight:700;margin-bottom:3px">Admin Sign In</div>
        <div style="font-size:13px;color:var(--text-sub);margin-bottom:22px">Enter your username and password</div>
        <div id="login-err" class="alert alert-danger" style="display:none;margin-bottom:16px"></div>
        <div class="form-group">
          <label class="form-label">Username</label>
          <input id="l-user" placeholder="Enter your username" autocomplete="username"/>
        </div>
        <div class="form-group" style="position:relative">
          <label class="form-label">Password</label>
          <input id="l-pass" type="password" placeholder="Enter your password" autocomplete="current-password" style="padding-right:44px"/>
          <button id="l-eye" type="button" style="position:absolute;right:10px;top:32px;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px;padding:4px">👁</button>
        </div>
        <button id="l-btn" class="btn-primary" style="width:100%;padding:12px;font-size:15px;justify-content:center;margin-top:4px">Sign In</button>
      `;
      requestAnimationFrame(() => {
        $('back-btn')?.addEventListener('click', () => { loginMode='choose'; renderCard(); });
        const errEl = $('login-err');
        const doLogin = async () => {
          if (loading) return;
          const u = $('l-user')?.value?.trim();
          const p = $('l-pass')?.value;
          if (!u || !p) { errEl.textContent='Please enter username and password.'; errEl.style.display='flex'; return; }
          loading = true;
          const btn = $('l-btn');
          if(btn) { btn.innerHTML = '<span class="spinner"></span> Signing in…'; btn.disabled = true; }
          try {
            const user = await login(u, p);
            State.user = user; State.page = 'app'; State.section = 'dashboard';
            await loadMembers(); await loadStaff(); render();
          } catch (err) {
            if(btn){ btn.textContent='Sign In'; btn.disabled=false; }
            errEl.textContent = err.message || '⚠ Invalid username or password.';
            errEl.style.display='flex';
          } finally { loading = false; }
        };
        $('l-btn')?.addEventListener('click', doLogin);
        $('l-pass')?.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
        $('l-user')?.addEventListener('keydown', e => { if(e.key==='Enter') $('l-pass')?.focus(); });
        $('l-eye')?.addEventListener('click', () => {
          const inp = $('l-pass'); if(!inp) return;
          inp.type = inp.type==='password' ? 'text' : 'password';
          $('l-eye').textContent = inp.type==='password' ? '👁' : '🙈';
        });
        $('l-user')?.focus();
      });
    }

    // ── OTP INPUT MODE (enter email or phone) ──
    else if (loginMode === 'otp-input') {
      const isEmail = otpMethod === 'email';
      card.innerHTML = `
        <button id="back-btn" style="background:none;border:none;color:var(--text-sub);cursor:pointer;font-size:13px;padding:0;margin-bottom:16px;display:flex;align-items:center;gap:6px">← Back</button>
        <div style="font-size:17px;font-weight:700;margin-bottom:3px">${isEmail ? '📧 Email' : '📱 Phone'} Login</div>
        <div style="font-size:13px;color:var(--text-sub);margin-bottom:22px">
          ${isEmail ? 'Enter your registered email address' : 'Enter your registered phone number'}
        </div>
        <div id="login-err" class="alert alert-danger" style="display:none;margin-bottom:16px"></div>
        <div class="form-group">
          <label class="form-label">${isEmail ? 'Email Address' : 'Phone Number'}</label>
          <input id="otp-contact" type="${isEmail ? 'email' : 'tel'}" 
            placeholder="${isEmail ? 'yourname@email.com' : '0700123456 or +256700123456'}" 
            autocomplete="${isEmail ? 'email' : 'tel'}"/>
        </div>
        <button id="otp-send-btn" class="btn-primary" style="width:100%;padding:12px;font-size:15px;justify-content:center">
          Send Code
        </button>
      `;
      requestAnimationFrame(() => {
        $('back-btn')?.addEventListener('click', () => { loginMode='choose'; renderCard(); });
        const errEl = $('login-err');
        const sendOtp = async () => {
          if (loading) return;
          const value = $('otp-contact')?.value?.trim();
          if (!value) { errEl.textContent=`Please enter your ${isEmail?'email':'phone number'}.`; errEl.style.display='flex'; return; }
          loading = true;
          const btn = $('otp-send-btn');
          if(btn) { btn.innerHTML = '<span class="spinner"></span> Sending…'; btn.disabled = true; }
          try {
            const res = await apiCall('POST', '/api/otp/request', { value, method: otpMethod });
            otpStaffId = res.staffId;
            otpMasked = res.masked;
            loginMode = 'otp-verify';
            renderCard();
          } catch (err) {
            if(btn) { btn.textContent='Send Code'; btn.disabled=false; }
            errEl.textContent = err.message || 'Failed to send code.';
            errEl.style.display='flex';
          } finally { loading = false; }
        };
        $('otp-send-btn')?.addEventListener('click', sendOtp);
        $('otp-contact')?.addEventListener('keydown', e => { if(e.key==='Enter') sendOtp(); });
        $('otp-contact')?.focus();
      });
    }

    // ── OTP VERIFY MODE (enter the 6-digit code) ──
    else if (loginMode === 'otp-verify') {
      const isEmail = otpMethod === 'email';
      card.innerHTML = `
        <button id="back-btn" style="background:none;border:none;color:var(--text-sub);cursor:pointer;font-size:13px;padding:0;margin-bottom:16px;display:flex;align-items:center;gap:6px">← Back</button>
        <div style="font-size:17px;font-weight:700;margin-bottom:3px">Enter Your Code</div>
        <div style="font-size:13px;color:var(--text-sub);margin-bottom:6px">
          A 6-digit code was sent to:
        </div>
        <div style="font-size:14px;font-weight:600;color:var(--accent);margin-bottom:22px">
          ${isEmail ? '📧' : '📱'} ${otpMasked}
        </div>
        <div id="login-err" class="alert alert-danger" style="display:none;margin-bottom:16px"></div>
        <div class="form-group">
          <label class="form-label">6-Digit Code</label>
          <input id="otp-code" type="text" inputmode="numeric" maxlength="6"
            placeholder="000000"
            style="font-size:24px;font-weight:700;letter-spacing:10px;text-align:center;padding:14px"/>
        </div>
        <button id="otp-verify-btn" class="btn-primary" style="width:100%;padding:12px;font-size:15px;justify-content:center">
          Verify & Sign In
        </button>
        <div style="text-align:center;margin-top:16px">
          <button id="otp-resend" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:13px;text-decoration:underline">
            Didn't receive a code? Resend
          </button>
        </div>
      `;
      requestAnimationFrame(() => {
        $('back-btn')?.addEventListener('click', () => { loginMode='otp-input'; renderCard(); });
        const errEl = $('login-err');
        const verifyOtp = async () => {
          if (loading) return;
          const code = $('otp-code')?.value?.trim();
          if (!code || code.length !== 6) { errEl.textContent='Please enter the 6-digit code.'; errEl.style.display='flex'; return; }
          loading = true;
          const btn = $('otp-verify-btn');
          if(btn) { btn.innerHTML = '<span class="spinner"></span> Verifying…'; btn.disabled = true; }
          try {
            const user = await apiCall('POST', '/api/otp/verify', { staffId: otpStaffId, code });
            State.user = user; State.page = 'app'; State.section = 'dashboard';
            await loadMembers(); await loadStaff(); render();
          } catch (err) {
            if(btn) { btn.textContent='Verify & Sign In'; btn.disabled=false; }
            errEl.textContent = err.message || 'Invalid or expired code.';
            errEl.style.display='flex';
          } finally { loading = false; }
        };
        $('otp-verify-btn')?.addEventListener('click', verifyOtp);
        $('otp-code')?.addEventListener('keydown', e => { if(e.key==='Enter') verifyOtp(); });
        $('otp-resend')?.addEventListener('click', () => { loginMode='otp-input'; renderCard(); });
        $('otp-code')?.focus();
      });
    }
  }

  renderCard();
  return wrap;
}

// ─── APP SHELL ────────────────────────────────────────────────
function renderApp() {
  const user = State.user;
  const canAdmin = user.role === 'superadmin';
  const sections = ['dashboard','members','id-cards','reports','settings'];
  if (canAdmin || hasPerm(user,'staff_r') || hasPerm(user,'staff_rw')) sections.splice(3,0,'staff');

  const navItems = [
    { id:'dashboard', label:'Dashboard',      icon:'📊' },
    { id:'members',   label:'Members',         icon:'👥' },
    { id:'id-cards',  label:'ID Cards',        icon:'🪪' },
    { id:'staff',     label:'Staff Profiles',  icon:'🏢' },
    { id:'reports',   label:'Reports',         icon:'📈' },
    { id:'settings',  label:'Settings',        icon:'⚙️' },
  ].filter(n => sections.includes(n.id));

  const shell = el('div', { style:'display:flex' });

  const sidebar = el('aside', { class:'sidebar', id:'sidebar' });
  sidebar.innerHTML = `
    <div class="sidebar-logo">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#5B6BF5,#8B5CF6);display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <span style="color:#fff;font-size:18px;font-weight:800">B</span>
        </div>
        <div>
          <div style="font-weight:800;font-size:15px;color:var(--text)">${APP.org}</div>
          <div style="font-size:10px;color:var(--text-muted)">Member Portal</div>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Navigation</div>
      ${navItems.map(n => `
        <div class="nav-item ${State.section===n.id?'active':''}" data-section="${n.id}">
          <span class="nav-icon">${n.icon}</span>
          <span>${n.label}</span>
        </div>
      `).join('')}
    </nav>
    <div style="padding:12px 14px;border-top:1px solid var(--border)">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div class="avatar" id="sb-avatar" style="width:34px;height:34px;background:${avatarColor(user.name)};font-size:12px;flex-shrink:0">${user.avatar?`<img src="${user.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:''}${!user.avatar?initials(user.name):''}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${user.name}</div>
          <div style="font-size:11px;color:var(--text-muted)">${ROLES[user.role]?.label||user.role}</div>
        </div>
      </div>
      <button id="logout-btn" class="btn-secondary" style="width:100%;font-size:13px;padding:7px;justify-content:center">Sign Out</button>
    </div>
  `;

  const main = el('div', { class:'main-content' });

  const topbar = el('div', { class:'topbar' });
  topbar.innerHTML = `
    <div style="display:flex;align-items:center;gap:12px">
      <button class="mobile-menu-btn no-print" id="menu-btn">☰</button>
      <div>
        <div style="font-size:16px;font-weight:700">${navItems.find(n=>n.id===State.section)?.label||''}</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <button id="theme-btn" style="border:1.5px solid var(--border);background:var(--surface2);padding:7px 10px;border-radius:var(--radius);font-size:16px;cursor:pointer" title="Toggle theme">${State.theme==='dark'?'☀️':'🌙'}</button>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="avatar" style="width:32px;height:32px;background:${avatarColor(user.name)};font-size:11px">${user.avatar?`<img src="${user.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:''}${!user.avatar?initials(user.name):''}</div>
        <div style="display:none" class="sm-hide">
          <div style="font-size:13px;font-weight:600">${user.name}</div>
          <div style="font-size:11px;color:var(--text-muted)">${ROLES[user.role]?.label||user.role}</div>
        </div>
      </div>
    </div>
  `;

  const pageWrap = el('div', { class:'page', id:'page-content' });

  main.appendChild(topbar);
  main.appendChild(pageWrap);
  shell.appendChild(sidebar);
  shell.appendChild(main);

  requestAnimationFrame(() => {
    document.querySelectorAll('.nav-item[data-section]').forEach(item => {
      item.addEventListener('click', () => {
        State.section = item.dataset.section;
        const mob = $('sidebar');
        if (mob) mob.classList.remove('open');
        renderSection();
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        item.classList.add('active');
        const topTitle = document.querySelector('.topbar .main-content .topbar div div');
        if (topTitle) topTitle.textContent = navItems.find(n=>n.id===State.section)?.label||'';
      });
    });

    $('logout-btn')?.addEventListener('click', () => {
      State.user = null; State.page = 'login'; render();
    });

    $('theme-btn')?.addEventListener('click', () => {
      State.setTheme(State.theme==='dark'?'light':'dark'); render();
    });

    $('menu-btn')?.addEventListener('click', () => {
      $('sidebar')?.classList.toggle('open');
    });

    renderSection();
  });

  return shell;
}

async function renderSection() {
  const c = $('page-content');
  if (!c) return;
  c.innerHTML = '<div style="text-align:center;padding:40px"><div class="spinner"></div> Loading...</div>';
  
  // Refresh data before rendering
  await loadMembers();
  await loadStaff();
  
  const fns = {
    dashboard: renderDashboard,
    members:   renderMembers,
    'id-cards':renderIDCards,
    staff:     renderStaff,
    reports:   renderReports,
    settings:  renderSettings,
  };
  const fn = fns[State.section];
  if (fn) c.innerHTML = '';
  if (fn) c.appendChild(await fn());
}

// ─── DASHBOARD ────────────────────────────────────────────────
async function renderDashboard() {
  const div = el('div');
  const members = State.data.members || [];
  const total = members.length;
  const males = members.filter(m=>m.gender==='Male').length;
  const females = members.filter(m=>m.gender==='Female').length;
  const stats = await loadStats();
  const thisMonth = stats.thisMonth || 0;

  const areaCount = {};
  members.forEach(m=>{ if(m.area) areaCount[m.area]=(areaCount[m.area]||0)+1; });
  const topAreas = Object.entries(areaCount).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const recent = [...members].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).slice(0,5);

  div.innerHTML = `
    <div class="page-header">
      <div>
        <h1 style="font-size:22px;font-weight:800">Dashboard</h1>
        <p style="color:var(--text-sub);margin-top:3px;font-size:13px">Welcome back, ${State.user.name.split(' ')[0]}</p>
      </div>
      <div style="display:flex;align-items:center;gap:8px;padding:7px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);font-size:13px;color:var(--text-sub)">
        📅 ${new Date().toLocaleDateString('en-UG',{weekday:'short',day:'numeric',month:'long',year:'numeric'})}

    </div>

    <div style="background:linear-gradient(135deg,#0f1117,#1a1d2e);border:1px solid var(--ug-gold);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:24px;display:flex;align-items:center;gap:16px">
      <div style="display:flex;gap:4px;flex-shrink:0">
        <div style="width:8px;height:36px;background:#000;border-radius:3px"></div>
        <div style="width:8px;height:36px;background:#FCDC5F;border-radius:3px"></div>
        <div style="width:8px;height:36px;background:#CC0001;border-radius:3px"></div>
      </div>
      <div>
        <div style="font-size:14px;font-weight:700;color:#FCDC5F">Republic of Uganda · Official Member Registry</div>
        <div style="font-size:12px;color:#8892B0;margin-top:2px">Buganda Muslim Mass Union — Secure & Certified Data Management System</div>
      </div>
    </div>

    <div class="stat-grid">
      ${[
        ['Total Members',total,'👥','var(--accent)'],
        ['Male Members',males,'👨','var(--info)'],
        ['Female Members',females,'👩','#8B5CF6'],
        ['Registered This Month',thisMonth,'📋','var(--success)'],
      ].map(([label,val,icon,color])=>`
        <div class="stat-card">
          <div style="display:flex;align-items:flex-start;justify-content:space-between">
            <div>
              <div style="font-size:11px;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">${label}</div>
              <div style="font-size:32px;font-weight:800;color:var(--text)">${val.toLocaleString()}</div>
            </div>
            <div style="width:44px;height:44px;border-radius:10px;background:${color}18;display:flex;align-items:center;justify-content:center;font-size:22px">${icon}</div>
          </div>
        </div>
      `).join('')}
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div class="card">
        <div style="font-weight:700;font-size:15px;margin-bottom:16px">Recent Registrations</div>
        ${recent.length===0
          ? '<div class="empty-state" style="padding:30px"><div style="font-size:32px">📭</div><div style="margin-top:8px;font-size:13px">No members yet</div></div>'
          : recent.map(m=>`
            <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">
              <div class="avatar" style="width:36px;height:36px;background:${avatarColor(m.name)};font-size:12px;flex-shrink:0">${m.photo?`<img src="${m.photo}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:initials(m.name)}</div>
              <div style="flex:1;min-width:0">
                <div style="font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(m.name)}</div>
                <div style="font-size:11px;color:var(--text-muted)">${m.member_id} · ${m.area||'—'}</div>
              </div>
              <div style="font-size:11px;color:var(--text-muted)">${fmtDate(m.created_at)}</div>
            </div>
          `).join('')}
      </div>
      <div class="card">
        <div style="font-weight:700;font-size:15px;margin-bottom:16px">Members by Area/Centre</div>
        ${topAreas.length===0
          ? '<div class="empty-state" style="padding:30px"><div style="font-size:32px">🗺️</div><div style="margin-top:8px;font-size:13px">No data yet</div></div>'
          : topAreas.map(([area,count])=>{
              const pct = total>0?Math.round(count/total*100):0;
              return `
                <div style="margin-bottom:12px">
                  <div style="display:flex;justify-content:space-between;margin-bottom:4px">
                    <span style="font-size:13px">${escapeHtml(area)}</span>
                    <span style="font-size:12px;font-weight:600;color:var(--text-sub)">${count} (${pct}%)</span>

                  <div class="progress"><div class="progress-bar" style="width:${pct}%;background:var(--accent)"></div></div>
                </div>
              `;
            }).join('')}
      </div>
    </div>
  `;
  return div;
}

// ─── MEMBERS (Modified for API) ─────────────────────────────────────────────────
let memberSearch = '', memberAreaFilter = '', memberGenderFilter = '', memberViewMode = 'table';

async function renderMembers() {
  const canWrite = hasPerm(State.user, 'members_rw');
  const canDelete = State.user.role==='superadmin' || hasPerm(State.user,'delete');
  const members = State.data.members || [];

  const filtered = members.filter(m=>{
    const q = memberSearch.toLowerCase();
    return (!q || [m.name,m.member_id,m.phone,m.area,m.nin_number].some(v=>v?.toLowerCase().includes(q)))
      && (!memberAreaFilter || m.area===memberAreaFilter)
      && (!memberGenderFilter || m.gender===memberGenderFilter);
  });

  const div = el('div');

  const header = el('div', {class:'page-header'});
  header.innerHTML = `
    <div>
      <h1 style="font-size:20px;font-weight:800">Members Registry</h1>
      <p style="color:var(--text-sub);margin-top:3px;font-size:13px">${filtered.length} of ${members.length} members</p>
    </div>
  `;
  if (canWrite) {
    const addBtn = el('button', {class:'btn-primary'}, '+ Register Member');
    addBtn.addEventListener('click', ()=>openMemberForm(null));
    header.appendChild(addBtn);
  }
  div.appendChild(header);

  const filters = el('div', {style:'display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap'});
  const searchWrap = el('div', {class:'search-wrap', style:'flex:1;min-width:180px'});
  const si = el('span', {class:'search-icon'}, '🔍');
  const sinp = el('input', {placeholder:'Search by name, ID, phone, area…'});
  sinp.value = memberSearch;
  sinp.addEventListener('input', e=>{ memberSearch=e.target.value; renderSection(); });
  searchWrap.appendChild(si); searchWrap.appendChild(sinp);

  const asel = el('select', {style:'width:170px'});
  asel.innerHTML = '<option value="">All Areas</option>'+AREAS.map(a=>`<option value="${a}" ${memberAreaFilter===a?'selected':''}>${a}</option>`).join('');
  asel.addEventListener('change', e=>{ memberAreaFilter=e.target.value; renderSection(); });

  const gsel = el('select', {style:'width:140px'});
  gsel.innerHTML = `<option value="">All Genders</option><option ${memberGenderFilter==='Male'?'selected':''}>Male</option><option ${memberGenderFilter==='Female'?'selected':''}>Female</option>`;
  gsel.addEventListener('change', e=>{ memberGenderFilter=e.target.value; renderSection(); });

  const viewBtns = el('div', {style:'display:flex;gap:4px'});
  ['table','grid'].forEach(m=>{
    const b = el('button', {class:memberViewMode===m?'btn-primary':'btn-secondary', style:'padding:8px 12px'}, m==='table'?'≡':'⊞');
    b.addEventListener('click', ()=>{ memberViewMode=m; renderSection(); });
    viewBtns.appendChild(b);
  });

  filters.appendChild(searchWrap); filters.appendChild(asel); filters.appendChild(gsel); filters.appendChild(viewBtns);
  div.appendChild(filters);

  if (filtered.length === 0) {
    div.appendChild(el('div', {class:'card empty-state'}, '👥', el('div',{style:'margin-top:10px;font-size:14px'},memberSearch?'No members match your search':'No members registered yet. Click "Register Member" to add the first.')));
    return div;
  }

  if (memberViewMode === 'table') {
    const cardWrap = el('div', {class:'card', style:'padding:0;overflow:hidden'});
    const tblWrap = el('div', {style:'overflow-x:auto'});
    const tbl = el('table');
    tbl.innerHTML = `<thead><tr>
      <th>Member</th><th>Member ID</th><th>Gender</th><th>Age</th><th>Area / Centre</th><th>Phone</th><th>Family</th><th>Registered</th><th></th>
    </tr></thead>`;
    const tbody = el('tbody');
    filtered.forEach(m=>{
      const tr = el('tr');
      tr.innerHTML = `
        <td>
          <div style="display:flex;align-items:center;gap:10px">
            <div class="avatar" style="width:34px;height:34px;background:${avatarColor(m.name)};font-size:12px;flex-shrink:0">${m.photo?`<img src="${m.photo}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:initials(m.name)}</div>
            <div>
              <div style="font-weight:600;font-size:13px">${escapeHtml(m.name)}</div>
              <div style="font-size:11px;color:var(--text-muted)">${escapeHtml(m.occupation||'')}</div>
            </div>
          </div>
        </td>
        <td><code style="font-size:12px;background:var(--badge);padding:2px 8px;border-radius:4px;font-family:'IBM Plex Mono',monospace">${m.member_id}</code></td>
        <td><span class="badge" style="background:${m.gender==='Male'?'rgba(59,130,246,.12)':'rgba(139,92,246,.12)'};color:${m.gender==='Male'?'var(--info)':'#8B5CF6'}">${m.gender==='Male'?'♂':'♀'} ${m.gender||'—'}</span></td>
        <td style="font-size:13px">${calcAge(m.dob)}</td>
        <td style="font-size:13px">${escapeHtml(m.area||'—')}</td>
        <td style="font-size:13px">${escapeHtml(m.phone||'—')}</td>
        <td><span class="badge" style="background:var(--badge);color:var(--text-sub)">${(m.family?.length||0)}</span></td>
        <td style="font-size:12px;color:var(--text-muted)">${fmtDate(m.created_at)}</td>
        <td>
          <div style="display:flex;gap:3px">
            <button class="btn-icon view-btn" title="View" data-id="${m.id}">👁</button>
            ${canWrite?`<button class="btn-icon edit-btn" title="Edit" data-id="${m.id}">✏️</button>`:''}
            ${canDelete?`<button class="btn-icon del-btn" title="Delete" data-id="${m.id}" style="color:var(--danger)">🗑</button>`:''}
          </div>
        </td>
      `;
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);
    tblWrap.appendChild(tbl);
    cardWrap.appendChild(tblWrap);
    div.appendChild(cardWrap);
  } else {
    const grid = el('div', {style:'display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px'});
    filtered.forEach(m=>{
      const card = el('div', {class:'card', style:'cursor:pointer'});
      card.innerHTML = `
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
          <div class="avatar" style="width:50px;height:50px;background:${avatarColor(m.name)};font-size:17px;flex-shrink:0">${m.photo?`<img src="${m.photo}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:initials(m.name)}</div>
          <div>
            <div style="font-weight:700;font-size:14px">${escapeHtml(m.name)}</div>
            <div style="font-size:12px;color:var(--accent);font-weight:600">${m.member_id}</div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;font-size:12px;color:var(--text-sub)">
          <div>📍 ${escapeHtml(m.area||'—')}</div>
          <div>📞 ${escapeHtml(m.phone||'—')}</div>
          <div>🗓 ${fmtDate(m.dob)}</div>
          <div>👪 ${(m.family?.length||0)} family</div>
        </div>
      `;
      card.addEventListener('click', ()=>openMemberView(m));
      grid.appendChild(card);
    });
    div.appendChild(grid);
  }

  requestAnimationFrame(()=>{
    div.querySelectorAll('.view-btn').forEach(b=>b.addEventListener('click',e=>{
      e.stopPropagation();
      const m = State.data.members.find(x=>x.id == b.dataset.id);
      if(m) openMemberView(m);
    }));
    div.querySelectorAll('.edit-btn').forEach(b=>b.addEventListener('click',e=>{
      e.stopPropagation();
      const m = State.data.members.find(x=>x.id == b.dataset.id);
      if(m) openMemberForm(m);
    }));
    div.querySelectorAll('.del-btn').forEach(b=>b.addEventListener('click',e=>{
      e.stopPropagation();
      const m = State.data.members.find(x=>x.id == b.dataset.id);
      if(m) openConfirm(`Delete member "${m.name}"? This cannot be undone.`, async ()=>{
        await deleteMember(m.id);
        await loadMembers();
        showToast('Member deleted.','danger');
        renderSection();
      });
    }));
  });

  return div;
}

// ─── MEMBER FORM MODAL (with API) ────────────────────────────────────────
function openMemberForm(member) {
  let tab = 'personal';
  let form = {
    name: member?.name||'', dob: member?.dob||'', gender: member?.gender||'',
    religion: member?.religion||'Muslim', nationality: member?.nationality||'Ugandan',
    ninNumber: member?.nin_number||'', area: member?.area||'', village: member?.village||'',
    phone: member?.phone||'', phone2: member?.phone2||'', email: member?.email||'',
    occupation: member?.occupation||'', education: member?.education||'',
    maritalStatus: member?.marital_status||'', notes: member?.notes||'',
    photo: member?.photo||null, family: JSON.parse(JSON.stringify(member?.family||[])),
  };

  const rebuild = () => {
    const content = $('mf-content');
    if (!content) return;
    content.innerHTML = buildMFContent();
    wireMF();
  };

  const buildMFContent = () => {
    const tabs = [{id:'personal',label:'Personal'},{id:'contact',label:'Contact'},{id:'family',label:'Family ('+(form.family.length)+')'},{id:'photo',label:'Photo'}];
    let html = `<div class="tab-bar">${tabs.map(t=>`<div class="tab ${tab===t.id?'active':''}" data-tab="${t.id}">${t.label}</div>`).join('')}</div>`;

    if (tab === 'personal') html += `
      <div class="form-row">
        <div class="form-group"><label class="form-label">Full Name *</label><input id="mf-name" value="${escapeHtml(form.name)}" placeholder="Full legal name"/></div>
        <div class="form-group"><label class="form-label">Date of Birth *</label><input id="mf-dob" type="date" value="${form.dob}"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Gender *</label>
          <select id="mf-gender"><option value="">Select</option><option ${form.gender==='Male'?'selected':''}>Male</option><option ${form.gender==='Female'?'selected':''}>Female</option></select>
        </div>
        <div class="form-group"><label class="form-label">Marital Status</label>
          <select id="mf-marital"><option value="">Select</option>${['Single','Married','Widowed','Divorced'].map(v=>`<option ${form.maritalStatus===v?'selected':''}>${v}</option>`).join('')}</select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Religion</label>
          <select id="mf-religion"><option ${form.religion==='Muslim'?'selected':''}>Muslim</option><option ${form.religion==='Christian'?'selected':''}>Christian</option><option ${form.religion==='Other'?'selected':''}>Other</option></select>
        </div>
        <div class="form-group"><label class="form-label">Nationality</label><input id="mf-nationality" value="${escapeHtml(form.nationality)}" placeholder="Nationality"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">NIN Number</label><input id="mf-nin" value="${escapeHtml(form.ninNumber)}" placeholder="National Identification Number"/></div>
        <div class="form-group"><label class="form-label">Occupation</label><input id="mf-occ" value="${escapeHtml(form.occupation)}" placeholder="Occupation / Profession"/></div>
      </div>
      <div class="form-group"><label class="form-label">Education Level</label>
        <select id="mf-edu"><option value="">Select</option>${EDUCATION_LEVELS.map(e=>`<option ${form.education===e?'selected':''}>${e}</option>`).join('')}</select>
      </div>
      <div class="form-group"><label class="form-label">Notes</label><textarea id="mf-notes" rows="3" placeholder="Additional notes…">${escapeHtml(form.notes)}</textarea></div>
    `;

    if (tab === 'contact') html += `
      <div class="form-row">
        <div class="form-group"><label class="form-label">Primary Phone *</label><input id="mf-phone" value="${escapeHtml(form.phone)}" placeholder="+256 700 000000"/></div>
        <div class="form-group"><label class="form-label">Secondary Phone</label><input id="mf-phone2" value="${escapeHtml(form.phone2)}" placeholder="+256 700 000000"/></div>
      </div>
      <div class="form-group"><label class="form-label">Email Address</label><input id="mf-email" type="email" value="${escapeHtml(form.email)}" placeholder="email@example.com"/></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Area / Centre *</label>
          <select id="mf-area"><option value="">Select area</option>${AREAS.map(a=>`<option ${form.area===a?'selected':''}>${a}</option>`).join('')}</select>
        </div>
        <div class="form-group"><label class="form-label">Village / Parish</label><input id="mf-village" value="${escapeHtml(form.village)}" placeholder="Village or parish name"/></div>
      </div>
    `;

    if (tab === 'family') {
      html += `<div style="font-size:13px;color:var(--text-sub);margin-bottom:16px">Add family members linked to this individual.</div>`;
      if (form.family.length > 0) {
        html += form.family.map((f,i)=>`
          <div style="display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--surface2);border-radius:var(--radius);margin-bottom:8px">
            <div class="avatar" style="width:34px;height:34px;background:${avatarColor(f.name)};font-size:12px;flex-shrink:0">${initials(f.name)}</div>
            <div style="flex:1">
              <div style="font-weight:600;font-size:13px">${escapeHtml(f.name)}</div>
              <div style="font-size:12px;color:var(--text-muted)">${f.relation}${f.dob?` · Born ${fmtDate(f.dob)}`:''}${f.phone?` · ${f.phone}`:''}</div>
            </div>
            <button class="btn-icon rem-fam" data-fi="${i}" style="color:var(--danger)">✕</button>
          </div>
        `).join('');
      }
      html += `
        <div style="padding:16px;border:2px dashed var(--border);border-radius:var(--radius-lg);margin-top:10px">
          <div style="font-size:13px;font-weight:700;margin-bottom:12px">Add Family Member</div>
          <div class="form-row">
            <div class="form-group" style="margin:0"><label class="form-label">Full Name</label><input id="fam-name" placeholder="Family member name"/></div>
            <div class="form-group" style="margin:0"><label class="form-label">Relation</label>
              <select id="fam-rel"><option value="">Select</option>${RELATIONS.map(r=>`<option>${r}</option>`).join('')}</select>
            </div>
          </div>
          <div class="form-row" style="margin-top:10px">
            <div class="form-group" style="margin:0"><label class="form-label">Date of Birth</label><input id="fam-dob" type="date"/></div>
            <div class="form-group" style="margin:0"><label class="form-label">Phone</label><input id="fam-phone" placeholder="+256…"/></div>
          </div>
          <button id="add-fam-btn" class="btn-secondary" style="margin-top:12px">+ Add Member</button>
        </div>
      `;
    }

    if (tab === 'photo') html += `
      <div style="text-align:center;margin-bottom:20px">
        ${form.photo
          ? `<img src="${form.photo}" style="width:150px;height:170px;border-radius:12px;object-fit:cover;border:3px solid var(--border)">`
          : `<div style="width:150px;height:170px;border-radius:12px;background:var(--surface2);border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:52px">👤</div>`
        }
      </div>
      <div class="photo-drop" id="photo-drop">
        <div style="font-size:36px;margin-bottom:8px">📷</div>
        <div style="font-weight:600;font-size:14px">Upload Member Photo</div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:4px">Click or drag to upload · JPG, PNG, WEBP · Max 5MB</div>
        <input id="photo-inp" type="file" accept="image/*" style="display:none"/>
      </div>
      ${form.photo?`<button id="rem-photo" class="btn-danger" style="width:100%;margin-top:12px;justify-content:center">Remove Photo</button>`:''}
    `;

    return html;
  };

  const wireMF = () => {
    document.querySelectorAll('.tab[data-tab]').forEach(t=>{
      t.addEventListener('click', ()=>{ tab=t.dataset.tab; syncForm(); rebuild(); });
    });

    const syncField = (id, key) => { const e=$(id); if(e) e.addEventListener('input',ev=>form[key]=ev.target.value); };
    syncField('mf-name','name'); syncField('mf-dob','dob'); syncField('mf-nationality','nationality');
    syncField('mf-nin','ninNumber'); syncField('mf-occ','occupation'); syncField('mf-notes','notes');
    syncField('mf-phone','phone'); syncField('mf-phone2','phone2'); syncField('mf-email','email'); syncField('mf-village','village');
    const syncSel = (id,key)=>{ const e=$(id); if(e) e.addEventListener('change',ev=>form[key]=ev.target.value); };
    syncSel('mf-gender','gender'); syncSel('mf-marital','maritalStatus'); syncSel('mf-religion','religion');
    syncSel('mf-edu','education'); syncSel('mf-area','area');

    document.querySelectorAll('.rem-fam').forEach(b=>{
      b.addEventListener('click',()=>{ form.family.splice(parseInt(b.dataset.fi),1); rebuild(); });
    });
    $('add-fam-btn')?.addEventListener('click',()=>{
      const n=$('fam-name')?.value?.trim();
      if(!n) return;
      form.family.push({ id:Date.now().toString(), name:n, relation:$('fam-rel')?.value||'', dob:$('fam-dob')?.value||'', phone:$('fam-phone')?.value||'' });
      rebuild();
    });

    const photoInp = $('photo-inp');
    $('photo-drop')?.addEventListener('click',()=>photoInp?.click());
    photoInp?.addEventListener('change',e=>{
      const file=e.target.files[0]; if(!file) return;
      if(file.size>5*1024*1024){ showToast('Image too large. Max 5MB.','danger'); return; }
      const r=new FileReader(); r.onload=ev=>{ form.photo=ev.target.result; rebuild(); }; r.readAsDataURL(file);
    });
    $('rem-photo')?.addEventListener('click',()=>{ form.photo=null; rebuild(); });
  };

  const syncForm = () => {
    const v = id => $(id)?.value||'';
    if (tab==='personal') {
      form.name=v('mf-name'); form.dob=v('mf-dob'); form.gender=v('mf-gender');
      form.maritalStatus=v('mf-marital'); form.religion=v('mf-religion');
      form.nationality=v('mf-nationality'); form.ninNumber=v('mf-nin');
      form.occupation=v('mf-occ'); form.education=v('mf-edu'); form.notes=v('mf-notes');
    } else if (tab==='contact') {
      form.phone=v('mf-phone'); form.phone2=v('mf-phone2'); form.email=v('mf-email');
      form.area=v('mf-area'); form.village=v('mf-village');
    }
  };

  const validate = () => {
    if (!form.name.trim()) { tab='personal'; rebuild(); showToast('Full name is required.','danger'); return false; }
    if (!form.dob) { tab='personal'; rebuild(); showToast('Date of birth is required.','danger'); return false; }
    if (!form.gender) { tab='personal'; rebuild(); showToast('Gender is required.','danger'); return false; }
    if (!form.phone.trim()) { tab='contact'; rebuild(); showToast('Primary phone is required.','danger'); return false; }
    if (!form.area) { tab='contact'; rebuild(); showToast('Area/Centre is required.','danger'); return false; }
    return true;
  };

  const overlay = el('div',{class:'overlay',id:'mf-overlay'});
  const modal = el('div',{class:'modal modal-lg'});
  modal.innerHTML = `
    <div class="modal-header">
      <div>
        <div style="font-weight:700;font-size:16px">${member?'Edit Member':'Register New Member'}</div>
        <div style="font-size:12px;color:var(--text-sub)">${member?'Editing '+member.member_id:'Fill all required fields (*)'}</div>
      </div>
      <button class="btn-icon close-modal" style="font-size:20px">✕</button>
    </div>
    <div class="modal-body" id="mf-content"></div>
    <div class="modal-footer">
      <button class="btn-secondary close-modal">Cancel</button>
      <button class="btn-primary" id="mf-save">${member?'Save Changes':'Register Member'}</button>
    </div>
  `;
  overlay.appendChild(modal);
  document.body.appendChild(overlay);

  $('mf-content').innerHTML = buildMFContent();
  wireMF();

  overlay.querySelectorAll('.close-modal').forEach(b=>b.addEventListener('click',()=>overlay.remove()));
  overlay.addEventListener('click',e=>{ if(e.target===overlay) overlay.remove(); });

  $('mf-save').addEventListener('click',async ()=>{
    syncForm();
    if(!validate()) return;
    try {
      if (member) {
        await saveMember({...form, id: member.id}, true);
        showToast('Member updated successfully.');
      } else {
        await saveMember(form, false);
        showToast('Member registered successfully.');
      }
      await loadMembers();
      overlay.remove();
      renderSection();
    } catch (err) {
      showToast(err.message, 'danger');
    }
  });
}

              </div>
            </div>
          `).join('')}
        </div>
      `:''}
    </div>
  `;
  overlay.appendChild(modal);
  document.body.appendChild(overlay);
  overlay.querySelectorAll('.close-modal').forEach(b=>b.addEventListener('click',()=>overlay.remove()));
  overlay.addEventListener('click',e=>{ if(e.target===overlay) overlay.remove(); });
  overlay.querySelector('.edit-view-btn')?.addEventListener('click',()=>{ overlay.remove(); openMemberForm(m); });
}

};
