    <div class="page-header">
      <div>
        <div class="page-title">Staff Management</div>
        <div class="page-sub">${staff.length} staff account(s)</div>
      </div>
      <button class="btn-primary" id="add-staff-btn">+ Add Staff</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px" id="staff-grid"></div>`;

  function renderGrid() {
    const grid = $('staff-grid');
    grid.innerHTML = '';
    if (!staff.length) {
      grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1;padding:60px"><div class="empty-icon">🔐</div><div class="empty-title">No staff accounts</div></div>`;
      return;
    }
    staff.forEach(s=>{
      const card = el('div',{class:'card'});
      const roleColors = {admin:'background:var(--gold-dim);color:var(--gold)',manager:'background:var(--info-dim);color:var(--info)',staff:'background:var(--surface2);color:var(--text-sub)'};
      card.innerHTML = `
        <div style="display:flex;align-items:center;gap:13px;margin-bottom:16px">
          <div class="avatar" style="width:48px;height:48px;background:${avatarColor(s.name)};font-size:18px;color:#0c0e14">${initials(s.name)}</div>
          <div style="flex:1">
            <div style="font-weight:800;font-size:14px">${escapeHtml(s.name)}</div>
            <div style="font-size:12px;color:var(--text-muted)">${escapeHtml(s.email||s.username||'—')}</div>
          </div>
          <span class="role-badge" style="${roleColors[s.role]||roleColors.staff}">${escapeHtml(s.role||'staff')}</span>
        </div>
        <div style="display:flex;gap:7px">
          <button class="btn-secondary btn-sm" data-sedit="${s.id}" style="flex:1">✏️ Edit</button>
          <button class="btn-icon btn-sm" data-sdel="${s.id}" style="color:var(--danger)">🗑</button>
        </div>`;
      card.querySelector(`[data-sedit]`)?.addEventListener('click',()=>openStaffForm(s));
      card.querySelector(`[data-sdel]`)?.addEventListener('click',()=>{
        if (s.id===State.user?.id) { showToast("Can't delete your own account.",'warning'); return; }
        openConfirm(`Delete staff account "${s.name}"?`, async()=>{
          try { await deleteStaff(s.id); await loadStaff(); renderGrid(); showToast('Staff deleted.'); }
          catch(err){ showToast(err.message,'danger'); }
        });
      });
      grid.appendChild(card);
    });
  }

  requestAnimationFrame(()=>{
    renderGrid();
    div.querySelector('#add-staff-btn')?.addEventListener('click',()=>openStaffForm(null));
  });
  return div;
}

function openStaffForm(staff) {
  let saving = false;
  const overlay = el('div',{class:'overlay'});
  overlay.innerHTML = `
    <div class="modal modal-sm">
      <div class="modal-header">
        <div style="font-family:var(--display);font-weight:900;font-size:18px">${staff?'Edit Staff':'Add Staff'}</div>
        <button class="btn-icon close-sf" style="font-size:22px">✕</button>
      </div>
      <div class="modal-body">
        <div id="staff-err" class="alert alert-danger" style="display:none;margin-bottom:16px"></div>
        <div class="form-group"><label class="form-label">Full Name *</label><input id="sf-name" value="${escapeHtml(staff?.name||'')}" placeholder="Full name"/></div>
        <div class="form-group"><label class="form-label">Username *</label><input id="sf-user" value="${escapeHtml(staff?.username||'')}" placeholder="username"/></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Email</label><input id="sf-email" type="email" value="${escapeHtml(staff?.email||'')}" placeholder="email@example.com"/></div>
          <div class="form-group"><label class="form-label">Phone</label><input id="sf-phone" value="${escapeHtml(staff?.phone||'')}" placeholder="07XXXXXXXX"/></div>
        </div>
        <div class="form-group"><label class="form-label">Role</label>
          <select id="sf-role">${['admin','manager','staff'].map(r=>`<option ${staff?.role===r?'selected':''}>${r}</option>`).join('')}</select>
        </div>
        <div class="form-group"><label class="form-label">${staff?'New Password (leave blank to keep)':'Password *'}</label>
          <input id="sf-pass" type="password" placeholder="${staff?'New password…':'Create password'}"/>
        </div>
        <div class="form-group">
          <label class="form-label">Permissions</label>
          <div class="perm-grid" id="perm-grid">
            ${PERMISSIONS.map(p=>`
              <div class="perm-item${staff?.permissions?.includes(p)?' active':''}" data-perm="${p}">
                <div class="perm-check">${staff?.permissions?.includes(p)?'✓':''}</div>
                <span style="font-size:12px">${p.replace(/_/g,' ')}</span>
              </div>`).join('')}
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary close-sf">Cancel</button>
        <button class="btn-primary" id="save-sf" style="min-width:120px">💾 Save</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelectorAll('.close-sf').forEach(b=>b.addEventListener('click',()=>overlay.remove()));
  overlay.addEventListener('click',e=>{ if(e.target===overlay) overlay.remove(); });

  // Permissions toggle
  overlay.querySelectorAll('.perm-item').forEach(item=>{
    item.addEventListener('click',()=>{
      item.classList.toggle('active');
      item.querySelector('.perm-check').textContent = item.classList.contains('active')?'✓':'';
    });
  });

  $('save-sf')?.addEventListener('click', async()=>{
    if (saving) return;
    const name=($('sf-name')?.value||'').trim();
    const username=($('sf-user')?.value||'').trim();
    const email=$('sf-email')?.value||'';
    const phone=$('sf-phone')?.value||'';
    const role=$('sf-role')?.value||'staff';
    const password=$('sf-pass')?.value||'';
    const permissions=[...overlay.querySelectorAll('.perm-item.active')].map(i=>i.dataset.perm);
    const errEl=$('staff-err');

    if (!name||!username) { errEl.textContent='Name and username required.'; errEl.style.display='flex'; return; }
    if (!staff&&!password) { errEl.textContent='Password required for new staff.'; errEl.style.display='flex'; return; }

    saving=true; $('save-sf').innerHTML='<span class="spinner"></span> Saving…'; $('save-sf').disabled=true;
    try {
      const payload={...(staff?{id:staff.id}:{}), name, username, email, phone, role, permissions, ...(password?{password}:{})};
      await saveStaff(payload);
      await loadStaff(); overlay.remove(); showToast(staff?'Staff updated!':'Staff added!'); renderSection();
    } catch(err) {
      $('save-sf').innerHTML='💾 Save'; $('save-sf').disabled=false;
      errEl.textContent=err.message; errEl.style.display='flex';
    } finally { saving=false; }
  });
}

// ─── REPORTS ────────────────────────────────────────────────────
async function renderReports() {
  const members = State.data.members;
  const total = members.length;
  const males = members.filter(m=>m.gender==='Male').length;
  const females = members.filter(m=>m.gender==='Female').length;
  const totalFam = members.reduce((a,m)=>a+(m.family?.length||0),0);
  const areaCount={}, maritalCount={}, eduCount={}, monthlyData={};
  members.forEach(m=>{
    if(m.area) areaCount[m.area]=(areaCount[m.area]||0)+1;
    if(m.marital_status) maritalCount[m.marital_status]=(maritalCount[m.marital_status]||0)+1;
    if(m.education) eduCount[m.education]=(eduCount[m.education]||0)+1;
    if(m.created_at){
      const d=new Date(m.created_at), key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      monthlyData[key]=(monthlyData[key]||0)+1;
    }
  });
  const months=Object.entries(monthlyData).sort(([a],[b])=>a.localeCompare(b)).slice(-12);
  const maxBar=months.length>0?Math.max(...months.map(m=>m[1])):1;

  const div=el('div');
  div.innerHTML=`
    <div class="page-header">
      <div>
        <div class="page-title">Reports & Analytics</div>
        <div class="page-sub">Comprehensive membership data</div>
      </div>
      <button class="btn-primary btn-sm" onclick="exportMembers()">📥 Export CSV</button>
    </div>

    <div class="stat-grid">
      ${[['Total Members',total,'👥'],['Family Members',totalFam,'👨‍👩‍👧‍👦'],['Areas/Centres',Object.keys(areaCount).length,'📍'],['Avg Family',total>0?(totalFam/total).toFixed(1):'0','📊']].map(([l,v,i])=>`
        <div class="stat-card">
          <div class="stat-card-icon">${i}</div>
          <div class="stat-card-label">${l}</div>
          <div class="stat-card-val">${v}</div>
        </div>`).join('')}
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:22px">
      <div class="card">
        <div style="font-family:var(--display);font-weight:700;font-size:16px;margin-bottom:20px">Monthly Registrations</div>
        ${months.length===0?
          `<div class="empty-state" style="padding:20px 0">No data yet</div>`:
          `<div class="bar-chart">
            ${months.map(([key,count])=>{
              const pct=Math.round(count/maxBar*100);
              return `<div class="bar-col"><div class="bar-val">${count}</div><div class="bar" style="height:${pct}%"></div><div class="bar-label">${key.slice(5)}</div></div>`;
            }).join('')}
          </div>`}
      </div>
      <div class="card">
        <div style="font-family:var(--display);font-weight:700;font-size:16px;margin-bottom:20px">Gender Distribution</div>
        ${[['Male',males,'var(--info)'],['Female',females,'#a78bfa']].map(([g,c,col])=>{
          const pct=total>0?Math.round(c/total*100):0;
          return `<div style="margin-bottom:18px">
            <div style="display:flex;justify-content:space-between;margin-bottom:6px">
              <span style="font-weight:600">${g}</span>
              <span style="font-weight:800;color:${col};font-family:var(--mono)">${c} (${pct}%)</span>
            </div>
            <div class="progress"><div class="progress-bar" style="width:${pct}%;background:${col}"></div></div>
          </div>`;
        }).join('')}

        <div class="divider"></div>
        <div style="font-weight:700;font-size:13px;margin-bottom:14px;color:var(--text-sub)">Marital Status</div>
        ${Object.entries(maritalCount).map(([status,count])=>{
          const pct=total>0?Math.round(count/total*100):0;
          return `<div style="display:flex;justify-content:space-between;margin-bottom:10px;align-items:center">
            <span style="font-size:13px">${status}</span>
            <div style="display:flex;align-items:center;gap:8px">
              <div class="progress" style="width:80px"><div class="progress-bar" style="width:${pct}%"></div></div>
              <span style="font-size:12px;font-weight:700;color:var(--text-sub);min-width:32px;text-align:right">${count}</span>
            </div>
          </div>`;
        }).join('')||`<div style="color:var(--text-muted);font-size:13px">No data</div>`}
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div class="card">
        <div style="font-family:var(--display);font-weight:700;font-size:16px;margin-bottom:18px">Members by Area</div>
        ${Object.entries(areaCount).length===0?
          `<div class="empty-state" style="padding:20px 0">No data</div>`:
          Object.entries(areaCount).sort((a,b)=>b[1]-a[1]).map(([area,count],i)=>`
            <div style="display:flex;align-items:center;gap:13px;padding:9px 0;border-bottom:1px solid var(--border)">
              <div style="width:24px;height:24px;border-radius:7px;background:var(--gold-dim);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--gold);flex-shrink:0">${i+1}</div>
              <div style="flex:1">
                <div style="font-size:13px;font-weight:600;margin-bottom:4px">${escapeHtml(area)}</div>
                <div class="progress"><div class="progress-bar" style="width:${total>0?Math.round(count/total*100):0}%"></div></div>
              </div>
              <div style="font-size:17px;font-weight:900;color:var(--gold);font-family:var(--mono)">${count}</div>
            </div>`).join('')
        }
      </div>
      <div class="card">
        <div style="font-family:var(--display);font-weight:700;font-size:16px;margin-bottom:18px">Education Levels</div>
        ${Object.entries(eduCount).length===0?
          `<div class="empty-state" style="padding:20px 0">No data</div>`:
          Object.entries(eduCount).sort((a,b)=>b[1]-a[1]).map(([edu,count])=>{
            const pct=total>0?Math.round(count/total*100):0;
            return `<div style="margin-bottom:13px">
              <div style="display:flex;justify-content:space-between;margin-bottom:5px;font-size:12.5px">
                <span style="font-weight:500">${escapeHtml(edu)}</span>
                <span style="font-weight:700;color:var(--text-sub)">${count}</span>
              </div>
              <div class="progress"><div class="progress-bar" style="width:${pct}%"></div></div>
            </div>`;
          }).join('')
        }
      </div>
    </div>`;
  return div;
}

// ─── SETTINGS ───────────────────────────────────────────────────
let settingsTab = 'account';
async function renderSettings() {
  const div = el('div');
  div.innerHTML = `
    <div class="page-header">
      <div class="page-title">Settings</div>
    </div>
    <div class="tab-bar">
      ${[{id:'account',label:'My Account'},{id:'appearance',label:'Appearance'},{id:'about',label:'About'}].map(t=>`
        <div class="tab${settingsTab===t.id?' active':''}" data-stab="${t.id}">${t.label}</div>`).join('')}
    </div>
    <div id="settings-content"></div>`;
  div.querySelectorAll('.tab[data-stab]').forEach(t=>t.addEventListener('click',()=>{
    settingsTab=t.dataset.stab;
    div.querySelectorAll('.tab[data-stab]').forEach(x=>x.classList.toggle('active',x.dataset.stab===settingsTab));
    renderSettingsTab($('settings-content'));
  }));
  requestAnimationFrame(()=>renderSettingsTab($('settings-content')));
  return div;
}

async function renderSettingsTab(c) {
  if (!c) return;
  if (settingsTab==='account') {
    const user=State.user;
    c.innerHTML=`
      <div class="card" style="max-width:540px">
        <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px">
          <div class="avatar" style="width:60px;height:60px;background:${avatarColor(user.name)};font-size:22px;color:#0c0e14">${initials(user.name)}</div>
          <div>
            <div style="font-family:var(--display);font-size:18px;font-weight:900">${escapeHtml(user.name)}</div>
            <div style="font-size:12px;color:var(--text-muted)">${escapeHtml(user.role||'Staff')}</div>
          </div>
        </div>
        <div class="divider"></div>
        <div style="font-weight:700;font-size:14px;margin-bottom:18px">Account Information</div>
        <div class="form-group"><label class="form-label">Full Name</label><input id="acc-name" value="${escapeHtml(user.name)}"/></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Email</label><input id="acc-email" type="email" value="${escapeHtml(user.email||'')}"/></div>
          <div class="form-group"><label class="form-label">Phone</label><input id="acc-phone" value="${escapeHtml(user.phone||'')}"/></div>
        </div>
        <div class="divider"></div>
        <div style="font-weight:700;font-size:14px;margin-bottom:18px">Change Password</div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">New Password</label><input id="acc-new-pass" type="password" placeholder="New password"/></div>
          <div class="form-group"><label class="form-label">Confirm Password</label><input id="acc-con-pass" type="password" placeholder="Confirm"/></div>
        </div>
        <button class="btn-primary" id="acc-save">💾 Save Changes</button>
      </div>`;
    $('acc-save')?.addEventListener('click', async()=>{
      const name=($('acc-name')?.value||'').trim(), email=$('acc-email')?.value||'', phone=$('acc-phone')?.value||'', newP=$('acc-new-pass')?.value||'', conP=$('acc-con-pass')?.value||'';
      if(!name){ showToast('Name required.','danger'); return; }
      if(newP&&newP!==conP){ showToast("Passwords don't match.",'danger'); return; }
      try {
        await saveStaff({...user,name,email,phone,...(newP?{password:newP}:{})},true);
        State.user={...State.user,name,email,phone,...(newP?{password:newP}:{})};
        saveSession(); showToast('Account updated!');
      } catch(err){ showToast(err.message,'danger'); }
    });
  } else if (settingsTab==='appearance') {
    c.innerHTML=`
      <div class="card" style="max-width:440px">
        <div style="font-weight:700;font-size:15px;margin-bottom:20px">Theme</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          ${[['dark','🌙 Dark','#0c0e14'],['light','☀️ Light','#f4f5f9']].map(([id,label,bg])=>`
            <div data-theme="${id}" style="border:2px solid ${State.theme===id?'var(--gold)':'var(--border)'};border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:border-color .2s;background:${bg};text-align:center">
              <div style="font-size:24px;margin-bottom:8px">${label.split(' ')[0]}</div>
              <div style="font-size:13px;font-weight:600;color:${id==='dark'?'#fff':'#111'}">${label.split(' ')[1]}</div>
              ${State.theme===id?`<div style="font-size:10px;color:var(--gold);margin-top:4px;font-weight:700">✓ Active</div>`:''}
            </div>`).join('')}
        </div>
      </div>`;
    c.querySelectorAll('[data-theme]').forEach(t=>t.addEventListener('click',()=>{
      State.theme=t.dataset.theme; saveSession(); render();
    }));
  } else {
    c.innerHTML=`
      <div class="card" style="max-width:440px;text-align:center">
        <div class="brand-emblem" style="width:64px;height:64px;border-radius:18px;font-size:30px;margin:0 auto 16px;animation:glow 3s infinite">B</div>
        <div style="font-family:var(--display);font-size:20px;font-weight:900;margin-bottom:6px">${APP.orgFull}</div>
        <div style="font-size:12px;color:var(--text-muted)">Member Management System v${APP.version}</div>
        <div class="ug-flag-bar" style="max-width:120px;margin:16px auto;height:5px">
          <span style="background:#111;border:1px solid #444"></span><span style="background:#fcdc5f"></span><span style="background:#cc0001"></span>
          <span style="background:#111;border:1px solid #444"></span><span style="background:#fcdc5f"></span><span style="background:#cc0001"></span>
        </div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:24px">Republic of Uganda</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          ${[['Members',State.data.members.length],['Staff',State.data.staff.length],['Version',APP.version],['Database','PostgreSQL']].map(([k,v])=>`
            <div class="card-sm" style="text-align:center">
              <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">${k}</div>
              <div style="font-weight:800;font-size:18px;font-family:var(--display)">${v}</div>
            </div>`).join('')}
        </div>
        <div style="margin-top:20px;font-size:11px;color:var(--text-muted)">© ${new Date().getFullYear()} ${APP.orgFull}</div>
      </div>`;
  }
}

// ─── INIT ────────────────────────────────────────────────────────
document.body.classList.toggle('light', State.theme==='light');
const resumed = loadSession();
if (resumed) {
  State.page = 'app';
  (async()=>{ await loadMembers(); await loadStaff(); render(); })();
} else {
  render();
}
</script>
