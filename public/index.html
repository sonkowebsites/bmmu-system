<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BMMU Portal">
  <link rel="manifest" href="manifest.json">
  <title>BMMU - Member Management System</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #4f46e5;
      --primary-dark: #4338ca;
      --primary-light: #818cf8;
      --secondary: #0f172a;
      --accent: #06b6d4;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --dark: #0f172a;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-300: #cbd5e1;
      --gray-400: #94a3b8;
      --gray-500: #64748b;
      --gray-600: #475569;
      --gray-700: #334155;
      --gray-800: #1e293b;
      --gray-900: #0f172a;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
      --radius-sm: 0.375rem;
      --radius: 0.5rem;
      --radius-md: 0.75rem;
      --radius-lg: 1rem;
      --radius-xl: 1.5rem;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: var(--gray-800);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Canvas Background */
    #bgCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* App Container */
    #app {
      position: relative;
      z-index: 1;
    }

    /* Glassmorphism Effect */
    .glass {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-xl);
    }

    /* Modern Button Styles */
    .btn-modern {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      font-weight: 600;
      border-radius: var(--radius);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      border: none;
      font-size: 14px;
    }

    .btn-primary-modern {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      box-shadow: var(--shadow-md);
    }

    .btn-primary-modern:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    /* Card Styles */
    .card-modern {
      background: white;
      border-radius: var(--radius-lg);
      padding: 20px;
      box-shadow: var(--shadow-md);
      transition: all 0.3s ease;
    }

    .card-modern:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-xl);
    }

    /* Dashboard Stats */
    .stat-card-modern {
      background: linear-gradient(135deg, white, var(--gray-50));
      border-radius: var(--radius-lg);
      padding: 20px;
      box-shadow: var(--shadow-md);
      transition: all 0.3s ease;
      border: 1px solid rgba(79, 70, 229, 0.1);
    }

    /* Mobile-first Responsive */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: -280px;
        top: 0;
        width: 280px;
        height: 100vh;
        background: white;
        z-index: 1000;
        transition: left 0.3s ease;
        box-shadow: var(--shadow-xl);
        overflow-y: auto;
      }
      
      .sidebar.open {
        left: 0;
      }
      
      .main-content {
        margin-left: 0 !important;
        width: 100%;
      }
      
      .stat-grid {
        grid-template-columns: 1fr !important;
      }
      
      .dashboard-grid {
        grid-template-columns: 1fr !important;
      }
      
      .modal-content {
        width: 95% !important;
        margin: 10px;
      }
    }

    /* Smooth Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fade-in-up {
      animation: fadeInUp 0.6s ease-out;
    }

    /* Toast Notification */
    .toast-modern {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: white;
      border-radius: var(--radius);
      padding: 12px 20px;
      box-shadow: var(--shadow-lg);
      z-index: 10000;
      animation: slideInRight 0.3s ease;
      border-left: 4px solid var(--primary);
    }

    @keyframes slideInRight {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    /* Loading Spinner */
    .spinner-modern {
      width: 40px;
      height: 40px;
      border: 3px solid var(--gray-200);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ID Card Professional Design */
    .id-card-professional {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border-radius: 20px;
      padding: 24px;
      color: white;
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow-xl);
      max-width: 400px;
      margin: 0 auto;
    }

    .id-card-professional::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(79, 70, 229, 0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    .ug-flag-stripes {
      height: 4px;
      background: linear-gradient(90deg, #000000 0%, #000000 33%, #FCDC5F 33%, #FCDC5F 66%, #CC0001 66%, #CC0001 100%);
      border-radius: 2px;
      margin-bottom: 20px;
    }

    /* Table Styles */
    .table-modern {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 8px;
    }

    .table-modern th {
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--gray-500);
    }

    .table-modern td {
      padding: 16px;
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
    }
  </style>
</head>
<body>
  <canvas id="bgCanvas"></canvas>
  <div id="app"></div>

  <script>
    // Professional Canvas Animation Background
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    
    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 3 + 1;
        this.speedX = (Math.random() - 0.5) * 0.5;
        this.speedY = (Math.random() - 0.5) * 0.5;
        this.opacity = Math.random() * 0.3 + 0.1;
      }
      
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        
        if (this.x < 0) this.x = canvas.width;
        if (this.x > canvas.width) this.x = 0;
        if (this.y < 0) this.y = canvas.height;
        if (this.y > canvas.height) this.y = 0;
      }
      
      draw() {
        ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
        ctx.fillRect(this.x, this.y, this.size, this.size);
      }
    }
    
    let particles = [];
    
    function initParticles() {
      const particleCount = Math.min(100, Math.floor(window.innerWidth * window.innerHeight / 20000));
      for (let i = 0; i < particleCount; i++) {
        particles.push(new Particle());
      }
    }
    
    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(particle => {
        particle.update();
        particle.draw();
      });
      requestAnimationFrame(animateParticles);
    }
    
    window.addEventListener('resize', () => {
      resizeCanvas();
      particles = [];
      initParticles();
    });
    
    resizeCanvas();
    initParticles();
    animateParticles();

    // App State
    const API_BASE = window.location.origin;
    let currentUser = null;
    let authToken = localStorage.getItem('bmmu_token');
    let currentPage = 'dashboard';
    let membersData = [];
    let staffData = [];

    // Helper Functions
    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = 'toast-modern';
      toast.innerHTML = `
        <div style="display: flex; align-items: center; gap: 12px;">
          <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}" style="color: ${type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : '#3b82f6'}"></i>
          <span>${message}</span>
        </div>
      `;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function formatDate(date) {
      if (!date) return '—';
      return new Date(date).toLocaleDateString('en-UG', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    function calculateAge(dob) {
      if (!dob) return '—';
      const today = new Date();
      const birthDate = new Date(dob);
      let age = today.getFullYear() - birthDate.getFullYear();
      const monthDiff = today.getMonth() - birthDate.getMonth();
      if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) age--;
      return age;
    }

    // API Calls
    async function apiCall(method, endpoint, body = null, requiresAuth = true) {
      try {
        const options = {
          method,
          headers: {
            'Content-Type': 'application/json',
          },
        };
        
        if (requiresAuth && authToken) {
          options.headers['Authorization'] = `Bearer ${authToken}`;
        }
        
        if (body) options.body = JSON.stringify(body);
        
        const response = await fetch(`${API_BASE}${endpoint}`, options);
        
        if (response.status === 401) {
          localStorage.removeItem('bmmu_token');
          currentUser = null;
          authToken = null;
          renderLogin();
          return null;
        }
        
        return await response.json();
      } catch (err) {
        showToast(err.message, 'error');
        throw err;
      }
    }

    async function login(username, password) {
      const result = await apiCall('POST', '/api/login', { username, password }, false);
      if (result.token) {
        authToken = result.token;
        localStorage.setItem('bmmu_token', result.token);
        currentUser = result.user;
        return true;
      }
      return false;
    }

    async function verifySession() {
      if (!authToken) return false;
      try {
        const user = await apiCall('GET', '/api/verify', null, true);
        if (user) {
          currentUser = user;
          return true;
        }
      } catch (err) {
        localStorage.removeItem('bmmu_token');
        authToken = null;
      }
      return false;
    }

    async function loadMembers() {
      const data = await apiCall('GET', '/api/members');
      if (data) membersData = data;
      return membersData;
    }

    async function loadStaff() {
      const data = await apiCall('GET', '/api/staff');
      if (data) staffData = data;
      return staffData;
    }

    // Render Functions
    async function renderApp() {
      if (!currentUser) {
        const verified = await verifySession();
        if (!verified) {
          renderLogin();
          return;
        }
      }
      
      await loadMembers();
      await loadStaff();
      
      const app = document.getElementById('app');
      app.innerHTML = `
        <div style="display: flex; min-height: 100vh;">
          <!-- Sidebar -->
          <div class="sidebar" id="sidebar">
            <div style="padding: 24px; border-bottom: 1px solid var(--gray-200);">
              <div style="display: flex; align-items: center; gap: 12px;">
                <div style="width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                  <i class="fas fa-users" style="color: white; font-size: 20px;"></i>
                </div>
                <div>
                  <div style="font-weight: 700; font-size: 18px;">BMMU Portal</div>
                  <div style="font-size: 11px; color: var(--gray-500);">Member Management</div>
                </div>
              </div>
            </div>
            <div style="padding: 20px;">
              <nav style="display: flex; flex-direction: column; gap: 8px;">
                ${[
                  { id: 'dashboard', icon: 'fa-chart-line', label: 'Dashboard' },
                  { id: 'members', icon: 'fa-users', label: 'Members' },
                  { id: 'id-cards', icon: 'fa-id-card', label: 'ID Cards' },
                  { id: 'staff', icon: 'fa-user-tie', label: 'Staff' },
                  { id: 'reports', icon: 'fa-chart-bar', label: 'Reports' },
                  { id: 'profile', icon: 'fa-user-circle', label: 'My Profile' }
                ].map(item => `
                  <div class="nav-item" data-page="${item.id}" style="display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: var(--radius); cursor: pointer; transition: all 0.3s; ${currentPage === item.id ? 'background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white;' : 'color: var(--gray-600);'}">
                    <i class="fas ${item.icon}" style="width: 20px;"></i>
                    <span style="font-weight: 500;">${item.label}</span>
                  </div>
                `).join('')}
              </nav>
            </div>
            <div style="padding: 20px; border-top: 1px solid var(--gray-200); margin-top: auto;">
              <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 16px;">
                <div style="width: 40px; height: 40px; background: var(--primary-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600;">
                  ${currentUser?.name?.charAt(0) || 'U'}
                </div>
                <div>
                  <div style="font-weight: 600; font-size: 14px;">${currentUser?.name || 'User'}</div>
                  <div style="font-size: 12px; color: var(--gray-500);">${currentUser?.role || 'Staff'}</div>
                </div>
              </div>
              <button id="logoutBtn" class="btn-modern" style="width: 100%; background: var(--gray-100); color: var(--gray-700);">
                <i class="fas fa-sign-out-alt"></i> Sign Out
              </button>
            </div>
          </div>
          
          <!-- Main Content -->
          <div class="main-content" style="flex: 1; margin-left: 280px; padding: 24px;">
            <div style="display: flex; justify-content: flex-end; align-items: center; margin-bottom: 24px;">
              <button id="mobileMenuBtn" style="display: none; background: none; border: none; font-size: 24px; cursor: pointer;">
                <i class="fas fa-bars"></i>
              </button>
            </div>
            <div id="pageContent"></div>
          </div>
        </div>
      `;
      
      // Sidebar navigation
      document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
          currentPage = item.dataset.page;
          renderCurrentPage();
          document.querySelector('.sidebar')?.classList.remove('open');
        });
      });
      
      document.getElementById('logoutBtn')?.addEventListener('click', async () => {
        await apiCall('POST', '/api/logout', null, true);
        localStorage.removeItem('bmmu_token');
        currentUser = null;
        authToken = null;
        renderLogin();
      });
      
      document.getElementById('mobileMenuBtn')?.addEventListener('click', () => {
        document.querySelector('.sidebar')?.classList.toggle('open');
      });
      
      renderCurrentPage();
    }

    async function renderCurrentPage() {
      const content = document.getElementById('pageContent');
      if (!content) return;
      
      content.innerHTML = '<div style="display: flex; justify-content: center; align-items: center; height: 50vh;"><div class="spinner-modern"></div></div>';
      
      if (currentPage === 'dashboard') await renderDashboard(content);
      else if (currentPage === 'members') await renderMembers(content);
      else if (currentPage === 'id-cards') await renderIDCards(content);
      else if (currentPage === 'staff') await renderStaff(content);
      else if (currentPage === 'reports') await renderReports(content);
      else if (currentPage === 'profile') await renderProfile(content);
    }

    async function renderDashboard(container) {
      const stats = await apiCall('GET', '/api/stats');
      const total = stats?.total || 0;
      const males = stats?.males || 0;
      const females = stats?.females || 0;
      const thisMonth = stats?.thisMonth || 0;
      const recent = stats?.recent || [];
      const byArea = stats?.byArea || [];
      
      container.innerHTML = `
        <div class="animate-fade-in-up">
          <div style="margin-bottom: 32px;">
            <h1 style="font-size: 32px; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Dashboard</h1>
            <p style="color: var(--gray-500); margin-top: 8px;">Welcome back, ${currentUser?.name?.split(' ')[0] || 'User'}! Here's what's happening with your members today.</p>
          </div>
          
          <div class="stat-grid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px;">
            ${[
              { label: 'Total Members', value: total, icon: 'fa-users', color: '#4f46e5' },
              { label: 'Male Members', value: males, icon: 'fa-mars', color: '#3b82f6' },
              { label: 'Female Members', value: females, icon: 'fa-venus', color: '#ec4899' },
              { label: 'New This Month', value: thisMonth, icon: 'fa-calendar-plus', color: '#10b981' }
            ].map(stat => `
              <div class="stat-card-modern">
                <div style="display: flex; justify-content: space-between; align-items: start;">
                  <div>
                    <div style="font-size: 12px; font-weight: 600; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.05em;">${stat.label}</div>
                    <div style="font-size: 36px; font-weight: 800; color: var(--gray-800); margin-top: 8px;">${stat.value}</div>
                  </div>
                  <div style="width: 48px; height: 48px; background: ${stat.color}10; border-radius: 16px; display: flex; align-items: center; justify-content: center;">
                    <i class="fas ${stat.icon}" style="color: ${stat.color}; font-size: 24px;"></i>
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
          
          <div class="dashboard-grid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px;">
            <div class="card-modern">
              <h3 style="font-size: 18px; font-weight: 600; margin-bottom: 20px;">Recent Registrations</h3>
              ${recent.length === 0 ? '<div style="text-align: center; padding: 40px; color: var(--gray-400);">No members registered yet</div>' : recent.map(m => `
                <div style="display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--gray-100);">
                  <div style="width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600;">
                    ${m.name?.charAt(0) || 'M'}
                  </div>
                  <div style="flex: 1;">
                    <div style="font-weight: 600;">${m.name || 'Unknown'}</div>
                    <div style="font-size: 12px; color: var(--gray-500);">${m.member_id || 'No ID'}</div>
                  </div>
                  <div style="font-size: 12px; color: var(--gray-400);">${formatDate(m.created_at)}</div>
                </div>
              `).join('')}
            </div>
            
            <div class="card-modern">
              <h3 style="font-size: 18px; font-weight: 600; margin-bottom: 20px;">Members by Area</h3>
              ${byArea.length === 0 ? '<div style="text-align: center; padding: 40px; color: var(--gray-400);">No data available</div>' : byArea.map(area => `
                <div style="margin-bottom: 16px;">
                  <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                    <span style="font-size: 14px; font-weight: 500;">${area.area || 'Unknown'}</span>
                    <span style="font-size: 14px; font-weight: 600; color: var(--primary);">${area.count}</span>
                  </div>
                  <div style="background: var(--gray-200); border-radius: var(--radius); height: 8px; overflow: hidden;">
                    <div style="background: linear-gradient(90deg, var(--primary), var(--primary-light)); width: ${(area.count / total) * 100}%; height: 100%; border-radius: var(--radius);"></div>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      `;
    }

    async function renderMembers(container) {
      let searchTerm = '';
      let filterArea = '';
      
      const renderMemberList = () => {
        const filtered = membersData.filter(m => 
          (m.name?.toLowerCase().includes(searchTerm.toLowerCase()) || 
           m.member_id?.toLowerCase().includes(searchTerm.toLowerCase()) ||
           m.phone?.includes(searchTerm)) &&
          (!filterArea || m.area === filterArea)
        );
        
        if (filtered.length === 0) {
          return '<div style="text-align: center; padding: 60px; color: var(--gray-400);"><i class="fas fa-users" style="font-size: 48px; margin-bottom: 16px; display: block;"></i>No members found</div>';
        }
        
        return `
          <div style="overflow-x: auto;">
            <table class="table-modern">
              <thead>
                <tr><th>Member</th><th>ID</th><th>Gender</th><th>Age</th><th>Area</th><th>Phone</th><th>Actions</th></tr>
              </thead>
              <tbody>
                ${filtered.map(m => `
                  <tr>
                    <td>
                      <div style="display: flex; align-items: center; gap: 12px;">
                        <div style="width: 36px; height: 36px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600;">
                          ${m.name?.charAt(0) || 'M'}
                        </div>
                        <div>
                          <div style="font-weight: 600;">${m.name || 'Unknown'}</div>
                          <div style="font-size: 12px; color: var(--gray-500);">${m.occupation || '—'}</div>
                        </div>
                      </div>

    async function openMemberEditModal(member, onSave) {
      const modal = document.createElement('div');
      modal.style.cssText = 'position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 10000; backdrop-filter: blur(4px);';
      
      const formData = member ? { ...member } : {
        name: '', dob: '', gender: '', phone: '', area: '', occupation: '', email: '', marital_status: '', religion: 'Muslim', nationality: 'Ugandan', nin_number: '', village: '', phone2: '', education: '', notes: '', family: []
      };
      
      modal.innerHTML = `
        <div class="card-modern" style="width: 90%; max-width: 600px; max-height: 85vh; overflow-y: auto;">
          <div style="padding: 24px; border-bottom: 1px solid var(--gray-200); display: flex; justify-content: space-between; align-items: center;">
            <h2 style="font-size: 20px; font-weight: 600;">${member ? 'Edit Member' : 'Add New Member'}</h2>
            <button class="close-modal" style="background: none; border: none; font-size: 24px; cursor: pointer;">&times;</button>
          </div>
          <div style="padding: 24px;">
            <div style="display: grid; gap: 16px;">
              <div><label style="font-weight: 500; display: block; margin-bottom: 6px;">Full Name *</label><input id="edit-name" type="text" class="form-input" value="${formData.name || ''}" style="width: 100%; padding: 10px; border: 1px solid var(--gray-200); border-radius: var(--radius);"></div>
              <div><label style="font-weight: 500; display: block; margin-bottom: 6px;">Date of Birth *</label><input id="edit-dob" type="date" class="form-input" value="${formData.dob || ''}" style="width: 100%; padding: 10px; border: 1px solid var(--gray-200); border-radius: var(--radius);"></div>
              <div><label style="font-weight: 500; display: block; margin-bottom: 6px;">Gender *</label><select id="edit-gender" class="form-input" style="width: 100%; padding: 10px; border: 1px solid var(--gray-200); border-radius: var(--radius);"><option value="Male" ${formData.gender === 'Male' ? 'selected' : ''}>Male</option><option value="Female" ${formData.gender === 'Female' ? 'selected' : ''}>Female</option></select></div>
              <div><label style="font-weight: 500; display: block; margin-bottom: 6px;">Phone Number *</label><input id="edit-phone" type="tel" class="form-input" value="${formData.phone || ''}" style="width: 100%; padding: 10px; border: 1px solid var(--gray-200); border-radius: var(--radius);"></div>
              <div><label style="font-weight: 500; display: block; margin-bottom: 6px;">Area/Centre *</label><input id="edit-area" type="text" class="form-input" value="${formData.area || ''}" style="width: 100%; padding: 10px; border: 1px solid var(--gray-200); border-radius: var(--radius);"></div>
              <div><label style="font-weight: 500; display: block; margin-bottom: 6px;">Occupation</label><input id="edit-occupation" type="text" class="form-input" value="${formData.occupation || ''}" style="width: 100%; padding: 10px; border: 1px solid var(--gray-200); border-radius: var(--radius);"></div>
              <div><label style="font-weight: 500; display: block; margin-bottom: 6px;">Email</label><input id="edit-email" type="email" class="form-input" value="${formData.email || ''}" style="width: 100%; padding: 10px; border: 1px solid var(--gray-200); border-radius: var(--radius);"></div>
            </div>
          </div>
          <div style="padding: 24px; border-top: 1px solid var(--gray-200); display: flex; gap: 12px; justify-content: flex-end;">
            <button class="cancel-modal" style="padding: 10px 20px; background: var(--gray-100); border: none; border-radius: var(--radius); cursor: pointer;">Cancel</button>
            <button id="saveMemberBtn" style="padding: 10px 20px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border: none; border-radius: var(--radius); cursor: pointer;">${member ? 'Save Changes' : 'Create Member'}</button>
          </div>
        </div>
      `;
      
      document.body.appendChild(modal);
      
      const closeModal = () => modal.remove();
      modal.querySelector('.close-modal')?.addEventListener('click', closeModal);
      modal.querySelector('.cancel-modal')?.addEventListener('click', closeModal);
      modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
      
      modal.querySelector('#saveMemberBtn')?.addEventListener('click', async () => {
        const newData = {
          name: modal.querySelector('#edit-name').value.trim(),
          dob: modal.querySelector('#edit-dob').value,
          gender: modal.querySelector('#edit-gender').value,
          phone: modal.querySelector('#edit-phone').value.trim(),
          area: modal.querySelector('#edit-area').value.trim(),
          occupation: modal.querySelector('#edit-occupation').value.trim(),
          email: modal.querySelector('#edit-email').value.trim(),
          maritalStatus: formData.maritalStatus || '',
          religion: formData.religion || 'Muslim',
          nationality: formData.nationality || 'Ugandan',
          ninNumber: formData.ninNumber || '',
          village: formData.village || '',
          phone2: formData.phone2 || '',
          education: formData.education || '',
          notes: formData.notes || '',
          family: formData.family || []
        };
        
        if (!newData.name || !newData.dob || !newData.gender || !newData.phone || !newData.area) {
          showToast('Please fill in all required fields', 'error');
          return;
        }
        
        if (member) {
          await apiCall('PUT', `/api/members/${member.id}`, newData);
          showToast('Member updated successfully');
        } else {
          await apiCall('POST', '/api/members', newData);
          showToast('Member created successfully');
        }
        
        await loadMembers();
        closeModal();
        if (onSave) onSave();
      });
    }

      document.getElementById('loginBtn')?.addEventListener('click', async () => {
        const username = document.getElementById('loginUsername').value;
        const password = document.getElementById('loginPassword').value;
        const success = await login(username, password);
        if (success) {
          renderApp();
        } else {
          const errorDiv = document.getElementById('loginError');
          errorDiv.textContent = 'Invalid username or password';
          errorDiv.style.display = 'block';
        }
      });
      
      document.getElementById('loginPassword')?.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('loginBtn').click();
      });
    }

    // Initialize
    renderApp();
  </script>
</body>
</html>
