// ─── STAFF (with API) ────────────────────────────────────
async function renderStaff() {
  const canManage = State.user.role === 'superadmin' || hasPerm(State.user,'staff_rw');
  const staff = State.data.staff || [];

  const div = el('div');
  const header = el('div',{class:'page-header'});
  header.innerHTML = `
    <div>
      <h1 style="font-size:20px;font-weight:800">Staff Profiles</h1>
      <p style="color:var(--text-sub);font-size:13px;margin-top:3px">${staff.length} staff account${staff.length!==1?'s':''}</p>
    </div>
  `;
  if (canManage) {
    const addBtn = el('button',{class:'btn-primary'},'+ Create Profile');
    addBtn.addEventListener('click',()=>openStaffForm(null));
    header.appendChild(addBtn);
  }
  div.appendChild(header);

  const grid = el('div',{style:'display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px'});
  staff.forEach(s=>{
    const role = ROLES[s.role];
    const isSelf = s.id === State.user.id;
    const card = el('div',{class:'card'});
    card.innerHTML = `
      <div style="display:flex;align-items:flex-start;gap:14px;margin-bottom:14px">
        <div class="avatar" style="width:52px;height:52px;background:${avatarColor(s.name)};font-size:18px;flex-shrink:0">${s.avatar?`<img src="${s.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:initials(s.name)}</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:14px;display:flex;align-items:center;gap:6px">
            ${escapeHtml(s.name)} ${isSelf?`<span style="font-size:10px;background:rgba(91,107,245,.15);color:var(--accent);padding:1px 7px;border-radius:10px">You</span>`:''}
          </div>
          <div style="font-size:12px;color:var(--text-muted)">@${escapeHtml(s.username)}</div>
          <div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap">
            <span class="role-badge" style="background:${role?.color}18;color:${role?.color}">${role?.label||s.role}</span>
            <span class="badge" style="background:${s.active!==false?'rgba(16,185,129,.12)':'rgba(239,68,68,.12)'};color:${s.active!==false?'var(--success)':'var(--danger)'}">
              ${s.active!==false?'Active':'Inactive'}
            </span>
          </div>
        </div>
      </div>
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:14px">
        ${s.email?`<div>📧 ${escapeHtml(s.email)}</div>`:''}
        ${s.phone?`<div>📞 ${escapeHtml(s.phone)}</div>`:''}
        ${s.staff_id?`<div>🪪 ${escapeHtml(s.staff_id)}</div>`:''}
      </div>
      ${canManage&&!isSelf?`
        <div style="display:flex;gap:8px">
          <button class="btn-secondary btn-sm edit-staff-btn" data-sid="${s.id}" style="flex:1;justify-content:center">✏️ Edit</button>
          <button class="btn-secondary btn-sm toggle-staff-btn" data-sid="${s.id}" style="padding:6px 10px">${s.active!==false?'🚫':'✅'}</button>
          ${s.role!=='superadmin'?`<button class="btn-icon del-staff-btn" data-sid="${s.id}" style="color:var(--danger)">🗑</button>`:''}
        </div>
      `:''}
    `;
    grid.appendChild(card);
  });
  div.appendChild(grid);

  requestAnimationFrame(()=>{
    div.querySelectorAll('.edit-staff-btn').forEach(b=>{
      b.addEventListener('click',()=>{ const s=State.data.staff.find(x=>x.id == b.dataset.sid); if(s) openStaffForm(s); });
    });
    div.querySelectorAll('.toggle-staff-btn').forEach(b=>{
      b.addEventListener('click',async ()=>{
        const s=State.data.staff.find(x=>x.id == b.dataset.sid); if(!s) return;
        await saveStaff({...s, active: !s.active}, true);
        await loadStaff();
        showToast(`Profile ${s.active!==false?'deactivated':'activated'}.`);
        renderSection();
      });
    });
    div.querySelectorAll('.del-staff-btn').forEach(b=>{
      b.addEventListener('click',async ()=>{
        const s=State.data.staff.find(x=>x.id == b.dataset.sid); if(!s) return;
        openConfirm(`Delete profile for "${s.name}"? This cannot be undone.`, async ()=>{
          await deleteStaff(s.id);
          await loadStaff();
          showToast('Profile deleted.','danger');
          renderSection();
        });
      });
    });
  });

  return div;
}

function openStaffForm(staff) {
  let form = {
    name:staff?.name||'', username:staff?.username||'', password:staff?.password||'',
    email:staff?.email||'', phone:staff?.phone||'', role:staff?.role||'staff',
    active:staff?.active!==false, permissions:staff?.permissions||[], avatar:staff?.avatar||null,
  };

  const overlay = el('div',{class:'overlay'});
  const modal = el('div',{class:'modal'});

  const buildContent = () => {
    return `
      <div style="text-align:center;margin-bottom:20px">
        <div class="avatar" id="sf-ava" style="width:68px;height:68px;background:${avatarColor(form.name||'?')};font-size:24px;margin:0 auto;cursor:pointer;border:3px solid var(--border)">
          ${form.avatar?`<img src="${form.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:initials(form.name||'?')}
        </div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:6px">Click avatar to change photo</div>
        <input id="sf-photo-inp" type="file" accept="image/*" style="display:none"/>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Full Name *</label><input id="sf-name" value="${escapeHtml(form.name)}" placeholder="Full name"/></div>
        <div class="form-group"><label class="form-label">Username *</label><input id="sf-user" value="${escapeHtml(form.username)}" placeholder="Login username"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Password *</label><input id="sf-pass" type="password" value="${escapeHtml(form.password)}" placeholder="Set password"/></div>
        <div class="form-group"><label class="form-label">Role *</label>
          <select id="sf-role">
            ${Object.entries(ROLES).filter(([k])=>k!=='superadmin').map(([k,v])=>`<option value="${k}" ${form.role===k?'selected':''}>${v.label}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Email</label><input id="sf-email" type="email" value="${escapeHtml(form.email)}" placeholder="Email address"/></div>
        <div class="form-group"><label class="form-label">Phone</label><input id="sf-phone" value="${escapeHtml(form.phone)}" placeholder="+256…"/></div>
      </div>
      <div class="form-group">
        <label class="form-label">Extra Permissions</label>
        <div class="perm-grid">
          ${ALL_PERMISSIONS.map(p=>`
            <div class="perm-item ${form.permissions.includes(p)?'active':''}" data-perm="${p}">
              <div class="perm-check">${form.permissions.includes(p)?'✓':''}</div>
              <span>${PERM_LABELS[p]}</span>
            </div>
          `).join('')}
        </div>
      </div>
      <div style="margin-top:14px">
        <label class="toggle-wrap">
          <div class="toggle ${form.active?'on':''}" id="sf-active-tog"></div>
          <span style="font-size:13px">Account is Active</span>
        </label>
      </div>
    `;
  };

  modal.innerHTML = `
    <div class="modal-header">
      <div style="font-weight:700;font-size:16px">${staff?'Edit Staff Profile':'Create Staff Profile'}</div>
      <button class="btn-icon close-modal" style="font-size:20px">✕</button>
    </div>
    <div class="modal-body" id="sf-content">${buildContent()}</div>
    <div class="modal-footer">
      <button class="btn-secondary close-modal">Cancel</button>
      <button class="btn-primary" id="sf-save">${staff?'Save Changes':'Create Profile'}</button>
    </div>
  `;
  overlay.appendChild(modal);
  document.body.appendChild(overlay);

  const wireStaffForm = () => {
    $('sf-ava')?.addEventListener('click',()=>$('sf-photo-inp')?.click());
    $('sf-photo-inp')?.addEventListener('change',e=>{
      const file=e.target.files[0]; if(!file) return;
      const r=new FileReader(); r.onload=ev=>{ form.avatar=ev.target.result; rebuildStaffForm(); }; r.readAsDataURL(file);
    });
    const sv = id=>$(id)?.value||'';
    const syncSF = ()=>{ form.name=sv('sf-name'); form.username=sv('sf-user'); form.password=sv('sf-pass'); form.email=sv('sf-email'); form.phone=sv('sf-phone'); form.role=sv('sf-role')||form.role; };
    ['sf-name','sf-user','sf-pass','sf-email','sf-phone'].forEach(id=>$(id)?.addEventListener('input',()=>{ syncSF(); }));
    $('sf-role')?.addEventListener('change',()=>{ form.role=$('sf-role').value; });
    $('sf-active-tog')?.addEventListener('click',()=>{ form.active=!form.active; $('sf-active-tog').classList.toggle('on',form.active); });
    document.querySelectorAll('.perm-item[data-perm]').forEach(item=>{
      item.addEventListener('click',()=>{
        const p=item.dataset.perm;
        if(form.permissions.includes(p)) form.permissions=form.permissions.filter(x=>x!==p);
        else form.permissions.push(p);
        item.classList.toggle('active',form.permissions.includes(p));
        item.querySelector('.perm-check').textContent=form.permissions.includes(p)?'✓':'';
      });
    });
  };

  const rebuildStaffForm = () => {
    $('sf-content').innerHTML = buildContent();
    wireStaffForm();
  };

  wireStaffForm();

  overlay.querySelectorAll('.close-modal').forEach(b=>b.addEventListener('click',()=>overlay.remove()));
  overlay.addEventListener('click',e=>{ if(e.target===overlay) overlay.remove(); });

  $('sf-save').addEventListener('click',async ()=>{
    form.name=($('sf-name')?.value||'').trim();
    form.username=($('sf-user')?.value||'').trim();
    form.password=$('sf-pass')?.value||'';
    form.email=$('sf-email')?.value||'';
    form.phone=$('sf-phone')?.value||'';
    form.role=$('sf-role')?.value||form.role;
    if(!form.name||!form.username||!form.password){ showToast('Name, username and password are required.','danger'); return; }
    const dup = State.data.staff.find(s=>s.username===form.username&&s.id!==staff?.id);
    if(dup){ showToast('Username already exists.','danger'); return; }
    try {
      if(staff){
        await saveStaff({...form, id: staff.id}, true);
        showToast('Profile updated.');
      } else {
        await saveStaff(form, false);
        showToast('Profile created.');
      }
      await loadStaff();
      overlay.remove();
      renderSection();
    } catch (err) {
      showToast(err.message, 'danger');
    }
  });
}

// ─── REPORTS ─────────────────────────────────────────────────
async function renderReports() {
  const members = State.data.members || [];
  const total = members.length;
  const males = members.filter(m=>m.gender==='Male').length;
  const females = members.filter(m=>m.gender==='Female').length;
  const totalFam = members.reduce((s,m)=>s+(m.family||[]).length,0);
  const areaCount={}, maritalCount={}, eduCount={};
  members.forEach(m=>{
    if(m.area) areaCount[m.area]=(areaCount[m.area]||0)+1;
    if(m.marital_status) maritalCount[m.marital_status]=(maritalCount[m.marital_status]||0)+1;
    if(m.education) eduCount[m.education]=(eduCount[m.education]||0)+1;
  });
  const monthlyData = {};
  members.forEach(m=>{
    const d=new Date(m.created_at);
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    monthlyData[key]=(monthlyData[key]||0)+1;
  });
  const months = Object.entries(monthlyData).sort(([a],[b])=>a.localeCompare(b)).slice(-12);
  const maxBar = months.length>0?Math.max(...months.map(m=>m[1])):1;

  const div = el('div');
  div.innerHTML = `
    <div class="page-header"><h1 style="font-size:20px;font-weight:800">Reports & Analytics</h1></div>

    <div class="stat-grid">
      ${[['Total Members',total],['Total Family Members',totalFam],['Areas / Centres',Object.keys(areaCount).length],['Avg Family Size',total>0?(totalFam/total).toFixed(1):'0']].map(([l,v])=>`
        <div class="stat-card">
          <div style="font-size:11px;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">${l}</div>
          <div style="font-size:30px;font-weight:800">${v}</div>
        </div>
      `).join('')}
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px">
      <div class="card">
        <div style="font-weight:700;font-size:14px;margin-bottom:16px">Gender Distribution</div>
        ${[['Male',males,'var(--info)'],['Female',females,'#8B5CF6']].map(([g,c,color])=>`
          <div style="margin-bottom:14px">
            <div style="display:flex;justify-content:space-between;margin-bottom:5px">
              <span style="font-size:13px">${g}</span>
              <span style="font-size:13px;font-weight:700;color:${color}">${c} (${total>0?Math.round(c/total*100):0}%)</span>
            </div>
            <div class="progress"><div class="progress-bar" style="width:${total>0?Math.round(c/total*100):0}%;background:${color}"></div></div>
          </div>
        `).join('')}
      </div>
      <div class="card">
        <div style="font-weight:700;font-size:14px;margin-bottom:16px">Marital Status</div>
        ${Object.entries(maritalCount).length===0
          ? '<div style="text-align:center;color:var(--text-muted);padding:20px;font-size:13px">No data yet</div>'
          : Object.entries(maritalCount).map(([k,v],i)=>{
              const colors=['var(--accent)','var(--success)','var(--warning)','var(--danger)','#8B5CF6'];
              return `
                <div style="margin-bottom:10px">
                  <div style="display:flex;justify-content:space-between;margin-bottom:4px">
                    <span style="font-size:13px">${escapeHtml(k)}</span>
                    <span style="font-size:13px;font-weight:700;color:${colors[i%colors.length]}">${v}</span>
                  </div>
                  <div class="progress"><div class="progress-bar" style="width:${total>0?Math.round(v/total*100):0}%;background:${colors[i%colors.length]}"></div></div>
                </div>
              `;
            }).join('')
        }
      </div>
    </div>

    <div class="card" style="margin-bottom:20px">
      <div style="font-weight:700;font-size:14px;margin-bottom:16px">Monthly Registrations</div>
      ${months.length===0
        ? '<div class="empty-state" style="padding:30px"><div style="font-size:28px">📊</div><div style="margin-top:8px;font-size:13px">No registration data yet</div></div>'
        : `<div class="bar-chart">
            ${months.map(([month,count])=>{
              const pct = maxBar>0?Math.round(count/maxBar*100):0;
              const [y,m]=month.split('-');
              const label = new Date(+y,+m-1).toLocaleDateString('en',{month:'short'});
              return `<div class="bar-col"><div class="bar-val">${count}</div><div class="bar" style="height:${pct}%"></div><div class="bar-label">${label}</div></div>`;
            }).join('')}
          </div>`
      }
    </div>

    <div class="card">
      <div style="font-weight:700;font-size:14px;margin-bottom:16px">Members by Area / Centre</div>
      ${Object.entries(areaCount).length===0
        ? '<div class="empty-state" style="padding:30px"><div>🗺️</div></div>'
        : Object.entries(areaCount).sort((a,b)=>b[1]-a[1]).map(([area,count],i)=>`
            <div style="display:flex;align-items:center;gap:14px;padding:9px 0;border-bottom:1px solid var(--border)">
              <div style="width:22px;height:22px;border-radius:6px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text-muted);flex-shrink:0">${i+1}</div>
              <div style="flex:1">
                <div style="font-size:13px;font-weight:600;margin-bottom:4px">${escapeHtml(area)}</div>
                <div class="progress"><div class="progress-bar" style="width:${total>0?Math.round(count/total*100):0}%;background:var(--accent)"></div></div>
              </div>
              <div style="font-size:14px;font-weight:700;color:var(--accent)">${count}</div>
            </div>
          `).join('')
      }
    </div>
  `;
  return div;
}

// ─── SETTINGS (simplified - no export/import needed for API version)
let settingsTab = 'account';

function renderSettings() {
  const user = State.user;
  const div = el('div');
  div.innerHTML = `
    <div class="page-header"><h1 style="font-size:20px;font-weight:800">Settings</h1></div>
    <div class="tab-bar">
      ${[{id:'account',label:'My Account'},{id:'about',label:'About'}].map(t=>`
        <div class="tab ${settingsTab===t.id?'active':''}" data-stab="${t.id}">${t.label}</div>
      `).join('')}
    </div>
    <div id="settings-content"></div>
  `;

  requestAnimationFrame(() => {
    div.querySelectorAll('.tab[data-stab]').forEach(t=>{
      t.addEventListener('click',()=>{ settingsTab=t.dataset.stab; renderSettingsTab($('settings-content')); });
    });
    renderSettingsTab($('settings-content'));
  });
  return div;
}

async function renderSettingsTab(container) {
  if (!container) return;
  if (settingsTab === 'account') {
    const user = State.user;
    container.innerHTML = `
      <div class="card" style="max-width:500px">
        <div style="font-weight:700;font-size:15px;margin-bottom:16px">Account Information</div>
        <div class="form-group"><label class="form-label">Full Name</label><input id="acc-name" value="${escapeHtml(user.name)}"/></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Email</label><input id="acc-email" type="email" value="${escapeHtml(user.email||'')}"/></div>
          <div class="form-group"><label class="form-label">Phone</label><input id="acc-phone" value="${escapeHtml(user.phone||'')}"/></div>
        </div>
        <div class="divider"></div>
        <div style="font-weight:600;font-size:14px;margin-bottom:14px">Change Password</div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">New Password</label><input id="acc-new-pass" type="password" placeholder="New password"/></div>
          <div class="form-group"><label class="form-label">Confirm Password</label><input id="acc-con-pass" type="password" placeholder="Confirm new password"/></div>
        </div>
        <button class="btn-primary" id="acc-save">Save Changes</button>
      </div>
    `;
    $('acc-save')?.addEventListener('click',async ()=>{
      const name=($('acc-name')?.value||'').trim();
      const email=$('acc-email')?.value||'';
      const phone=$('acc-phone')?.value||'';
      const newP=$('acc-new-pass')?.value||'';
      const conP=$('acc-con-pass')?.value||'';
      if(!name){ showToast('Name cannot be empty.','danger'); return; }
      if(newP && newP!==conP){ showToast("Passwords don't match.",'danger'); return; }
      await saveStaff({...user, name, email, phone, ...(newP?{password:newP}:{})}, true);
      State.user = {...State.user, name, email, phone, ...(newP?{password:newP}:{})};
      showToast('Account updated successfully.');
      render();
    });
  }

  if (settingsTab === 'about') {
    container.innerHTML = `
      <div class="card" style="max-width:500px">
        <div style="text-align:center;margin-bottom:24px">
          <div style="width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#5B6BF5,#8B5CF6);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:28px;font-weight:800;color:#fff">B</div>
          <div style="font-size:18px;font-weight:800">${APP.orgFull}</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:4px">Member Management System v${APP.version}</div>
          <div style="display:flex;align-items:center;justify-content:center;gap:4px;margin-top:10px">
            ${['#000','#FCDC5F','#CC0001'].map(c=>`<div style="width:22px;height:5px;background:${c};border-radius:2px"></div>`).join('')}
            <span style="font-size:11px;color:var(--text-muted);margin-left:8px">Republic of Uganda</span>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          ${[['Members Registered',State.data.members.length],['Staff Accounts',State.data.staff.length],['System Version',APP.version],['Backend','PostgreSQL on Render']].map(([k,v])=>`
            <div class="card-sm">
              <div style="font-size:11px;color:var(--text-muted)">${k}</div>
              <div style="font-weight:700;font-size:16px;margin-top:4px">${v}</div>
            </div>
          `).join('')}
        </div>
        <div style="margin-top:16px;padding:14px;background:var(--surface2);border-radius:var(--radius);font-size:12px;color:var(--text-muted);text-align:center;line-height:1.8">
          Developed for the Republic of Uganda<br/>BMMU Government Collaboration · All rights reserved<br/>Data stored securely in PostgreSQL on Render.com
        </div>
      </div>
    `;
  }
}

// ─── CONFIRM MODAL ────────────────────────────────────────────
function openConfirm(message, onConfirm) {
  const overlay = el('div',{class:'overlay'});
  const modal = el('div',{class:'modal modal-sm'});
  modal.innerHTML = `
    <div class="modal-header">
      <div style="font-weight:700;font-size:15px">Confirm Action</div>
      <button class="btn-icon close-confirm" style="font-size:20px">✕</button>
    </div>
    <div class="modal-body">
      <p style="font-size:14px;line-height:1.7;color:var(--text)">${escapeHtml(message)}</p>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary close-confirm">Cancel</button>
      <button class="btn-danger" id="conf-ok">Confirm</button>
    </div>
  `;
  overlay.appendChild(modal);
  document.body.appendChild(overlay);
  overlay.querySelectorAll('.close-confirm').forEach(b=>b.addEventListener('click',()=>overlay.remove()));
  overlay.addEventListener('click',e=>{ if(e.target===overlay) overlay.remove(); });
  $('conf-ok').addEventListener('click',()=>{ overlay.remove(); onConfirm(); });
}

// ─── UTILS ───────────────────────────────────────────────────
function escapeHtml(str) {
  if (str == null) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── INIT ─────────────────────────────────────────────────────
document.body.classList.toggle('light', State.theme === 'light');
render();
</script>
