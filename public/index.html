<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#0c0e14"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>BMMU — Buganda Muslim Mass Union</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  /* Core palette — Institutional Dark + Uganda Gold */
  --bg:#0c0e14;
  --bg2:#111318;
  --surface:#16191f;
  --surface2:#1c1f28;
  --surface3:#22263100;
  --glass:rgba(255,255,255,0.04);
  --glass2:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.12);
  --border3:rgba(255,255,255,0.18);

  /* Text */
  --text:#f0f2f9;
  --text-sub:#8892b0;
  --text-muted:#454e70;

  /* Accent — Uganda Gold */
  --gold:#e8b84b;
  --gold2:#f5d07a;
  --gold-dim:rgba(232,184,75,0.12);
  --gold-glow:rgba(232,184,75,0.25);

  /* Semantic */
  --success:#22c55e;
  --success-dim:rgba(34,197,94,0.1);
  --warning:#f59e0b;
  --warning-dim:rgba(245,158,11,0.1);
  --danger:#ef4444;
  --danger-dim:rgba(239,68,68,0.1);
  --info:#38bdf8;
  --info-dim:rgba(56,189,248,0.1);

  /* Uganda flag */
  --ug-black:#111;
  --ug-yellow:#fcdc5f;
  --ug-red:#cc0001;

  /* Layout */
  --sidebar-w:268px;
  --topbar-h:64px;
  --radius:8px;
  --radius-lg:14px;
  --radius-xl:20px;
  --radius-2xl:28px;

  /* Typography */
  --font:'DM Sans',sans-serif;
  --display:'Playfair Display',serif;
  --mono:'DM Mono',monospace;

  /* Shadows */
  --shadow-sm:0 2px 8px rgba(0,0,0,0.3);
  --shadow:0 4px 24px rgba(0,0,0,0.5);
  --shadow-lg:0 12px 48px rgba(0,0,0,0.7);
  --shadow-gold:0 0 32px rgba(232,184,75,0.15);

  /* Safe areas */
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}

body.light{
  --bg:#f4f5f9;
  --bg2:#eceef5;
  --surface:#ffffff;
  --surface2:#f8f9fc;
  --glass:rgba(0,0,0,0.02);
  --glass2:rgba(0,0,0,0.04);
  --border:rgba(0,0,0,0.08);
  --border2:rgba(0,0,0,0.12);
  --border3:rgba(0,0,0,0.2);
  --text:#0d1117;
  --text-sub:#4a5580;
  --text-muted:#9ba5c0;
  --gold:#b8860b;
  --gold2:#d4a017;
  --gold-dim:rgba(184,134,11,0.08);
  --gold-glow:rgba(184,134,11,0.2);
  --shadow-sm:0 2px 8px rgba(0,0,0,0.08);
  --shadow:0 4px 24px rgba(0,0,0,0.12);
  --shadow-lg:0 12px 48px rgba(0,0,0,0.18);
  --shadow-gold:0 0 32px rgba(184,134,11,0.1);
}

html{height:100%;overflow:hidden}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  font-size:14px;
  line-height:1.6;
  height:100%;
  overflow:hidden;
  -webkit-tap-highlight-color:transparent;
  -webkit-font-smoothing:antialiased;
}
#app{height:100%;display:flex;flex-direction:column}

/* Scrollbar */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border3)}

a{color:inherit;text-decoration:none}
input,select,textarea,button{font-family:var(--font);font-size:14px}

/* Form elements */
input,select,textarea{
  background:var(--surface2);
  border:1.5px solid var(--border2);
  border-radius:var(--radius);
  padding:11px 14px;
  color:var(--text);
  outline:none;
  width:100%;
  transition:border-color .2s,box-shadow .2s,background .2s;
}
input:focus,select:focus,textarea:focus{
  border-color:var(--gold);
  box-shadow:0 0 0 3px var(--gold-dim);
  background:var(--surface);
}
input::placeholder,textarea::placeholder{color:var(--text-muted)}
select option{background:var(--surface);color:var(--text)}

/* Buttons */
button{
  cursor:pointer;border:none;border-radius:var(--radius);
  font-weight:600;transition:all .18s;
  display:inline-flex;align-items:center;gap:7px;white-space:nowrap;
}
.btn-primary{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#0c0e14;padding:11px 22px;
  box-shadow:0 2px 16px var(--gold-glow);
  font-weight:700;letter-spacing:.01em;
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 24px var(--gold-glow)}
.btn-primary:active{transform:translateY(0);box-shadow:0 2px 8px var(--gold-dim)}
.btn-secondary{
  background:var(--surface2);color:var(--text);
  border:1.5px solid var(--border2);padding:10px 20px;
}
.btn-secondary:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}
.btn-danger{background:var(--danger);color:#fff;padding:11px 22px}
.btn-danger:hover{opacity:.88;transform:translateY(-1px)}
.btn-success{background:var(--success);color:#fff;padding:11px 22px}
.btn-ghost{background:transparent;color:var(--text-sub);padding:8px 13px;border-radius:var(--radius)}
.btn-ghost:hover{background:var(--glass2);color:var(--text)}
.btn-icon{
  background:transparent;color:var(--text-sub);
  padding:8px;border-radius:var(--radius);font-size:16px;
}
.btn-icon:hover{background:var(--glass2);color:var(--text)}
.btn-sm{padding:6px 14px;font-size:13px}
.btn-xs{padding:4px 10px;font-size:12px;border-radius:6px}

/* Cards */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:22px;
  transition:border-color .2s;
}
.card:hover{border-color:var(--border2)}
.card-sm{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.card-glass{
  background:var(--glass);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1px solid var(--border2);
  border-radius:var(--radius-lg);
  padding:22px;
}

/* Badges */
.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:20px;
  font-size:11px;font-weight:700;letter-spacing:.03em;
}

/* Tables */
table{width:100%;border-collapse:collapse}
th{
  text-align:left;font-size:11px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;
  color:var(--text-muted);padding:10px 16px;
  border-bottom:1px solid var(--border);
  background:var(--surface2);
}
th:first-child{border-radius:var(--radius) 0 0 var(--radius)}
th:last-child{border-radius:0 var(--radius) var(--radius) 0}
td{padding:13px 16px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--glass)}

/* Modal / Overlay */
.overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.8);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  z-index:1000;display:flex;align-items:center;justify-content:center;
  padding:16px;animation:fadeIn .15s;
}
.modal{
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:var(--radius-xl);
  width:100%;max-width:660px;
  max-height:92vh;overflow-y:auto;
  box-shadow:var(--shadow-lg);
  animation:slideUp .22s cubic-bezier(.4,0,.2,1);
}
.modal-lg{max-width:860px}
.modal-sm{max-width:420px}
.modal-header{
  padding:24px 28px 20px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;justify-content:space-between;
  position:sticky;top:0;background:var(--surface);z-index:5;
  border-radius:var(--radius-xl) var(--radius-xl) 0 0;
}
.modal-body{padding:28px}
.modal-footer{
  padding:20px 28px;border-top:1px solid var(--border);
  display:flex;justify-content:flex-end;gap:10px;
  background:var(--surface);position:sticky;bottom:0;
  border-radius:0 0 var(--radius-xl) var(--radius-xl);
}

/* Form */
.form-group{margin-bottom:20px}
.form-label{
  display:block;font-size:11px;font-weight:700;
  letter-spacing:.07em;color:var(--text-sub);
  margin-bottom:7px;text-transform:uppercase;
}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* SIDEBAR */
.shell{display:flex;height:100%;overflow:hidden}
.sidebar{
  width:var(--sidebar-w);
  background:var(--bg2);
  border-right:1px solid var(--border);
  height:100%;display:flex;flex-direction:column;
  flex-shrink:0;
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  overflow:hidden;
}

/* Sidebar brand */
.sidebar-brand{
  padding:24px 20px 20px;
  border-bottom:1px solid var(--border);
}
.brand-logo{
  display:flex;align-items:center;gap:13px;
  margin-bottom:4px;
}
.brand-emblem{
  width:44px;height:44px;border-radius:12px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--display);font-size:22px;font-weight:900;
  color:#0c0e14;flex-shrink:0;
  box-shadow:var(--shadow-gold);
}
.brand-name{
  font-family:var(--display);
  font-size:19px;font-weight:900;
  color:var(--text);letter-spacing:-.02em;
}
.brand-sub{
  font-size:10.5px;color:var(--text-muted);
  letter-spacing:.04em;margin-top:2px;
}
.ug-flag-bar{
  display:flex;height:3px;border-radius:2px;
  overflow:hidden;margin-top:14px;gap:1px;
}
.ug-flag-bar span{flex:1}

/* Sidebar nav */
.sidebar-nav{flex:1;overflow-y:auto;padding:14px 12px}
.nav-label{
  font-size:10px;font-weight:700;letter-spacing:.13em;
  text-transform:uppercase;color:var(--text-muted);
  padding:14px 10px 6px;display:block;
}
.nav-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 12px;border-radius:10px;
  cursor:pointer;color:var(--text-sub);
  font-weight:500;transition:all .16s;
  margin-bottom:2px;font-size:13.5px;
  position:relative;
}
.nav-item:hover{background:var(--glass2);color:var(--text)}
.nav-item.active{
  background:var(--gold-dim);
  color:var(--gold);font-weight:700;
}
.nav-item.active::before{
  content:'';position:absolute;left:0;top:20%;bottom:20%;
  width:3px;border-radius:0 3px 3px 0;
  background:var(--gold);
}
.nav-icon{
  width:32px;height:32px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
  background:var(--glass);
  transition:background .16s;
}
.nav-item.active .nav-icon{background:rgba(232,184,75,0.15)}
.nav-count{
  margin-left:auto;font-size:11px;font-weight:700;
  background:var(--glass2);color:var(--text-muted);
  padding:2px 8px;border-radius:20px;
}
.nav-item.active .nav-count{background:var(--gold-dim);color:var(--gold)}

/* Sidebar user */
.sidebar-user{
  padding:16px 18px;
  border-top:1px solid var(--border);
  display:flex;align-items:center;gap:11px;
}
.user-avatar{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:14px;color:#0c0e14;flex-shrink:0;
}
.user-info-name{font-size:13px;font-weight:700;color:var(--text)}
.user-info-role{font-size:11px;color:var(--text-muted)}

/* TOPBAR */
.main-content{flex:1;display:flex;flex-direction:column;min-width:0;height:100%;overflow:hidden}
.topbar{
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  padding:0 28px;height:var(--topbar-h);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;padding-top:var(--safe-top);
  gap:16px;
}
.topbar-left{display:flex;align-items:center;gap:14px}
.topbar-title{font-size:18px;font-weight:700;color:var(--text);font-family:var(--display)}
.topbar-right{display:flex;align-items:center;gap:8px}
.mobile-menu-btn{
  display:none;background:var(--glass);
  border:1px solid var(--border2);
  padding:8px 10px;border-radius:var(--radius);
  color:var(--text-sub);font-size:17px;
}

/* Page */
.page{
  padding:28px;flex:1;overflow-y:auto;
  padding-bottom:calc(28px + var(--safe-bottom));
}
.page-header{
  margin-bottom:28px;
  display:flex;align-items:flex-start;
  justify-content:space-between;gap:16px;flex-wrap:wrap;
}
.page-title{
  font-family:var(--display);font-size:26px;
  font-weight:900;color:var(--text);letter-spacing:-.03em;
}
.page-sub{font-size:13px;color:var(--text-sub);margin-top:3px}

/* STAT CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:28px}
.stat-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:22px 20px;
  position:relative;overflow:hidden;
  transition:border-color .2s,transform .22s,box-shadow .22s;
  cursor:default;
}
.stat-card:hover{
  border-color:var(--border2);
  transform:translateY(-3px);
  box-shadow:var(--shadow);
}
.stat-card-icon{
  font-size:22px;margin-bottom:14px;
  width:44px;height:44px;border-radius:10px;
  background:var(--gold-dim);
  display:flex;align-items:center;justify-content:center;
}
.stat-card-val{
  font-size:36px;font-weight:900;
  font-family:var(--display);
  color:var(--text);letter-spacing:-.04em;line-height:1;
}
.stat-card-label{
  font-size:11px;font-weight:700;
  letter-spacing:.07em;text-transform:uppercase;
  color:var(--text-muted);margin-bottom:8px;
}
.stat-card-change{
  font-size:12px;font-weight:600;
  color:var(--success);margin-top:8px;
  display:flex;align-items:center;gap:4px;
}
.stat-card::after{
  content:'';position:absolute;
  top:-30px;right:-30px;
  width:100px;height:100px;border-radius:50%;
  background:radial-gradient(circle,var(--gold-dim),transparent 70%);
  pointer-events:none;
}

/* Avatar */
.avatar{
  border-radius:50%;
  display:inline-flex;align-items:center;justify-content:center;
  font-weight:700;color:#fff;flex-shrink:0;overflow:hidden;
  vertical-align:middle;
}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}

/* Search */
.search-wrap{position:relative}
.search-wrap input{padding-left:42px}
.search-icon{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  color:var(--text-muted);pointer-events:none;font-size:15px;
}

/* Tabs */
.tab-bar{
  display:flex;gap:2px;
  border-bottom:1px solid var(--border);
  margin-bottom:24px;
}
.tab{
  padding:11px 20px;cursor:pointer;
  font-weight:500;color:var(--text-sub);
  transition:all .16s;
  border-bottom:2.5px solid transparent;
  font-size:13px;margin-bottom:-1px;
}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:700}
.tab:hover:not(.active){color:var(--text)}

/* Empty state */
.empty-state{
  text-align:center;padding:72px 20px;
  color:var(--text-muted);
}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.3}
.empty-title{font-size:16px;font-weight:700;color:var(--text-sub);margin-bottom:6px}

/* Alerts */
.alert{
  padding:13px 17px;border-radius:var(--radius);
  display:flex;align-items:center;gap:11px;
  font-size:13px;font-weight:500;
}
.alert-success{background:var(--success-dim);color:var(--success);border:1px solid rgba(34,197,94,.2)}
.alert-danger{background:var(--danger-dim);color:var(--danger);border:1px solid rgba(239,68,68,.2)}
.alert-info{background:var(--info-dim);color:var(--info);border:1px solid rgba(56,189,248,.2)}
.alert-warning{background:var(--warning-dim);color:var(--warning);border:1px solid rgba(245,158,11,.2)}

/* Photo drop */
.photo-drop{
  border:2px dashed var(--border2);border-radius:var(--radius-lg);
  padding:32px;text-align:center;cursor:pointer;
  transition:all .2s;
}
.photo-drop:hover{border-color:var(--gold);background:var(--gold-dim)}

/* Divider */
.divider{border:none;border-top:1px solid var(--border);margin:22px 0}

/* Spinner */
.spinner{
  width:20px;height:20px;
  border:2.5px solid rgba(12,14,20,0.25);
  border-top-color:#0c0e14;
  border-radius:50%;animation:spin .65s linear infinite;
  display:inline-block;
}
.spinner-gold{border-color:var(--gold-dim);border-top-color:var(--gold)}

/* Toggle */
.toggle-wrap{display:flex;align-items:center;gap:10px;cursor:pointer}
.toggle{
  width:44px;height:24px;border-radius:12px;
  background:var(--border2);position:relative;
  transition:background .2s;flex-shrink:0;
}
.toggle.on{background:var(--gold)}
.toggle::after{
  content:'';position:absolute;
  width:18px;height:18px;border-radius:50%;
  background:#fff;top:3px;left:3px;
  transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.3);
}
.toggle.on::after{left:23px}

/* Permission grid */
.perm-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.perm-item{
  display:flex;align-items:center;gap:10px;
  padding:11px 13px;border-radius:var(--radius);
  border:1.5px solid var(--border);cursor:pointer;
  transition:all .16s;font-size:13px;
}
.perm-item:hover{border-color:var(--gold);background:var(--gold-dim)}
.perm-item.active{border-color:var(--gold);background:var(--gold-dim);color:var(--gold)}
.perm-check{
  width:18px;height:18px;border-radius:5px;
  border:1.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;transition:all .16s;flex-shrink:0;
}
.perm-item.active .perm-check{background:var(--gold);border-color:var(--gold);color:#0c0e14}

/* Charts */
.bar-chart{display:flex;align-items:flex-end;gap:7px;height:120px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px}
.bar{
  width:100%;border-radius:5px 5px 0 0;
  background:linear-gradient(180deg,var(--gold2),var(--gold));
  transition:height .6s cubic-bezier(.4,0,.2,1);
  min-height:4px;
}
.bar-label{font-size:9px;color:var(--text-muted);white-space:nowrap}
.bar-val{font-size:10px;color:var(--text-sub);font-weight:700}
.progress{height:7px;background:var(--surface2);border-radius:4px;overflow:hidden}
.progress-bar{
  height:100%;border-radius:4px;
  background:linear-gradient(90deg,var(--gold),var(--gold2));
  transition:width .8s cubic-bezier(.4,0,.2,1);
}

/* Role badge */
.role-badge{
  display:inline-flex;align-items:center;
  padding:3px 10px;border-radius:20px;
  font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.05em;
}

/* Toast */
.toast{
  position:fixed;
  bottom:calc(28px + var(--safe-bottom));right:28px;
  z-index:9999;max-width:360px;
  animation:slideUp .22s;
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-lg);
  border:1px solid var(--border2);
}

/* Info row */
.info-row{display:flex;gap:14px;margin-bottom:13px;align-items:flex-start}
.info-row .ir-icon{font-size:16px;margin-top:2px;flex-shrink:0;width:22px;text-align:center;opacity:.7}
.info-row .ir-body .ir-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.07em;font-weight:700}
.info-row .ir-body .ir-val{font-size:13.5px;font-weight:500;margin-top:2px}
.section-title{
  font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.09em;color:var(--text-muted);
  margin-bottom:14px;padding-bottom:10px;
  border-bottom:1px solid var(--border);
}

/* ID CARD */
.id-card{
  background:linear-gradient(135deg,#0a0c1a 0%,#141936 50%,#0a0c1a 100%);
  border:2px solid rgba(232,184,75,0.45);
  border-radius:20px;color:#fff;
  position:relative;overflow:hidden;
  width:350px;
  box-shadow:0 10px 48px rgba(0,0,0,.7),0 0 0 1px rgba(232,184,75,0.15),var(--shadow-gold);
}
.id-card::before{
  content:'';position:absolute;top:-80px;right:-80px;
  width:220px;height:220px;border-radius:50%;
  background:radial-gradient(circle,rgba(232,184,75,0.12),transparent 70%);
}
.id-card::after{
  content:'';position:absolute;bottom:-60px;left:-60px;
  width:180px;height:180px;border-radius:50%;
  background:radial-gradient(circle,rgba(56,189,248,0.06),transparent 70%);
}

/* Sidebar overlay (mobile) */
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:199;display:none}
.sidebar-overlay.show{display:block}

/* Section quick filter */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

/* LOGIN */
.login-screen{
  min-height:100vh;display:flex;align-items:stretch;
  background:var(--bg);
}
.login-left{
  flex:0 0 420px;background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  padding:40px;position:relative;overflow:hidden;
}
.login-brand{margin-bottom:auto}
.login-art{
  position:absolute;bottom:0;left:0;right:0;
  padding:32px;
}
.login-quote{
  font-family:var(--display);
  font-size:22px;line-height:1.4;
  color:var(--text);font-weight:700;
  margin-bottom:12px;
}
.login-quote span{color:var(--gold)}
.login-right{
  flex:1;display:flex;align-items:center;
  justify-content:center;padding:40px;
}
.login-card{
  width:100%;max-width:400px;
}
.login-title{
  font-family:var(--display);
  font-size:28px;font-weight:900;
  color:var(--text);margin-bottom:6px;letter-spacing:-.02em;
}
.login-sub{font-size:13.5px;color:var(--text-sub);margin-bottom:32px}

/* Method buttons */
.method-btn{
  width:100%;padding:16px 18px;
  background:var(--surface);
  border:1.5px solid var(--border2);
  border-radius:var(--radius-lg);
  display:flex;align-items:center;gap:14px;
  cursor:pointer;transition:all .2s;
  font-family:var(--font);
  text-align:left;
}
.method-btn:hover{border-color:var(--gold);background:var(--gold-dim);transform:translateY(-1px)}
.method-btn-icon{
  width:44px;height:44px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;
  background:var(--glass2);
}
.method-btn-label{font-size:14px;font-weight:700;color:var(--text)}
.method-btn-hint{font-size:11px;color:var(--text-muted);margin-top:2px}

/* OR divider */
.or-divider{
  display:flex;align-items:center;gap:12px;
  margin:18px 0;color:var(--text-muted);font-size:12px;
}
.or-divider::before,.or-divider::after{
  content:'';flex:1;height:1px;background:var(--border);
}

/* Dashboard recent activity */
.activity-item{
  display:flex;align-items:center;gap:13px;
  padding:12px 0;border-bottom:1px solid var(--border);
}
.activity-item:last-child{border-bottom:none}
.activity-dot{
  width:8px;height:8px;border-radius:50%;
  flex-shrink:0;background:var(--gold);
}

/* MOBILE */
@media(max-width:860px){
  .sidebar{position:fixed;top:0;left:0;height:100%;z-index:200;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0);box-shadow:var(--shadow-lg)}
  .main-content{width:100%}
  .mobile-menu-btn{display:flex}
  .stat-grid{grid-template-columns:1fr 1fr}
  .form-row,.form-row-3{grid-template-columns:1fr}
  .page{padding:18px;padding-bottom:calc(18px + var(--safe-bottom))}
  .topbar{padding:0 18px;padding-top:var(--safe-top)}
  .login-left{display:none}
  .login-right{padding:24px}
}
@media(max-width:520px){
  .stat-grid{grid-template-columns:1fr 1fr}
  .modal{border-radius:var(--radius-xl) var(--radius-xl) 0 0;max-height:95vh;position:fixed;bottom:0;left:0;right:0;max-width:100%}
  .overlay{align-items:flex-end;padding:0}
  .page-title{font-size:22px}
}

/* Animations */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes glow{0%,100%{box-shadow:var(--shadow-gold)}50%{box-shadow:0 0 48px rgba(232,184,75,0.35)}}

/* Skeleton loader */
.skeleton{
  background:linear-gradient(90deg,var(--surface2) 25%,var(--glass2) 50%,var(--surface2) 75%);
  background-size:200% 100%;
  animation:shimmer 1.5s infinite;
  border-radius:var(--radius);
}

/* Print */
@media print{
  #id-print-area,#id-print-area *{visibility:visible}
  #id-print-area{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#fff}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
'use strict';

// ─── APP CONSTANTS ─────────────────────────────────────────────
const APP = {
  version: '3.0.0',
  org: 'BMMU',
  orgFull: 'Buganda Muslim Mass Union',
  orgTagline: 'Serving the community with unity and faith'
};

const AREAS = ['Kampala Central','Kawempe','Makindye','Lubaga','Nakawa','Wakiso','Mukono','Jinja','Entebbe','Gulu','Mbarara','Fort Portal','Masaka','Mbale','Soroti','Arua'];
const EDUCATION_LEVELS = ['Primary','Secondary (O-Level)','Secondary (A-Level)','Certificate','Diploma',"Bachelor's Degree","Master's Degree",'Doctorate','No Formal Education'];
const PERMISSIONS = ['view_members','add_members','edit_members','delete_members','view_reports','manage_staff','manage_settings'];

// ─── STATE ─────────────────────────────────────────────────────
const State = {
  page: 'login', // 'login' | 'app'
  section: 'dashboard',
  theme: localStorage.getItem('bmmu_theme') || 'dark',
  user: null,
  data: { members: [], staff: [] },
};

// ─── HELPERS ───────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const el = (tag, attrs={}) => {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
};
const escapeHtml = s => {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
};
const fmtDate = v => {
  if (!v) return '—';
  try {
    const d = new Date(v);
    return d.toLocaleDateString('en-UG',{day:'numeric',month:'short',year:'numeric'});
  } catch { return v; }
};
const fmtAge = dob => {
  if (!dob) return '—';
  const diff = Date.now() - new Date(dob);
  return Math.floor(diff / (365.25*24*3600*1000)) + ' yrs';
};
const initials = name => {
  if (!name) return '?';
  const p = name.trim().split(/\s+/);
  return (p[0][0] + (p[1]?.[0]||'')).toUpperCase();
};
const avatarColor = name => {
  const colors = [
    'linear-gradient(135deg,#e8b84b,#f5d07a)',
    'linear-gradient(135deg,#22c55e,#4ade80)',
    'linear-gradient(135deg,#38bdf8,#7dd3fc)',
    'linear-gradient(135deg,#a78bfa,#c4b5fd)',
    'linear-gradient(135deg,#f43f5e,#fb7185)',
    'linear-gradient(135deg,#fb923c,#fbbf24)',
  ];
  let h = 0;
  for (const c of (name||'')) h = c.charCodeAt(0) + ((h<<5)-h);
  return colors[Math.abs(h) % colors.length];
};

// ─── STORAGE / SESSION ──────────────────────────────────────────
const SESSION_KEY = 'bmmu_session_v3';
function saveSession() {
  if (!State.user) return;
  localStorage.setItem(SESSION_KEY, JSON.stringify({ user: State.user, theme: State.theme }));
}
function loadSession() {
  try {
    const s = JSON.parse(localStorage.getItem(SESSION_KEY));
    if (s?.user) { State.user = s.user; State.theme = s.theme || 'dark'; return true; }
  } catch {}
  return false;
}
function clearSession() { localStorage.removeItem(SESSION_KEY); }

// ─── API ────────────────────────────────────────────────────────
async function apiCall(method, path, body=null) {
  const opts = {
    method, headers:{'Content-Type':'application/json'},
    credentials:'include',
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || data.message || `HTTP ${res.status}`);
  return data;
}
async function login(username, password) { return apiCall('POST', '/api/login', {username, password}); }
async function logout() { try { await apiCall('POST', '/api/logout'); } catch {} }
async function loadMembers() { State.data.members = await apiCall('GET', '/api/members'); }
async function loadStaff() { State.data.staff = await apiCall('GET', '/api/staff'); }
async function saveMember(m) {
  if (m.id) return apiCall('PUT', `/api/members/${m.id}`, m);
  return apiCall('POST', '/api/members', m);
}
async function deleteMember(id) { return apiCall('DELETE', `/api/members/${id}`); }
async function saveStaff(s, isSelf=false) {
  if (s.id) return apiCall('PUT', `/api/staff/${s.id}`, s);
  return apiCall('POST', '/api/staff', s);
}
async function deleteStaff(id) { return apiCall('DELETE', `/api/staff/${id}`); }

// ─── TOAST ──────────────────────────────────────────────────────
function showToast(msg, type='success', dur=3500) {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const colors = {
    success: {bg:'var(--success)',icon:'✓'},
    danger:  {bg:'var(--danger)',icon:'✕'},
    warning: {bg:'var(--warning)',icon:'⚠'},
    info:    {bg:'var(--info)',icon:'ℹ'},
  };
  const c = colors[type] || colors.success;
  const t = el('div',{class:'toast'});
  t.innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--surface);border-radius:var(--radius-lg)">
      <div style="width:28px;height:28px;border-radius:50%;background:${c.bg};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#fff;flex-shrink:0">${c.icon}</div>
      <span style="font-size:13.5px;font-weight:500;color:var(--text)">${escapeHtml(msg)}</span>
    </div>`;
  document.body.appendChild(t);
  setTimeout(() => { t.style.animation='none';t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300); }, dur);
}

// ─── CONFIRM ────────────────────────────────────────────────────
function openConfirm(msg, onConfirm) {
  const overlay = el('div',{class:'overlay'});
  overlay.innerHTML = `
    <div class="modal modal-sm">
      <div class="modal-header">
        <div>
          <div style="font-size:15px;font-weight:800">Confirm Action</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:2px">This cannot be undone</div>
        </div>
        <button class="btn-icon close-c" style="font-size:20px">✕</button>
      </div>
      <div class="modal-body"><p style="font-size:14px;line-height:1.7;color:var(--text-sub)">${escapeHtml(msg)}</p></div>
      <div class="modal-footer">
        <button class="btn-secondary close-c">Cancel</button>
        <button class="btn-danger" id="conf-ok">Confirm Delete</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelectorAll('.close-c').forEach(b => b.addEventListener('click', () => overlay.remove()));
  overlay.addEventListener('click', e => { if(e.target===overlay) overlay.remove(); });
  $('conf-ok').addEventListener('click', () => { overlay.remove(); onConfirm(); });
}

// ─── MAIN RENDER ────────────────────────────────────────────────
function render() {
  document.body.classList.toggle('light', State.theme === 'light');
  const app = $('app');
  app.innerHTML = '';
  if (State.page === 'login') {
    app.appendChild(renderLogin());
  } else {
    app.appendChild(renderApp());
  }
}

// ─── LOGIN ──────────────────────────────────────────────────────
function renderLogin() {
  let mode = 'choose', otpMethod = '', otpStaffId = null, otpMasked = '';
  let loading = false;

  const wrap = el('div',{style:'height:100%;display:flex;flex-direction:column'});
  const screen = el('div',{class:'login-screen',style:'flex:1'});

  // Left decorative panel
  const left = el('div',{class:'login-left'});
  left.innerHTML = `
    <div class="login-brand">
      <div class="brand-emblem" style="width:52px;height:52px;border-radius:14px;font-size:26px">B</div>
      <div style="margin-top:14px;font-family:var(--display);font-size:22px;font-weight:900;color:var(--text)">BMMU</div>
      <div style="font-size:11px;color:var(--text-muted);margin-top:4px;letter-spacing:.04em">${APP.orgFull}</div>
      <div class="ug-flag-bar" style="margin-top:18px">
        <span style="background:#111"></span>
        <span style="background:#fcdc5f"></span>
        <span style="background:#cc0001"></span>
        <span style="background:#111"></span>
        <span style="background:#fcdc5f"></span>
        <span style="background:#cc0001"></span>
      </div>
    </div>
    <div class="login-art">
      <div class="login-quote">Building a <span>stronger</span> community through unity and faith.</div>
      <div style="font-size:12px;color:var(--text-muted)">Member Management System — Republic of Uganda</div>
      <div style="display:flex;gap:24px;margin-top:24px">
        ${[['👥','Members'],['🕌','Centres'],['📊','Reports']].map(([i,l])=>`
          <div style="text-align:center">
            <div style="font-size:24px;margin-bottom:4px">${i}</div>
            <div style="font-size:10px;color:var(--text-muted);font-weight:700;letter-spacing:.05em;text-transform:uppercase">${l}</div>
          </div>
        `).join('')}
      </div>
    </div>`;

  // Right form panel
  const right = el('div',{class:'login-right'});
  const card = el('div',{class:'login-card'});

  function renderCard() {
    card.innerHTML = '';

    if (mode === 'choose') {
      card.innerHTML = `
        <div class="login-title">Welcome back</div>
        <div class="login-sub">Sign in to manage your members</div>
        <div id="login-err" class="alert alert-danger" style="display:none;margin-bottom:18px"></div>
        <div style="display:flex;flex-direction:column;gap:10px">
          <button class="method-btn" id="btn-email-otp">
            <div class="method-btn-icon">📧</div>
            <div><div class="method-btn-label">Email OTP</div><div class="method-btn-hint">Receive a code on your email</div></div>
          </button>
          <button class="method-btn" id="btn-phone-otp">
            <div class="method-btn-icon">📱</div>
            <div><div class="method-btn-label">Phone OTP</div><div class="method-btn-hint">Receive a code via SMS</div></div>
          </button>
        </div>
        <div class="or-divider">or</div>
        <button id="btn-password" class="btn-ghost" style="width:100%;padding:12px;font-size:13.5px;justify-content:center;border:1.5px solid var(--border);border-radius:var(--radius)">
          🔑 Admin Password Login
        </button>
        <div style="margin-top:28px;text-align:center;font-size:11.5px;color:var(--text-muted)">
          © ${new Date().getFullYear()} ${APP.orgFull}
        </div>`;
      requestAnimationFrame(() => {
        $('btn-email-otp')?.addEventListener('click',()=>{ otpMethod='email'; mode='otp-input'; renderCard(); });
        $('btn-phone-otp')?.addEventListener('click',()=>{ otpMethod='phone'; mode='otp-input'; renderCard(); });
        $('btn-password')?.addEventListener('click',()=>{ mode='password'; renderCard(); });
      });
    } else if (mode === 'password') {
      card.innerHTML = `
        <button id="back-btn" style="background:none;border:none;color:var(--text-sub);cursor:pointer;font-size:13px;padding:0;margin-bottom:22px;display:flex;align-items:center;gap:6px;font-weight:600">← Back</button>
        <div class="login-title">Admin Sign In</div>
        <div class="login-sub">Enter your credentials to continue</div>
        <div id="login-err" class="alert alert-danger" style="display:none;margin-bottom:18px"></div>
        <div class="form-group"><label class="form-label">Username</label><input id="l-user" placeholder="Enter username" autocomplete="username"/></div>
        <div class="form-group" style="position:relative">
          <label class="form-label">Password</label>
          <input id="l-pass" type="password" placeholder="Enter password" autocomplete="current-password" style="padding-right:50px"/>
          <button id="l-eye" type="button" style="position:absolute;right:12px;top:34px;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:17px;padding:4px">👁</button>
        </div>
        <button id="l-btn" class="btn-primary" style="width:100%;padding:14px;font-size:15px;justify-content:center;margin-top:6px">
          Sign In
        </button>`;
      requestAnimationFrame(() => {
        $('back-btn')?.addEventListener('click',()=>{ mode='choose'; renderCard(); });
        const errEl = $('login-err');
        const doLogin = async () => {
          if (loading) return;
          const u = $('l-user')?.value?.trim(), p = $('l-pass')?.value;
          if (!u||!p) { errEl.textContent='Please enter username and password.'; errEl.style.display='flex'; return; }
          loading = true;
          const btn = $('l-btn');
          if (btn) { btn.innerHTML='<span class="spinner"></span> Signing in…'; btn.disabled=true; }
          try {
            const user = await login(u, p);
            State.user = user; State.page = 'app'; State.section = 'dashboard';
            saveSession();
            await loadMembers(); await loadStaff();
            render();
          } catch(err) {
            if (btn) { btn.innerHTML='Sign In'; btn.disabled=false; }
            errEl.textContent = err.message||'Invalid credentials.'; errEl.style.display='flex';
          } finally { loading = false; }
        };
        $('l-btn')?.addEventListener('click', doLogin);
        $('l-pass')?.addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
        $('l-user')?.addEventListener('keydown', e=>{ if(e.key==='Enter') $('l-pass')?.focus(); });
        $('l-eye')?.addEventListener('click', () => { const i=$('l-pass'); if(!i) return; i.type=i.type==='password'?'text':'password'; $('l-eye').textContent=i.type==='password'?'👁':'🙈'; });
        $('l-user')?.focus();
      });
    } else if (mode === 'otp-input') {
      const isEmail = otpMethod === 'email';
      card.innerHTML = `
        <button id="back-btn" style="background:none;border:none;color:var(--text-sub);cursor:pointer;font-size:13px;padding:0;margin-bottom:22px;display:flex;align-items:center;gap:6px;font-weight:600">← Back</button>
        <div class="login-title">${isEmail?'📧 Email':'📱 Phone'} Login</div>
        <div class="login-sub">${isEmail?'Enter your registered email address':'Enter your registered phone number'}</div>
        <div id="login-err" class="alert alert-danger" style="display:none;margin-bottom:18px"></div>
        <div class="form-group">
          <label class="form-label">${isEmail?'Email Address':'Phone Number'}</label>
          <input id="otp-contact" type="${isEmail?'email':'tel'}" placeholder="${isEmail?'yourname@email.com':'0700123456'}"/>
        </div>
        <button id="otp-send-btn" class="btn-primary" style="width:100%;padding:14px;font-size:15px;justify-content:center">Send Code</button>`;
      requestAnimationFrame(() => {
        $('back-btn')?.addEventListener('click',()=>{ mode='choose'; renderCard(); });
        const errEl = $('login-err');
        const sendOtp = async () => {
          if (loading) return;
          const value = $('otp-contact')?.value?.trim();
          if (!value) { errEl.textContent=`Please enter your ${isEmail?'email':'phone number'}.`; errEl.style.display='flex'; return; }
          loading = true;
          const btn = $('otp-send-btn');
          if (btn) { btn.innerHTML='<span class="spinner"></span> Sending…'; btn.disabled=true; }
          try {
            const res = await apiCall('POST','/api/otp/request',{value,method:otpMethod});
            otpStaffId = res.staffId; otpMasked = res.masked; mode='otp-verify'; renderCard();
          } catch(err) {
            if (btn) { btn.innerHTML='Send Code'; btn.disabled=false; }
            errEl.textContent = err.message||'Failed to send code.'; errEl.style.display='flex';
          } finally { loading=false; }
        };
        $('otp-send-btn')?.addEventListener('click', sendOtp);
        $('otp-contact')?.addEventListener('keydown', e=>{ if(e.key==='Enter') sendOtp(); });
        $('otp-contact')?.focus();
      });
    } else if (mode === 'otp-verify') {
      card.innerHTML = `
        <button id="back-btn" style="background:none;border:none;color:var(--text-sub);cursor:pointer;font-size:13px;padding:0;margin-bottom:22px;display:flex;align-items:center;gap:6px;font-weight:600">← Back</button>
        <div class="login-title">Enter Code</div>
        <div class="login-sub">We sent a 6-digit code to <strong style="color:var(--gold)">${escapeHtml(otpMasked)}</strong></div>
        <div id="login-err" class="alert alert-danger" style="display:none;margin-bottom:18px"></div>
        <div class="form-group"><label class="form-label">Verification Code</label>
          <input id="otp-code" type="text" inputmode="numeric" maxlength="6" placeholder="000000" style="font-family:var(--mono);font-size:24px;letter-spacing:8px;text-align:center"/>
        </div>
        <button id="otp-verify-btn" class="btn-primary" style="width:100%;padding:14px;font-size:15px;justify-content:center">Verify & Sign In</button>
        <div style="text-align:center;margin-top:16px">
          <button id="otp-resend" class="btn-ghost" style="font-size:13px">Resend code</button>
        </div>`;
      requestAnimationFrame(() => {
        $('back-btn')?.addEventListener('click',()=>{ mode='otp-input'; renderCard(); });
        $('otp-resend')?.addEventListener('click',()=>{ mode='otp-input'; renderCard(); });
        const errEl = $('login-err');
        const verify = async () => {
          if (loading) return;
          const code = $('otp-code')?.value?.trim();
          if (!code||code.length<4) { errEl.textContent='Please enter the code.'; errEl.style.display='flex'; return; }
          loading = true;
          const btn = $('otp-verify-btn');
          if (btn) { btn.innerHTML='<span class="spinner"></span> Verifying…'; btn.disabled=true; }
          try {
            const user = await apiCall('POST','/api/otp/verify',{staffId:otpStaffId,code});
            State.user = user; State.page='app'; State.section='dashboard';
            saveSession(); await loadMembers(); await loadStaff(); render();
          } catch(err) {
            if (btn) { btn.innerHTML='Verify & Sign In'; btn.disabled=false; }
            errEl.textContent = err.message||'Invalid code.'; errEl.style.display='flex';
          } finally { loading=false; }
        };
        $('otp-verify-btn')?.addEventListener('click', verify);
        $('otp-code')?.addEventListener('keydown', e=>{ if(e.key==='Enter') verify(); });
        $('otp-code')?.focus();
      });
    }
  }

  right.appendChild(card);
  screen.appendChild(left);
  screen.appendChild(right);
  wrap.appendChild(screen);
  renderCard();
  return wrap;
}

  document.querySelectorAll('.nav-item[data-nav]').forEach(i => {
    i.classList.toggle('active', i.dataset.nav===State.section);

  page.innerHTML = '<div class="empty-state"><div class="skeleton" style="height:200px;border-radius:var(--radius-lg)"></div></div>';

    dashboard: renderDashboard,
    members: renderMembers,

  }
}

let memberSearch='', memberAreaFilter='', memberGenderFilter='';

async function renderMembers() {
  const div = el('div');
  let members = State.data.members;

  const header = el('div',{class:'page-header'});
  header.innerHTML = `
    <div>
      <div class="page-title">Members</div>
      <div class="page-sub">${members.length.toLocaleString()} registered members</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-secondary btn-sm" id="export-btn">📥 Export</button>
      <button class="btn-primary" id="add-member-btn">+ Add Member</button>
    </div>`;

  // Filters
  const filters = el('div',{class:'card',style:'margin-bottom:20px;padding:16px 20px'});
  filters.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr auto auto;gap:12px;align-items:center">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input id="mem-search" placeholder="Search by name, ID, phone, area…" value="${escapeHtml(memberSearch)}"/>
      </div>
      <select id="mem-area" style="width:180px">
        <option value="">All Areas</option>
        ${AREAS.map(a=>`<option value="${escapeHtml(a)}" ${memberAreaFilter===a?'selected':''}>${escapeHtml(a)}</option>`).join('')}
      </select>
      <select id="mem-gender" style="width:130px">
        <option value="">All Genders</option>
        <option value="Male" ${memberGenderFilter==='Male'?'selected':''}>Male</option>
        <option value="Female" ${memberGenderFilter==='Female'?'selected':''}>Female</option>
      </select>
    </div>`;

  // Table
  const tableWrap = el('div',{class:'card',style:'padding:0;overflow:hidden'});
  const table = el('table');
  const thead = el('thead');
  thead.innerHTML = `<tr>
    <th>Member</th>
    <th>Member ID</th>
    <th>Gender</th>
    <th>Area</th>
    <th>Contact</th>
    <th>Family</th>
    <th>Joined</th>
    <th style="text-align:right">Actions</th>
  </tr>`;

  const tbody = el('tbody',{id:'members-tbody'});

  function applyFilters() {
    const q = memberSearch.toLowerCase();
    return members.filter(m=>{
      return (!q||[m.name,m.member_id,m.phone,m.area,m.nin_number].some(v=>v?.toLowerCase().includes(q)))
        && (!memberAreaFilter||m.area===memberAreaFilter)
        && (!memberGenderFilter||m.gender===memberGenderFilter);
    });
  }

  function renderRows() {
    const filtered = applyFilters();
    tbody.innerHTML = '';
    if (filtered.length === 0) {
      tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:56px;color:var(--text-muted)">
        <div style="font-size:36px;margin-bottom:12px;opacity:.3">👤</div>
        <div style="font-weight:700;font-size:15px;color:var(--text-sub)">No members found</div>
        <div style="font-size:12px;margin-top:4px">Try adjusting your search or filters</div>
      </td></tr>`;
      return;
    }
    filtered.forEach(m => {
      const tr = el('tr');
      tr.innerHTML = `
        <td>
          <div style="display:flex;align-items:center;gap:11px">
            <div class="avatar" style="width:38px;height:38px;background:${avatarColor(m.name)};font-size:13px;color:#0c0e14;flex-shrink:0">${initials(m.name)}</div>
            <div>
              <div style="font-weight:700;font-size:13.5px">${escapeHtml(m.name)}</div>
              <div style="font-size:11px;color:var(--text-muted)">${fmtAge(m.dob)}</div>
            </div>
          </div>
        </td>
        <td><code style="font-size:11.5px;background:var(--surface2);padding:3px 9px;border-radius:6px;font-family:var(--mono);color:var(--gold)">${escapeHtml(m.member_id||'—')}</code></td>
        <td><span class="badge" style="background:${m.gender==='Male'?'var(--info-dim)':'rgba(167,139,250,.12)'};color:${m.gender==='Male'?'var(--info)':'#a78bfa'}">${m.gender==='Male'?'♂':'♀'} ${escapeHtml(m.gender||'—')}</span></td>
        <td style="font-size:13px">📍 ${escapeHtml(m.area||'—')}</td>
        <td style="font-size:12.5px;color:var(--text-sub)">${escapeHtml(m.phone||'—')}</td>
        <td><span class="badge" style="background:var(--surface2);color:var(--text-sub)">${m.family?.length||0}</span></td>
        <td style="font-size:12px;color:var(--text-muted)">${fmtDate(m.created_at)}</td>
        <td>
          <div style="display:flex;justify-content:flex-end;gap:5px">
            <button class="btn-icon btn-sm" title="View" data-view="${m.id}" style="font-size:15px">👁</button>
            <button class="btn-icon btn-sm" title="Edit" data-edit="${m.id}" style="font-size:15px">✏️</button>
            <button class="btn-icon btn-sm" title="ID Card" data-card="${m.id}" style="font-size:15px">🪪</button>
            <button class="btn-icon btn-sm" title="Delete" data-del="${m.id}" style="font-size:15px;color:var(--danger)">🗑</button>
          </div>
        </td>`;
      tbody.appendChild(tr);
    });

    tbody.querySelectorAll('[data-view]').forEach(b=>b.addEventListener('click',()=>openMemberView(members.find(m=>m.id==b.dataset.view))));
    tbody.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click',()=>openMemberForm(members.find(m=>m.id==b.dataset.edit))));
    tbody.querySelectorAll('[data-card]').forEach(b=>b.addEventListener('click',()=>{State.section='id-cards';renderSection();}));
    tbody.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',()=>{
      const m=members.find(m=>m.id==b.dataset.del);
      openConfirm(`Delete member "${m?.name}"? This cannot be undone.`, async()=>{
        try { await deleteMember(b.dataset.del); await loadMembers(); members=State.data.members; renderRows(); showToast('Member deleted.'); }
        catch(err){ showToast(err.message,'danger'); }
      });
    }));
  }

  table.appendChild(thead);
  table.appendChild(tbody);
  tableWrap.appendChild(table);
  div.appendChild(header);
  div.appendChild(filters);
  div.appendChild(tableWrap);

  requestAnimationFrame(()=>{
    renderRows();
    $('mem-search')?.addEventListener('input',e=>{ memberSearch=e.target.value; renderRows(); });
    $('mem-area')?.addEventListener('change',e=>{ memberAreaFilter=e.target.value; renderRows(); });
    $('mem-gender')?.addEventListener('change',e=>{ memberGenderFilter=e.target.value; renderRows(); });
    div.querySelector('#add-member-btn')?.addEventListener('click',()=>openMemberForm(null));
    div.querySelector('#export-btn')?.addEventListener('click',()=>exportMembers());
  });

  return div;
}

function exportMembers() {
  const rows = [['Name','Member ID','Gender','DOB','Area','Phone','Email','Education','Joined'].join(',')];
  State.data.members.forEach(m=>{
    rows.push([m.name,m.member_id,m.gender,m.dob,m.area,m.phone,m.email,m.education,m.created_at].map(v=>`"${(v||'').replace(/"/g,'""')}"`).join(','));
  });
  const blob = new Blob([rows.join('\n')],{type:'text/csv'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`bmmu_members_${new Date().toISOString().slice(0,10)}.csv`; a.click();
  showToast('CSV exported successfully!');
}

// ─── MEMBER FORM ────────────────────────────────────────────────
function openMemberForm(member) {
  let activeTab = 'personal';
  let form = {
    name: member?.name||'', dob: member?.dob?member.dob.split('T')[0]:'',
    gender: member?.gender||'', religion: member?.religion||'Muslim',
    nationality: member?.nationality||'Ugandan', nin_number: member?.nin_number||'',
    area: member?.area||'', village: member?.village||'',
    phone: member?.phone||'', phone2: member?.phone2||'',
    email: member?.email||'', occupation: member?.occupation||'',
    education: member?.education||'', marital_status: member?.marital_status||'',
    notes: member?.notes||'', photo: member?.photo||null,
    family: JSON.parse(JSON.stringify(member?.family||[])),
  };
  let saving = false;

  const overlay = el('div',{class:'overlay'});
  const modal = el('div',{class:'modal modal-lg'});

  const tabs = [{id:'personal',label:'Personal'},{id:'contact',label:'Contact'},{id:'family',label:`Family (${form.family.length})`},{id:'photo',label:'Photo'}];

  function renderModal() {
    modal.innerHTML = `
      <div class="modal-header">
        <div>
          <div style="font-family:var(--display);font-size:18px;font-weight:900">${member?'Edit Member':'Add New Member'}</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:3px">${member?`Editing ${member.name}`:'Fill in member information'}</div>
        </div>
        <button class="btn-icon close-mf" style="font-size:22px">✕</button>
      </div>
      <div class="modal-body">
        <div class="tab-bar">${tabs.map(t=>`<div class="tab${activeTab===t.id?' active':''}" data-ftab="${t.id}">${t.label}</div>`).join('')}</div>
        <div id="form-tab-content"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary close-mf">Cancel</button>
        <button class="btn-primary" id="save-member-btn" style="min-width:130px">
          ${saving?'<span class="spinner"></span> Saving…':'💾 Save Member'}
        </button>
      </div>`;

    modal.querySelectorAll('.close-mf').forEach(b=>b.addEventListener('click',()=>overlay.remove()));
    modal.querySelectorAll('.tab[data-ftab]').forEach(t=>t.addEventListener('click',()=>{
      collectFormValues();
      activeTab = t.dataset.ftab;
      renderModal();
    }));
    modal.querySelector('#save-member-btn')?.addEventListener('click', async() => {
      if (saving) return;
      collectFormValues();
      if (!form.name.trim()) { showToast('Name is required.','danger'); return; }
      if (!form.area) { showToast('Area / Centre is required.','danger'); return; }
      saving = true; renderModal();
      try {
        const payload = {...(member?{id:member.id}:{}), ...form};
        await saveMember(payload);
        await loadMembers();
        overlay.remove();
        showToast(member?'Member updated!':'Member added!');
        renderSection();
      } catch(err) {
        saving = false; renderModal();
        showToast(err.message,'danger');
      }
    });

    renderFormTab($('form-tab-content'));
  }

  function collectFormValues() {
    const g = id => $(id)?.value || '';
    form.name = g('mf-name'); form.dob = g('mf-dob');
    form.gender = g('mf-gender'); form.religion = g('mf-religion');
    form.nationality = g('mf-nationality'); form.nin_number = g('mf-nin');
    form.area = g('mf-area'); form.village = g('mf-village');
    form.phone = g('mf-phone'); form.phone2 = g('mf-phone2');
    form.email = g('mf-email'); form.occupation = g('mf-occupation');
    form.education = g('mf-edu'); form.marital_status = g('mf-marital');
    form.notes = g('mf-notes');
  }

  function renderFormTab(c) {
    if (!c) return;
    if (activeTab === 'personal') {
      c.innerHTML = `
        <div class="form-group"><label class="form-label">Full Name *</label><input id="mf-name" value="${escapeHtml(form.name)}" placeholder="Enter full name"/></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Date of Birth</label><input id="mf-dob" type="date" value="${escapeHtml(form.dob)}"/></div>
          <div class="form-group"><label class="form-label">Gender *</label>
            <select id="mf-gender"><option value="">Select</option><option ${form.gender==='Male'?'selected':''}>Male</option><option ${form.gender==='Female'?'selected':''}>Female</option></select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Religion</label>
            <select id="mf-religion">${['Muslim','Christian','Other'].map(r=>`<option ${form.religion===r?'selected':''}>${r}</option>`).join('')}</select>
          </div>
          <div class="form-group"><label class="form-label">Nationality</label><input id="mf-nationality" value="${escapeHtml(form.nationality)}" placeholder="Nationality"/></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Marital Status</label>
            <select id="mf-marital"><option value="">Select</option>${['Single','Married','Widowed','Divorced'].map(v=>`<option ${form.marital_status===v?'selected':''}>${v}</option>`).join('')}</select>
          </div>
          <div class="form-group"><label class="form-label">Education Level</label>
            <select id="mf-edu"><option value="">Select</option>${EDUCATION_LEVELS.map(e=>`<option ${form.education===e?'selected':''}>${e}</option>`).join('')}</select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Occupation</label><input id="mf-occupation" value="${escapeHtml(form.occupation)}" placeholder="Occupation"/></div>
          <div class="form-group"><label class="form-label">NIN Number</label><input id="mf-nin" value="${escapeHtml(form.nin_number)}" placeholder="CM9XXXXXXXX"/></div>
        </div>
        <div class="form-group"><label class="form-label">Notes</label><textarea id="mf-notes" rows="3" placeholder="Additional notes…">${escapeHtml(form.notes)}</textarea></div>`;
    } else if (activeTab === 'contact') {
      c.innerHTML = `
        <div class="form-row">
          <div class="form-group"><label class="form-label">Area / Centre *</label>
            <select id="mf-area"><option value="">Select Area</option>${AREAS.map(a=>`<option ${form.area===a?'selected':''}>${a}</option>`).join('')}</select>
          </div>
          <div class="form-group"><label class="form-label">Village / Parish</label><input id="mf-village" value="${escapeHtml(form.village)}" placeholder="Village or Parish"/></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Primary Phone</label><input id="mf-phone" type="tel" value="${escapeHtml(form.phone)}" placeholder="07XXXXXXXX"/></div>
          <div class="form-group"><label class="form-label">Alt Phone</label><input id="mf-phone2" type="tel" value="${escapeHtml(form.phone2)}" placeholder="Optional"/></div>
        </div>
        <div class="form-group"><label class="form-label">Email Address</label><input id="mf-email" type="email" value="${escapeHtml(form.email)}" placeholder="email@example.com"/></div>
        <div style="background:var(--gold-dim);border:1px solid var(--gold-glow);border-radius:var(--radius);padding:14px;font-size:12.5px;color:var(--text-sub)">
          📍 Area / Centre is required for member categorization and reporting.
        </div>`;
    } else if (activeTab === 'family') {
      c.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <div style="font-size:13px;color:var(--text-sub)">${form.family.length} family member(s)</div>
          <button class="btn-secondary btn-sm" id="add-fam-btn">+ Add Family Member</button>
        </div>
        <div id="family-list">
          ${form.family.length===0?
            `<div class="empty-state" style="padding:40px"><div class="empty-icon">👨‍👩‍👧</div><div class="empty-title">No family members</div></div>`:
            form.family.map((f,i)=>`
              <div class="card-sm" style="margin-bottom:10px;display:flex;align-items:center;gap:12px">
                <div class="avatar" style="width:36px;height:36px;background:${avatarColor(f.name)};font-size:12px;color:#0c0e14">${initials(f.name)}</div>
                <div style="flex:1">
                  <div style="font-weight:700;font-size:13px">${escapeHtml(f.name)}</div>
                  <div style="font-size:11px;color:var(--text-muted)">${escapeHtml(f.relationship||'—')} · ${fmtDate(f.dob)}</div>
                </div>
                <button class="btn-icon" data-delfam="${i}" style="color:var(--danger)">🗑</button>
              </div>`).join('')
          }
        </div>`;
      requestAnimationFrame(()=>{
        $('add-fam-btn')?.addEventListener('click',()=>{
          collectFormValues();
          form.family.push({name:'',relationship:'',dob:''});
          openFamilyMemberForm(form.family.length-1, ()=>{ tabs[2].label=`Family (${form.family.length})`; activeTab='family'; renderModal(); });
        });
        c.querySelectorAll('[data-delfam]').forEach(b=>b.addEventListener('click',()=>{
          form.family.splice(parseInt(b.dataset.delfam),1);
          tabs[2].label=`Family (${form.family.length})`; activeTab='family'; renderModal();
        }));
      });
    } else if (activeTab === 'photo') {
      c.innerHTML = `
        <div class="photo-drop" id="photo-drop">
          ${form.photo?
            `<img src="${escapeHtml(form.photo)}" style="max-height:200px;border-radius:var(--radius);margin-bottom:14px"/>
             <div><button class="btn-danger btn-sm" id="remove-photo">Remove Photo</button></div>`:
            `<div style="font-size:40px;margin-bottom:12px">📷</div>
             <div style="font-weight:700;margin-bottom:6px">Click to upload photo</div>
             <div style="font-size:12px;color:var(--text-muted)">JPG, PNG or WebP · Max 5MB</div>`
          }
        </div>
        <input type="file" id="photo-input" accept="image/*" style="display:none"/>`;
      requestAnimationFrame(()=>{
        $('photo-drop')?.addEventListener('click',()=>$('photo-input')?.click());
        $('photo-input')?.addEventListener('change',e=>{
          const file=e.target.files[0]; if(!file) return;
          const r=new FileReader(); r.onload=ev=>{ form.photo=ev.target.result; activeTab='photo'; renderModal(); }; r.readAsDataURL(file);
        });
        $('remove-photo')?.addEventListener('click',e=>{ e.stopPropagation(); form.photo=null; activeTab='photo'; renderModal(); });
      });
    }
  }

  overlay.appendChild(modal);
  document.body.appendChild(overlay);
  overlay.addEventListener('click',e=>{ if(e.target===overlay) overlay.remove(); });
  renderModal();
}

// ─── ID CARDS ───────────────────────────────────────────────────
async function renderIDCards() {
  const div = el('div');
  let search = '';
  const members = State.data.members;

  div.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">ID Cards</div>
        <div class="page-sub">Generate and print member ID cards</div>
      </div>
    </div>
    <div class="card" style="margin-bottom:20px;padding:16px 20px">
      <div class="search-wrap" style="max-width:400px">
        <span class="search-icon">🔍</span>
        <input id="card-search" placeholder="Search members…"/>
      </div>
    </div>
    <div id="card-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px"></div>`;

  function renderCards() {
    const q = search.toLowerCase();
    const filtered = members.filter(m=>!q||[m.name,m.member_id,m.area].some(v=>v?.toLowerCase().includes(q)));
    const grid = $('card-grid');
    grid.innerHTML = '';
    if (!filtered.length) {
      grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1;padding:60px"><div class="empty-icon">🪪</div><div class="empty-title">No members found</div></div>`;
      return;
    }
    filtered.slice(0,24).forEach(m=>{
      const wrap = el('div',{style:'cursor:pointer'});
      wrap.innerHTML = `
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:transform .2s,box-shadow .2s">
          <div style="background:linear-gradient(135deg,#0a0c1a,#141936);padding:20px;color:#fff;position:relative">
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
              <div class="avatar" style="width:44px;height:44px;background:${avatarColor(m.name)};font-size:16px;color:#0c0e14;border:2px solid rgba(232,184,75,.4)">${initials(m.name)}</div>
              <div>
                <div style="font-weight:800;font-size:14px">${escapeHtml(m.name)}</div>
                <div style="font-size:10px;opacity:.7;font-family:var(--mono)">${escapeHtml(m.member_id||'—')}</div>
              </div>
            </div>
            <div style="display:flex;height:3px;border-radius:2px;overflow:hidden;gap:1px">
              <span style="flex:1;background:#111"></span>
              <span style="flex:1;background:#fcdc5f"></span>
              <span style="flex:1;background:#cc0001"></span>
            </div>
            <div style="margin-top:10px;font-size:10px;opacity:.6;display:flex;gap:12px">
              <span>📍 ${escapeHtml(m.area||'—')}</span>
              <span>🎂 ${fmtDate(m.dob)}</span>
            </div>
          </div>
          <div style="padding:12px 16px;display:flex;justify-content:space-between;align-items:center">
            <span class="badge" style="background:${m.gender==='Male'?'var(--info-dim)':'rgba(167,139,250,.12)'};color:${m.gender==='Male'?'var(--info)':'#a78bfa'}">${escapeHtml(m.gender||'—')}</span>
            <button class="btn-primary btn-xs" data-print="${m.id}">🖨️ Print Card</button>
          </div>
        </div>`;
      wrap.querySelector(`[data-print]`)?.addEventListener('click',()=>openIDCardView(m));
      wrap.addEventListener('mouseenter',()=>wrap.firstElementChild.style.transform='translateY(-3px)');
      wrap.addEventListener('mouseleave',()=>wrap.firstElementChild.style.transform='');
      grid.appendChild(wrap);
    });
    if (filtered.length>24) {
      const more=el('div',{style:'grid-column:1/-1;text-align:center;padding:20px;color:var(--text-muted);font-size:13px'});
      more.textContent=`Showing first 24 of ${filtered.length} members`;
      grid.appendChild(more);
    }
  }

  requestAnimationFrame(()=>{
    renderCards();
    $('card-search')?.addEventListener('input',e=>{ search=e.target.value; renderCards(); });
  });
  return div;
}
