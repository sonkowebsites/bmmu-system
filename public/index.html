<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="theme-color" content="#0a0b0f"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="BMMU"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icon-192.png"/>
<title>BMMU — Member Management System</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0b0f;--surface:#12141a;--surface2:#1a1d26;--surface3:#20243000;
  --border:#1f2335;--border2:#2a2f4a;
  --text:#e8ecf4;--text-sub:#7a85a3;--text-muted:#3d4566;
  --accent:#6366f1;--accent2:#818cf8;--accent-glow:rgba(99,102,241,.35);
  --success:#10b981;--warning:#f59e0b;--danger:#ef4444;--info:#3b82f6;
  --card:#12141a;--sidebar:#0d0f16;--header:#0a0b0f;--badge:#1a1d26;
  --ug-black:#000;--ug-gold:#fcdc5f;--ug-red:#cc0001;
  --radius:10px;--radius-lg:14px;--radius-xl:20px;--radius-2xl:28px;
  --shadow:0 4px 24px rgba(0,0,0,.4);--shadow-lg:0 12px 48px rgba(0,0,0,.6);
  --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
  --sidebar-w:260px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-top:env(safe-area-inset-top,0px);
}
body.light{
  --bg:#f0f2f8;--surface:#fff;--surface2:#f5f6fc;--border:#e2e6f3;--border2:#c8cfe8;
  --text:#0f1117;--text-sub:#4a5580;--text-muted:#8892b0;
  --accent:#4f46e5;--accent2:#6366f1;--accent-glow:rgba(79,70,229,.2);
  --card:#fff;--sidebar:#fff;--header:#fff;--badge:#eef0fa;
}
html{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;height:100%;overflow:hidden;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
#app{height:100%;display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
a{color:inherit;text-decoration:none}
input,select,textarea,button{font-family:var(--font);font-size:14px}
input,select,textarea{
  background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--radius);
  padding:10px 14px;color:var(--text);outline:none;width:100%;
  transition:border-color .15s,box-shadow .15s;
}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
input::placeholder,textarea::placeholder{color:var(--text-muted)}
select option{background:var(--surface);color:var(--text)}
button{cursor:pointer;border:none;border-radius:var(--radius);font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;padding:10px 20px;box-shadow:0 2px 12px var(--accent-glow)}
.btn-primary:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 4px 20px var(--accent-glow)}
.btn-primary:active{transform:translateY(0)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1.5px solid var(--border2);padding:9px 18px}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent);background:var(--surface2)}
.btn-danger{background:var(--danger);color:#fff;padding:10px 20px}
.btn-danger:hover{opacity:.88}
.btn-success{background:var(--success);color:#fff;padding:10px 20px}
.btn-ghost{background:transparent;color:var(--text-sub);padding:7px 12px;border-radius:8px}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-icon{background:transparent;color:var(--text-sub);padding:7px;border-radius:8px;font-size:16px}
.btn-icon:hover{background:var(--surface2);color:var(--text)}
.btn-sm{padding:6px 13px;font-size:13px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px}
.card-sm{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text-muted);padding:10px 16px;border-bottom:1px solid var(--border)}
td{padding:12px 16px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .15s}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-xl);width:100%;max-width:660px;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:slideUp .2s}
.modal-lg{max-width:860px}
.modal-sm{max-width:420px}
.modal-header{padding:22px 26px 18px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:5;border-radius:var(--radius-xl) var(--radius-xl) 0 0}
.modal-body{padding:26px}
.modal-footer{padding:18px 26px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;background:var(--surface);position:sticky;bottom:0;border-radius:0 0 var(--radius-xl) var(--radius-xl)}
.form-group{margin-bottom:18px}
.form-label{display:block;font-size:11px;font-weight:700;letter-spacing:.06em;color:var(--text-sub);margin-bottom:7px;text-transform:uppercase}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* ── SIDEBAR ── */
.shell{display:flex;height:100%;overflow:hidden}
.sidebar{
  width:var(--sidebar-w);background:var(--sidebar);border-right:1px solid var(--border);
  height:100%;display:flex;flex-direction:column;flex-shrink:0;
  transition:transform .25s cubic-bezier(.4,0,.2,1);overflow:hidden;
}
.sidebar-logo{padding:22px 18px 16px;border-bottom:1px solid var(--border)}
.sidebar-nav{flex:1;overflow-y:auto;padding:10px 10px}
.nav-section-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);padding:14px 12px 6px;display:block}
.nav-item{
  display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:var(--radius);
  cursor:pointer;color:var(--text-sub);font-weight:500;transition:all .15s;margin-bottom:2px;font-size:13.5px;
}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:rgba(99,102,241,.15);color:var(--accent);font-weight:600}
.nav-item.active .nav-icon-wrap{background:rgba(99,102,241,.2)}
.nav-icon-wrap{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;transition:background .15s}
.sidebar-user{padding:14px 16px;border-top:1px solid var(--border);margin-top:auto}

/* ── MAIN CONTENT ── */
.main-content{flex:1;display:flex;flex-direction:column;min-width:0;height:100%;overflow:hidden}
.topbar{
  background:var(--header);border-bottom:1px solid var(--border);
  padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;padding-top:var(--safe-top);
}
.page{padding:24px;flex:1;overflow-y:auto;padding-bottom:calc(24px + var(--safe-bottom))}
.page-header{margin-bottom:26px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}

/* ── STAT CARDS ── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:26px}
.stat-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:20px;position:relative;overflow:hidden;transition:border-color .2s,transform .2s;
}
.stat-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.stat-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 60%,rgba(99,102,241,.04));pointer-events:none}

/* ── AVATAR ── */
.avatar{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden;vertical-align:middle}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.search-wrap{position:relative}
.search-wrap input{padding-left:40px}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none;font-size:14px}
.tab-bar{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:22px}
.tab{padding:10px 18px;cursor:pointer;font-weight:500;color:var(--text-sub);transition:all .15s;border-bottom:2.5px solid transparent;font-size:13px}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700}
.tab:hover:not(.active){color:var(--text)}
.empty-state{text-align:center;padding:56px 20px;color:var(--text-muted)}
.alert{padding:12px 16px;border-radius:var(--radius);display:flex;align-items:center;gap:10px;font-size:13px;font-weight:500}
.alert-success{background:rgba(16,185,129,.1);color:var(--success);border:1px solid rgba(16,185,129,.2)}
.alert-danger{background:rgba(239,68,68,.1);color:var(--danger);border:1px solid rgba(239,68,68,.2)}
.alert-info{background:rgba(59,130,246,.1);color:var(--info);border:1px solid rgba(59,130,246,.2)}
.alert-warning{background:rgba(245,158,11,.1);color:var(--warning);border:1px solid rgba(245,158,11,.2)}
.photo-drop{border:2px dashed var(--border2);border-radius:var(--radius-lg);padding:28px;text-align:center;cursor:pointer;transition:all .15s}
.photo-drop:hover{border-color:var(--accent);background:rgba(99,102,241,.04)}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0}
.spinner{width:20px;height:20px;border:2.5px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite;display:inline-block}
.toggle-wrap{display:flex;align-items:center;gap:10px;cursor:pointer}
.toggle{width:42px;height:24px;border-radius:12px;background:var(--border2);position:relative;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.toggle.on::after{left:21px}
.perm-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.perm-item{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:var(--radius);border:1.5px solid var(--border);cursor:pointer;transition:all .15s;font-size:13px}
.perm-item:hover{border-color:var(--accent);background:rgba(99,102,241,.05)}
.perm-item.active{border-color:var(--accent);background:rgba(99,102,241,.1);color:var(--accent)}
.perm-check{width:17px;height:17px;border-radius:5px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .15s;flex-shrink:0}
.perm-item.active .perm-check{background:var(--accent);border-color:var(--accent);color:#fff}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:110px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{width:100%;border-radius:5px 5px 0 0;background:linear-gradient(180deg,var(--accent2),var(--accent));transition:height .5s cubic-bezier(.4,0,.2,1);min-height:3px}
.bar-label{font-size:9px;color:var(--text-muted);white-space:nowrap}
.bar-val{font-size:10px;color:var(--text-sub);font-weight:700}
.progress{height:6px;background:var(--surface2);border-radius:4px;overflow:hidden}
.progress-bar{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .7s cubic-bezier(.4,0,.2,1)}
.role-badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.toast{position:fixed;bottom:calc(24px + var(--safe-bottom));right:24px;z-index:9999;max-width:340px;animation:slideUp .2s;border-radius:var(--radius-lg);box-shadow:var(--shadow-lg)}
.info-row{display:flex;gap:12px;margin-bottom:12px;align-items:flex-start}
.info-row .ir-icon{font-size:15px;margin-top:2px;flex-shrink:0;width:20px;text-align:center}
.info-row .ir-body .ir-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;font-weight:700}
.info-row .ir-body .ir-val{font-size:13.5px;font-weight:500;margin-top:2px}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.mobile-menu-btn{display:none;background:transparent;border:1.5px solid var(--border2);padding:7px 9px;border-radius:var(--radius);color:var(--text-sub);font-size:16px}

/* ── ID CARD ── */
.id-card{
  background:linear-gradient(135deg,#0d1021 0%,#151b3a 50%,#0d1021 100%);
  border:2px solid rgba(252,220,95,.4);border-radius:18px;
  color:#fff;position:relative;overflow:hidden;width:340px;
  box-shadow:0 8px 40px rgba(0,0,0,.6),0 0 0 1px rgba(252,220,95,.1);
}
.id-card::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,.15),transparent 70%)}
.id-card::after{content:'';position:absolute;bottom:-50px;left:-50px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(252,220,95,.08),transparent 70%)}
.ug-stripe{height:5px;background:linear-gradient(90deg,#000 33.33%,#fcdc5f 33.33%,#fcdc5f 66.66%,#cc0001 66.66%);border-radius:3px;margin-bottom:16px}

/* ── MOBILE ── */
@media(max-width:800px){
  .sidebar{position:fixed;top:0;left:0;height:100%;z-index:200;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0);box-shadow:var(--shadow-lg)}
  .sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199;display:none}
  .sidebar-overlay.show{display:block}
  .main-content{width:100%}
  .mobile-menu-btn{display:flex}
  .stat-grid{grid-template-columns:1fr 1fr}
  .form-row,.form-row-3{grid-template-columns:1fr}
  .page{padding:16px;padding-bottom:calc(16px + var(--safe-bottom))}
  .topbar{padding:0 16px;padding-top:var(--safe-top)}
}
@media(max-width:480px){
  .stat-grid{grid-template-columns:1fr 1fr}
  .modal{border-radius:var(--radius-xl) var(--radius-xl) 0 0;max-height:95vh;position:fixed;bottom:0;left:0;right:0;max-width:100%}
  .overlay{align-items:flex-end;padding:0}
}

/* ── ANIMATIONS ── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ── CANVAS BG ── */
#bg-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.5}

/* ── PRINT ── */
@media print{
  *{visibility:hidden}
  #id-print-area,#id-print-area *{visibility:visible}
  #id-print-area{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#fff}
}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div id="app"></div>
<div id="sidebar-overlay" class="sidebar-overlay"></div>

<script>
// ─── CANVAS BACKGROUND ─────────────────────────────────────────
(function(){
  const c=document.getElementById('bg-canvas');
  const ctx=c.getContext('2d');
  let W,H,particles=[];
  function resize(){W=c.width=innerWidth;H=c.height=innerHeight}
  resize();window.addEventListener('resize',resize);
  for(let i=0;i<60;i++) particles.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+.3,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,o:Math.random()*.4+.1});
  function draw(){
    ctx.clearRect(0,0,W,H);
    particles.forEach(p=>{
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(99,102,241,${p.o})`;ctx.fill();
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
    });
    // draw subtle lines between close particles
    for(let i=0;i<particles.length;i++){
      for(let j=i+1;j<particles.length;j++){
        const dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<100){ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.strokeStyle=`rgba(99,102,241,${.08*(1-d/100)})`;ctx.stroke();}
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

// ─── CONFIG ──────────────────────────────────────────────────
const API_BASE = window.location.origin;
const APP = { version:'2.1.0', org:'BMMU', orgFull:'Buganda Muslim Mass Union' };
const ROLES = {
  superadmin:{ label:'Super Admin', color:'#7c3aed', level:4 },
  admin:     { label:'Admin',       color:'#2563eb', level:3 },
  staff:     { label:'Staff',       color:'#059669', level:2 },
  guest:     { label:'Guest',       color:'#d97706', level:1 },
};
const ALL_PERMISSIONS = ['members_rw','members_r','staff_r','staff_rw','delete','reports'];
const PERM_LABELS = { members_rw:'Add & Edit Members', members_r:'View Members', staff_r:'View Staff', staff_rw:'Manage Staff', delete:'Delete Records', reports:'View Reports' };
const AREAS = ['Kampala Central','Kawempe','Makindye','Lubaga','Nakawa','Wakiso','Mukono','Jinja','Entebbe','Gulu','Mbarara','Fort Portal','Masaka','Mbale','Soroti','Arua'];
const RELATIONS = ['Spouse','Child','Parent','Sibling','Guardian','Other'];
const EDUCATION_LEVELS = ['Primary','Secondary (O-Level)','Secondary (A-Level)','Certificate','Diploma',"Bachelor's Degree","Master's Degree",'Doctorate','No Formal Education'];
const AVATAR_COLORS = ['#6366f1','#7c3aed','#059669','#0891b2','#d97706','#dc2626','#8b5cf6','#2563eb'];

// ─── STATE ────────────────────────────────────────────────────
const State = {
  data:{ members:[], staff:[] },
  theme: localStorage.getItem('bmmu_theme')||'dark',
  user: null,
  page: 'login',
  section: 'dashboard',
  toastTimer: null,
  set(k,v){ this[k]=v; },
  setTheme(t){
    this.theme=t;
    localStorage.setItem('bmmu_theme',t);
    document.body.classList.toggle('light',t==='light');
  },
};

// ─── SESSION PERSISTENCE (fixes refresh logout) ───────────────
function saveSession(){
  if(State.user) sessionStorage.setItem('bmmu_session', JSON.stringify({ user:State.user, section:State.section }));
}
function loadSession(){
  try {
    const s = sessionStorage.getItem('bmmu_session');
    if(s){
      const { user, section } = JSON.parse(s);
      State.user = user;
      State.section = section||'dashboard';
      State.page = 'app';
      return true;
    }
  } catch(e){}
  return false;
}
function clearSession(){ sessionStorage.removeItem('bmmu_session'); }

// ─── API ─────────────────────────────────────────────────────
async function apiCall(method, endpoint, body=null){
  try {
    const opts = { method, headers:{'Content-Type':'application/json'} };
    if(body) opts.body=JSON.stringify(body);
    const res = await fetch(`${API_BASE}${endpoint}`, opts);
    if(!res.ok){ const e=await res.json(); throw new Error(e.error||'Request failed'); }
    return await res.json();
  } catch(err){ showToast(err.message,'danger'); throw err; }
}
async function loadMembers(){ try{ State.data.members=await apiCall('GET','/api/members'); }catch(e){ State.data.members=[]; } }
async function loadStaff(){ try{ State.data.staff=await apiCall('GET','/api/staff'); }catch(e){ State.data.staff=[]; } }
async function saveMember(m,isEdit){ return apiCall(isEdit?'PUT':'POST', isEdit?`/api/members/${m.id}`:'/api/members', m); }
async function deleteMember(id){ return apiCall('DELETE',`/api/members/${id}`); }
async function saveStaff(s,isEdit){ return apiCall(isEdit?'PUT':'POST', isEdit?`/api/staff/${s.id}`:'/api/staff', s); }
async function deleteStaff(id){ return apiCall('DELETE',`/api/staff/${id}`); }
async function login(u,p){ return apiCall('POST','/api/login',{username:u,password:p}); }
async function loadStats(){ try{ return await apiCall('GET','/api/stats'); }catch(e){ return {total:0,males:0,females:0,thisMonth:0,byArea:[],byGender:[]}; } }

// ─── HELPERS ─────────────────────────────────────────────────
const $  = id => document.getElementById(id);
const el = (tag, attrs={}, ...children) => {
  const e = document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)){
    if(k==='class') e.className=v;
    else if(k==='html') e.innerHTML=v;
    else if(k.startsWith('on')) e.addEventListener(k.slice(2),v);
    else e.setAttribute(k,v);
  }
  children.forEach(c=>{ if(c==null) return; typeof c==='string'?e.appendChild(document.createTextNode(c)):c instanceof Node&&e.appendChild(c); });
  return e;
};
const calcAge = dob=>{ if(!dob) return '—'; const d=new Date(dob),now=new Date(); let a=now.getFullYear()-d.getFullYear(); const m=now.getMonth()-d.getMonth(); if(m<0||(m===0&&now.getDate()<d.getDate())) a--; return a; };
const fmtDate = d=>{ if(!d) return '—'; return new Date(d).toLocaleDateString('en-UG',{day:'2-digit',month:'short',year:'numeric'}); };
const initials = name=>{ if(!name) return '?'; return name.split(' ').map(p=>p[0]).join('').toUpperCase().slice(0,2); };
const avatarColor = name=>AVATAR_COLORS[(name||'').charCodeAt(0)%AVATAR_COLORS.length];
const hasPerm = (user,perm)=>{ if(!user) return false; if(user.role==='superadmin') return true; if(perm==='members_r') return (user.permissions||[]).includes('members_r')||(user.permissions||[]).includes('members_rw')||ROLES[user.role]?.level>=2; if(user.role==='admin'&&['members_rw','reports','staff_r'].includes(perm)) return true; if(user.role==='staff'&&['members_rw','reports'].includes(perm)) return true; return (user.permissions||[]).includes(perm); };
function escapeHtml(str){ if(str==null) return ''; return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function avatarEl(name,photo,size=36,fs=13){
  const a=el('div',{class:'avatar',style:`width:${size}px;height:${size}px;background:${avatarColor(name)};font-size:${fs}px;flex-shrink:0`});
  if(photo){const img=el('img',{src:photo,alt:''});a.appendChild(img);}else a.textContent=initials(name);
  return a;
}
function showToast(msg,type='success'){
  if(State.toastTimer) clearTimeout(State.toastTimer);
  const icons={success:'✓',danger:'✕',info:'ℹ',warning:'⚠'};
  document.querySelector('.toast')?.remove();
  const t=el('div',{class:`toast alert alert-${type}`},`${icons[type]||'ℹ'} ${msg}`);
  document.body.appendChild(t);
  State.toastTimer=setTimeout(()=>t.remove(),3500);
}
const infoRow=(icon,label,val,mono=false)=>{ if(!val||val==='—') return ''; return `<div class="info-row"><span class="ir-icon">${icon}</span><div class="ir-body"><div class="ir-label">${label}</div><div class="ir-val" style="font-family:${mono?'var(--mono)':'inherit'}">${escapeHtml(String(val))}</div></div></div>`; };

// ─── RENDER ──────────────────────────────────────────────────
function render(){
  document.body.classList.toggle('light',State.theme==='light');
  const root=$('app');
  root.innerHTML='';
  root.appendChild(State.page==='login'?renderLogin():renderApp());
}

        <div style="font-size:13px;color:var(--text-sub);margin-bottom:22px">Username and password access</div>
        <div id="login-err" class="alert alert-danger" style="display:none;margin-bottom:16px"></div>
        <div class="form-group"><label class="form-label">Username</label><input id="l-user" placeholder="Enter username" autocomplete="username"/></div>

        <button id="l-btn" class="btn-primary" style="width:100%;padding:13px;font-size:15px;justify-content:center;margin-top:4px">Sign In</button>

      requestAnimationFrame(()=>{
        $('back-btn')?.addEventListener('click',()=>{ loginMode='choose'; renderCard(); });
        const errEl=$('login-err');
        const doLogin=async()=>{
          if(loading) return;
          const u=$('l-user')?.value?.trim(), p=$('l-pass')?.value;
          if(!u||!p){ errEl.textContent='Please enter username and password.'; errEl.style.display='flex'; return; }

          <label class="form-label">${isEmail?'Email Address':'Phone Number'}</label>
          <input id="otp-contact" type="${isEmail?'email':'tel'}" placeholder="${isEmail?'yourname@email.com':'0700123456'}" autocomplete="${isEmail?'email':'tel'}"/>
        </div>
        <button id="otp-send-btn" class="btn-primary" style="width:100%;padding:13px;font-size:15px;justify-content:center">Send Code</button>
      `;
      requestAnimationFrame(()=>{
        $('back-btn')?.addEventListener('click',()=>{ loginMode='choose'; renderCard(); });
        const errEl=$('login-err');
        const sendOtp=async()=>{
          if(loading) return;
          const value=$('otp-contact')?.value?.trim();
          if(!value){ errEl.textContent=`Please enter your ${isEmail?'email':'phone number'}.`; errEl.style.display='flex'; return; }

          if(btn){ btn.innerHTML='<span class="spinner"></span> Sending…'; btn.disabled=true; }

      requestAnimationFrame(()=>{

        const errEl=$('login-err');
        const verifyOtp=async()=>{
          if(loading) return;
          const code=$('otp-code')?.value?.trim();
          if(!code||code.length!==6){ errEl.textContent='Please enter the 6-digit code.'; errEl.style.display='flex'; return; }
          loading=true;
          const btn=$('otp-verify-btn');
          if(btn){ btn.innerHTML='<span class="spinner"></span> Verifying…'; btn.disabled=true; }
          try {
            const user=await apiCall('POST','/api/otp/verify',{staffId:otpStaffId,code});

    }

  renderCard();
  return wrap;
}

async function renderSection(){
  const c=$('page-content'); if(!c) return;
  c.innerHTML='<div style="display:flex;align-items:center;justify-content:center;padding:60px;gap:12px;color:var(--text-muted)"><div class="spinner" style="border-top-color:var(--accent)"></div> Loading…</div>';
  await loadMembers(); await loadStaff();
  const fns={ dashboard:renderDashboard, members:renderMembers, 'id-cards':renderIDCards, staff:renderStaff, reports:renderReports, settings:renderSettings };
  const fn=fns[State.section];
  if(fn){ c.innerHTML=''; c.appendChild(await fn()); }
}

// ─── DASHBOARD ───────────────────────────────────────────────
async function renderDashboard(){
  const members=State.data.members||[];
  const total=members.length, males=members.filter(m=>m.gender==='Male').length, females=members.filter(m=>m.gender==='Female').length;
  const stats=await loadStats();
  const areaCount={};
  members.forEach(m=>{ if(m.area) areaCount[m.area]=(areaCount[m.area]||0)+1; });
  const topAreas=Object.entries(areaCount).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const recent=[...members].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).slice(0,5);

  const div=el('div');
  div.innerHTML=`
    <div class="page-header">
      <div>
        <div style="font-size:22px;font-weight:900;letter-spacing:-.5px">Dashboard</div>
        <div style="color:var(--text-sub);margin-top:3px;font-size:13px">Good ${new Date().getHours()<12?'morning':new Date().getHours()<17?'afternoon':'evening'}, ${escapeHtml(State.user.name.split(' ')[0])} 👋</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-lg);font-size:12px;color:var(--text-sub)">
        📅 ${new Date().toLocaleDateString('en-UG',{weekday:'short',day:'numeric',month:'long',year:'numeric'})}

// ─── MEMBERS ─────────────────────────────────────────────────
let memberSearch='', memberAreaFilter='', memberGenderFilter='', memberViewMode='table';
async function renderMembers(){
  const canWrite=hasPerm(State.user,'members_rw');
  const canDelete=State.user.role==='superadmin'||hasPerm(State.user,'delete');
  const members=State.data.members||[];
  const filtered=members.filter(m=>{
    const q=memberSearch.toLowerCase();
    return (!q||[m.name,m.member_id,m.phone,m.area,m.nin_number].some(v=>v?.toLowerCase().includes(q)))
      &&(!memberAreaFilter||m.area===memberAreaFilter)
      &&(!memberGenderFilter||m.gender===memberGenderFilter);
  });
  const div=el('div');
  const header=el('div',{class:'page-header'});
  header.innerHTML=`<div><div style="font-size:22px;font-weight:900">Members Registry</div><div style="color:var(--text-sub);margin-top:3px;font-size:13px">${filtered.length} of ${members.length} members</div></div>`;
  if(canWrite){ const b=el('button',{class:'btn-primary'},'+ Register Member'); b.addEventListener('click',()=>openMemberForm(null)); header.appendChild(b); }
  div.appendChild(header);
  const filters=el('div',{style:'display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap'});
  const sw=el('div',{class:'search-wrap',style:'flex:1;min-width:200px'});
  sw.innerHTML='<span class="search-icon">🔍</span>';
  const si=el('input',{placeholder:'Search by name, ID, phone, area…'});
  si.value=memberSearch;
  si.addEventListener('input',e=>{ memberSearch=e.target.value; renderSection(); });
  sw.appendChild(si);
  const asel=el('select',{style:'width:170px'}); asel.innerHTML='<option value="">All Areas</option>'+AREAS.map(a=>`<option value="${a}" ${memberAreaFilter===a?'selected':''}>${a}</option>`).join(''); asel.addEventListener('change',e=>{ memberAreaFilter=e.target.value; renderSection(); });
  const gsel=el('select',{style:'width:140px'}); gsel.innerHTML=`<option value="">All Genders</option><option ${memberGenderFilter==='Male'?'selected':''}>Male</option><option ${memberGenderFilter==='Female'?'selected':''}>Female</option>`; gsel.addEventListener('change',e=>{ memberGenderFilter=e.target.value; renderSection(); });
  const vb=el('div',{style:'display:flex;gap:4px'});
  ['table','grid'].forEach(m=>{ const b=el('button',{class:memberViewMode===m?'btn-primary':'btn-secondary',style:'padding:8px 13px'},m==='table'?'≡':'⊞'); b.addEventListener('click',()=>{ memberViewMode=m; renderSection(); }); vb.appendChild(b); });
  filters.appendChild(sw); filters.appendChild(asel); filters.appendChild(gsel); filters.appendChild(vb);
  div.appendChild(filters);
  if(filtered.length===0){ div.appendChild(el('div',{class:'card empty-state'},'👥',el('div',{style:'margin-top:10px;font-size:14px'},memberSearch?'No members match your search':'No members yet.'))); return div; }
  if(memberViewMode==='table'){
    const wrap=el('div',{class:'card',style:'padding:0;overflow:hidden'});
    const tw=el('div',{style:'overflow-x:auto'});
    const tbl=el('table');
    tbl.innerHTML=`<thead><tr><th>Member</th><th>Member ID</th><th>Gender</th><th>Age</th><th>Area</th><th>Phone</th><th>Family</th><th>Registered</th><th></th></tr></thead>`;
    const tbody=el('tbody');
    filtered.forEach(m=>{
      const tr=el('tr');
      tr.innerHTML=`
        <td><div style="display:flex;align-items:center;gap:10px">
          <div class="avatar" style="width:36px;height:36px;background:${avatarColor(m.name)};font-size:13px;flex-shrink:0">${m.photo?`<img src="${m.photo}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:initials(m.name)}</div>
          <div><div style="font-weight:700;font-size:13px">${escapeHtml(m.name)}</div><div style="font-size:11px;color:var(--text-muted)">${escapeHtml(m.occupation||'')}</div></div></div></td>
        <td><code style="font-size:12px;background:var(--badge);padding:3px 9px;border-radius:6px;font-family:var(--mono)">${m.member_id}</code></td>
        <td><span class="badge" style="background:${m.gender==='Male'?'rgba(59,130,246,.12)':'rgba(139,92,246,.12)'};color:${m.gender==='Male'?'var(--info)':'#8b5cf6'}">${m.gender==='Male'?'♂':'♀'} ${m.gender||'—'}</span></td>
        <td style="font-size:13px">${calcAge(m.dob)}</td>
        <td style="font-size:13px">${escapeHtml(m.area||'—')}</td>
        <td style="font-size:13px">${escapeHtml(m.phone||'—')}</td>
        <td><span class="badge" style="background:var(--badge);color:var(--text-sub)">${m.family?.length||0}</span></td>
        <td style="font-size:12px;color:var(--text-muted)">${fmtDate(m.created_at)}</td>
        <td><div style="display:flex;gap:3px">
          <button class="btn-icon view-btn" title="View" data-id="${m.id}">👁</button>
          ${canWrite?`<button class="btn-icon edit-btn" title="Edit" data-id="${m.id}">✏️</button>`:''}
          ${canDelete?`<button class="btn-icon del-btn" title="Delete" data-id="${m.id}" style="color:var(--danger)">🗑</button>`:''}
        </div></td>`;
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody); tw.appendChild(tbl); wrap.appendChild(tw); div.appendChild(wrap);
  } else {
    const grid=el('div',{style:'display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px'});
    filtered.forEach(m=>{
      const card=el('div',{class:'card',style:'cursor:pointer;transition:transform .15s,border-color .15s'});
      card.onmouseenter=()=>card.style.transform='translateY(-2px)';
      card.onmouseleave=()=>card.style.transform='';
      card.innerHTML=`
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
          <div class="avatar" style="width:52px;height:52px;background:${avatarColor(m.name)};font-size:18px;flex-shrink:0">${m.photo?`<img src="${m.photo}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:initials(m.name)}</div>
          <div><div style="font-weight:800;font-size:14px">${escapeHtml(m.name)}</div><div style="font-size:12px;color:var(--accent);font-weight:700;font-family:var(--mono)">${m.member_id}</div></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:12px;color:var(--text-sub)">
          <div>📍 ${escapeHtml(m.area||'—')}</div><div>📞 ${escapeHtml(m.phone||'—')}</div>
          <div>🗓 ${fmtDate(m.dob)}</div><div>👪 ${m.family?.length||0} family</div>
        </div>
      `;
      card.addEventListener('click',()=>openMemberView(m)); grid.appendChild(card);
    });
    div.appendChild(grid);
  }
  requestAnimationFrame(()=>{
    div.querySelectorAll('.view-btn').forEach(b=>b.addEventListener('click',e=>{ e.stopPropagation(); const m=State.data.members.find(x=>x.id==b.dataset.id); if(m) openMemberView(m); }));
    div.querySelectorAll('.edit-btn').forEach(b=>b.addEventListener('click',e=>{ e.stopPropagation(); const m=State.data.members.find(x=>x.id==b.dataset.id); if(m) openMemberForm(m); }));
    div.querySelectorAll('.del-btn').forEach(b=>b.addEventListener('click',e=>{ e.stopPropagation(); const m=State.data.members.find(x=>x.id==b.dataset.id); if(m) openConfirm(`Delete member "${m.name}"? This cannot be undone.`,async()=>{ await deleteMember(m.id); await loadMembers(); showToast('Member deleted.','danger'); renderSection(); }); }));
  });
  return div;
}

// ─── MEMBER FORM ─────────────────────────────────────────────
function openMemberForm(member){
  let tab='personal';
  let form={ name:member?.name||'', dob:member?.dob?member.dob.split('T')[0]:'', gender:member?.gender||'', religion:member?.religion||'Muslim', nationality:member?.nationality||'Ugandan', ninNumber:member?.nin_number||'', area:member?.area||'', village:member?.village||'', phone:member?.phone||'', phone2:member?.phone2||'', email:member?.email||'', occupation:member?.occupation||'', education:member?.education||'', maritalStatus:member?.marital_status||'', notes:member?.notes||'', photo:member?.photo||null, family:JSON.parse(JSON.stringify(member?.family||[])) };
  const rebuild=()=>{ const c=$('mf-content'); if(!c) return; c.innerHTML=buildContent(); wireMF(); };
  const buildContent=()=>{
    const tabs=[{id:'personal',label:'Personal'},{id:'contact',label:'Contact'},{id:'family',label:`Family (${form.family.length})`},{id:'photo',label:'Photo'}];
    let h=`<div class="tab-bar">${tabs.map(t=>`<div class="tab ${tab===t.id?'active':''}" data-tab="${t.id}">${t.label}</div>`).join('')}</div>`;
    if(tab==='personal') h+=`
      <div class="form-row"><div class="form-group"><label class="form-label">Full Name *</label><input id="mf-name" value="${escapeHtml(form.name)}" placeholder="Full legal name"/></div><div class="form-group"><label class="form-label">Date of Birth *</label><input id="mf-dob" type="date" value="${form.dob}"/></div></div>
      <div class="form-row"><div class="form-group"><label class="form-label">Gender *</label><select id="mf-gender"><option value="">Select</option><option ${form.gender==='Male'?'selected':''}>Male</option><option ${form.gender==='Female'?'selected':''}>Female</option></select></div><div class="form-group"><label class="form-label">Marital Status</label><select id="mf-marital"><option value="">Select</option>${['Single','Married','Widowed','Divorced'].map(v=>`<option ${form.maritalStatus===v?'selected':''}>${v}</option>`).join('')}</select></div></div>
      <div class="form-row"><div class="form-group"><label class="form-label">Religion</label><select id="mf-religion"><option ${form.religion==='Muslim'?'selected':''}>Muslim</option><option ${form.religion==='Christian'?'selected':''}>Christian</option><option ${form.religion==='Other'?'selected':''}>Other</option></select></div><div class="form-group"><label class="form-label">Nationality</label><input id="mf-nationality" value="${escapeHtml(form.nationality)}" placeholder="Nationality"/></div></div>
      <div class="form-row"><div class="form-group"><label class="form-label">NIN Number</label><input id="mf-nin" value="${escapeHtml(form.ninNumber)}" placeholder="National ID Number"/></div><div class="form-group"><label class="form-label">Occupation</label><input id="mf-occ" value="${escapeHtml(form.occupation)}" placeholder="Occupation"/></div></div>
      <div class="form-group"><label class="form-label">Education Level</label><select id="mf-edu"><option value="">Select</option>${EDUCATION_LEVELS.map(e=>`<option ${form.education===e?'selected':''}>${e}</option>`).join('')}</select></div>
      <div class="form-group"><label class="form-label">Notes</label><textarea id="mf-notes" rows="3" placeholder="Additional notes…">${escapeHtml(form.notes)}</textarea></div>`;
    if(tab==='contact') h+=`
      <div class="form-row"><div class="form-group"><label class="form-label">Primary Phone *</label><input id="mf-phone" value="${escapeHtml(form.phone)}" placeholder="+256…"/></div><div class="form-group"><label class="form-label">Secondary Phone</label><input id="mf-phone2" value="${escapeHtml(form.phone2)}" placeholder="+256…"/></div></div>
      <div class="form-group"><label class="form-label">Email Address</label><input id="mf-email" type="email" value="${escapeHtml(form.email)}" placeholder="email@example.com"/></div>
      <div class="form-row"><div class="form-group"><label class="form-label">Area / Centre *</label><select id="mf-area"><option value="">Select Area</option>${AREAS.map(a=>`<option ${form.area===a?'selected':''}>${a}</option>`).join('')}</select></div><div class="form-group"><label class="form-label">Village / Parish</label><input id="mf-village" value="${escapeHtml(form.village)}" placeholder="Village or Parish"/></div></div>`;
    if(tab==='family'){
      if(form.family.length>0) h+=form.family.map((f,i)=>`<div style="display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--surface2);border-radius:var(--radius);margin-bottom:8px;border:1px solid var(--border)"><div class="avatar" style="width:34px;height:34px;background:${avatarColor(f.name)};font-size:12px;flex-shrink:0">${initials(f.name)}</div><div style="flex:1"><div style="font-weight:700;font-size:13px">${escapeHtml(f.name)}</div><div style="font-size:12px;color:var(--text-muted)">${f.relation||''}${f.dob?' · Born '+fmtDate(f.dob):''}${f.phone?' · '+f.phone:''}</div></div><button class="btn-icon rem-fam" data-fi="${i}" style="color:var(--danger)">✕</button></div>`).join('');
      h+=`<div style="padding:18px;border:2px dashed var(--border2);border-radius:var(--radius-lg);margin-top:10px"><div style="font-size:13px;font-weight:700;margin-bottom:14px">Add Family Member</div><div class="form-row"><div class="form-group" style="margin:0"><label class="form-label">Full Name</label><input id="fam-name" placeholder="Family member name"/></div><div class="form-group" style="margin:0"><label class="form-label">Relation</label><select id="fam-rel"><option value="">Select</option>${RELATIONS.map(r=>`<option>${r}</option>`).join('')}</select></div></div><div class="form-row" style="margin-top:10px"><div class="form-group" style="margin:0"><label class="form-label">Date of Birth</label><input id="fam-dob" type="date"/></div><div class="form-group" style="margin:0"><label class="form-label">Phone</label><input id="fam-phone" placeholder="+256…"/></div></div><button id="add-fam-btn" class="btn-secondary" style="margin-top:14px">+ Add Member</button></div>`;
    }
    if(tab==='photo') h+=`
      <div style="text-align:center;margin-bottom:20px">${form.photo?`<img src="${form.photo}" style="width:150px;height:180px;border-radius:14px;object-fit:cover;border:3px solid var(--border2);box-shadow:var(--shadow)">`:`<div style="width:150px;height:180px;border-radius:14px;background:var(--surface2);border:2px dashed var(--border2);display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:54px">👤</div>`}</div>
      <div class="photo-drop" id="photo-drop"><div style="font-size:36px;margin-bottom:8px">📷</div><div style="font-weight:700;font-size:14px">Upload Member Photo</div><div style="font-size:12px;color:var(--text-muted);margin-top:4px">Click to upload · JPG, PNG, WEBP · Max 5MB</div><input id="photo-inp" type="file" accept="image/*" style="display:none"/></div>
      ${form.photo?`<button id="rem-photo" class="btn-danger" style="width:100%;margin-top:12px;justify-content:center">Remove Photo</button>`:''}`;
    return h;
  };
  const wireMF=()=>{
    document.querySelectorAll('.tab[data-tab]').forEach(t=>t.addEventListener('click',()=>{ tab=t.dataset.tab; syncForm(); rebuild(); }));
    const sf=(id,key)=>{ const e=$(id); if(e) e.addEventListener('input',ev=>form[key]=ev.target.value); };
    sf('mf-name','name'); sf('mf-dob','dob'); sf('mf-nationality','nationality'); sf('mf-nin','ninNumber'); sf('mf-occ','occupation'); sf('mf-notes','notes'); sf('mf-phone','phone'); sf('mf-phone2','phone2'); sf('mf-email','email'); sf('mf-village','village');
    const ss=(id,key)=>{ const e=$(id); if(e) e.addEventListener('change',ev=>form[key]=ev.target.value); };
    ss('mf-gender','gender'); ss('mf-marital','maritalStatus'); ss('mf-religion','religion'); ss('mf-edu','education'); ss('mf-area','area');
    document.querySelectorAll('.rem-fam').forEach(b=>b.addEventListener('click',()=>{ form.family.splice(parseInt(b.dataset.fi),1); rebuild(); }));
    $('add-fam-btn')?.addEventListener('click',()=>{ const n=$('fam-name')?.value?.trim(); if(!n) return; form.family.push({id:Date.now().toString(),name:n,relation:$('fam-rel')?.value||'',dob:$('fam-dob')?.value||'',phone:$('fam-phone')?.value||''}); rebuild(); });
    $('photo-drop')?.addEventListener('click',()=>$('photo-inp')?.click());
    $('photo-inp')?.addEventListener('change',e=>{ const f=e.target.files[0]; if(!f) return; if(f.size>5*1024*1024){ showToast('Image too large. Max 5MB.','danger'); return; } const r=new FileReader(); r.onload=ev=>{ form.photo=ev.target.result; rebuild(); }; r.readAsDataURL(f); });
    $('rem-photo')?.addEventListener('click',()=>{ form.photo=null; rebuild(); });
  };
  const syncForm=()=>{
    const v=id=>$(id)?.value||'';
    if(tab==='personal'){ form.name=v('mf-name'); form.dob=v('mf-dob'); form.gender=v('mf-gender'); form.maritalStatus=v('mf-marital'); form.religion=v('mf-religion'); form.nationality=v('mf-nationality'); form.ninNumber=v('mf-nin'); form.occupation=v('mf-occ'); form.education=v('mf-edu'); form.notes=v('mf-notes'); }
    else if(tab==='contact'){ form.phone=v('mf-phone'); form.phone2=v('mf-phone2'); form.email=v('mf-email'); form.area=v('mf-area'); form.village=v('mf-village'); }
  };
  const validate=()=>{
    if(!form.name.trim()){ tab='personal'; rebuild(); showToast('Full name is required.','danger'); return false; }
    if(!form.dob){ tab='personal'; rebuild(); showToast('Date of birth is required.','danger'); return false; }
    if(!form.gender){ tab='personal'; rebuild(); showToast('Gender is required.','danger'); return false; }
    if(!form.phone.trim()){ tab='contact'; rebuild(); showToast('Primary phone is required.','danger'); return false; }
    if(!form.area){ tab='contact'; rebuild(); showToast('Area/Centre is required.','danger'); return false; }
    return true;
  };
  const overlay=el('div',{class:'overlay',id:'mf-overlay'});
  const modal=el('div',{class:'modal modal-lg'});
  modal.innerHTML=`
    <div class="modal-header">
      <div><div style="font-weight:800;font-size:17px">${member?'Edit Member':'Register New Member'}</div><div style="font-size:12px;color:var(--text-sub)">${member?'Editing '+member.member_id:'Fill all required fields (*)'}</div></div>
      <button class="btn-icon close-modal" style="font-size:20px">✕</button>
    </div>
    <div class="modal-body" id="mf-content"></div>
    <div class="modal-footer"><button class="btn-secondary close-modal">Cancel</button><button class="btn-primary" id="mf-save">${member?'Save Changes':'Register Member'}</button></div>`;
  overlay.appendChild(modal); document.body.appendChild(overlay);
  $('mf-content').innerHTML=buildContent(); wireMF();
  overlay.querySelectorAll('.close-modal').forEach(b=>b.addEventListener('click',()=>overlay.remove()));
  overlay.addEventListener('click',e=>{ if(e.target===overlay) overlay.remove(); });
  $('mf-save').addEventListener('click',async()=>{
    syncForm(); if(!validate()) return;
    try {
      if(member){ await saveMember({...form,id:member.id},true); showToast('Member updated successfully.'); }
      else { await saveMember(form,false); showToast('Member registered successfully.'); }
      await loadMembers(); overlay.remove(); renderSection();
    } catch(err){ showToast(err.message,'danger'); }
  });
}

// ─── MEMBER VIEW ─────────────────────────────────────────────
function openMemberView(m){
  const canWrite=hasPerm(State.user,'members_rw');
  const fam=m.family||[];
  const overlay=el('div',{class:'overlay'});
  const modal=el('div',{class:'modal modal-lg'});
  modal.innerHTML=`

    </div>`;
  overlay.appendChild(modal); document.body.appendChild(overlay);
  overlay.querySelectorAll('.close-modal').forEach(b=>b.addEventListener('click',()=>overlay.remove()));

          ${filtered.length===0?'<div class="empty-state" style="padding:30px"><div>👥</div><div style="margin-top:8px;font-size:13px">No members found</div></div>':filtered.map(m=>`

          <div class="card" style="display:flex;flex-direction:column;align-items:center;gap:20px">
            <div style="font-weight:800;font-size:15px;align-self:flex-start">Preview — ${escapeHtml(m.name)}</div>

// ─── STAFF ───────────────────────────────────────────────────
async function renderStaff(){
  const canManage=State.user.role==='superadmin'||hasPerm(State.user,'staff_rw');
  const staff=State.data.staff||[];
  const div=el('div');
  const header=el('div',{class:'page-header'});
  header.innerHTML=`<div><div style="font-size:22px;font-weight:900">Staff Profiles</div><div style="color:var(--text-sub);font-size:13px;margin-top:3px">${staff.length} account${staff.length!==1?'s':''}</div></div>`;
  if(canManage){ const b=el('button',{class:'btn-primary'},'+ Create Profile'); b.addEventListener('click',()=>openStaffForm(null)); header.appendChild(b); }
  div.appendChild(header);
  const grid=el('div',{style:'display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px'});
  staff.forEach(s=>{
    const role=ROLES[s.role], isSelf=s.id===State.user.id;
    const card=el('div',{class:'card'});
    card.innerHTML=`
      <div style="display:flex;align-items:flex-start;gap:14px;margin-bottom:14px">
        <div class="avatar" style="width:54px;height:54px;background:${avatarColor(s.name)};font-size:20px;flex-shrink:0">${s.avatar?`<img src="${s.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:initials(s.name)}</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:800;font-size:14px;display:flex;align-items:center;gap:6px">${escapeHtml(s.name)} ${isSelf?`<span style="font-size:10px;background:rgba(99,102,241,.15);color:var(--accent);padding:2px 8px;border-radius:10px;font-weight:700">You</span>`:''}</div>
          <div style="font-size:12px;color:var(--text-muted);font-family:var(--mono)">@${escapeHtml(s.username)}</div>
          <div style="margin-top:7px;display:flex;gap:6px;flex-wrap:wrap">
            <span class="role-badge" style="background:${role?.color}18;color:${role?.color}">${role?.label||s.role}</span>
            <span class="badge" style="background:${s.active!==false?'rgba(16,185,129,.12)':'rgba(239,68,68,.12)'};color:${s.active!==false?'var(--success)':'var(--danger)'}">${s.active!==false?'● Active':'○ Inactive'}</span>
          </div>
        </div>
      </div>
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:14px;display:flex;flex-direction:column;gap:4px">
        ${s.email?`<div>📧 ${escapeHtml(s.email)}</div>`:''}${s.phone?`<div>📞 ${escapeHtml(s.phone)}</div>`:''}${s.staff_id?`<div style="font-family:var(--mono)">🪪 ${escapeHtml(s.staff_id)}</div>`:''}
      </div>
      ${canManage&&!isSelf?`<div style="display:flex;gap:8px"><button class="btn-secondary btn-sm edit-staff-btn" data-sid="${s.id}" style="flex:1;justify-content:center">✏️ Edit</button><button class="btn-secondary btn-sm toggle-staff-btn" data-sid="${s.id}" style="padding:6px 12px">${s.active!==false?'🚫':'✅'}</button>${s.role!=='superadmin'?`<button class="btn-icon del-staff-btn" data-sid="${s.id}" style="color:var(--danger)">🗑</button>`:''}</div>`:''}`;
    grid.appendChild(card);
  });
  div.appendChild(grid);
  requestAnimationFrame(()=>{
    div.querySelectorAll('.edit-staff-btn').forEach(b=>b.addEventListener('click',()=>{ const s=State.data.staff.find(x=>x.id==b.dataset.sid); if(s) openStaffForm(s); }));
    div.querySelectorAll('.toggle-staff-btn').forEach(b=>b.addEventListener('click',async()=>{ const s=State.data.staff.find(x=>x.id==b.dataset.sid); if(!s) return; await saveStaff({...s,active:!s.active},true); await loadStaff(); showToast(`Profile ${s.active!==false?'deactivated':'activated'}.`); renderSection(); }));
    div.querySelectorAll('.del-staff-btn').forEach(b=>b.addEventListener('click',async()=>{ const s=State.data.staff.find(x=>x.id==b.dataset.sid); if(!s) return; openConfirm(`Delete profile for "${s.name}"?`,async()=>{ await deleteStaff(s.id); await loadStaff(); showToast('Profile deleted.','danger'); renderSection(); }); }));
  });
  return div;
}

function openStaffForm(staff){
  let form={ name:staff?.name||'', username:staff?.username||'', password:staff?.password||'', email:staff?.email||'', phone:staff?.phone||'', role:staff?.role||'staff', active:staff?.active!==false, permissions:staff?.permissions||[], avatar:staff?.avatar||null };
  const overlay=el('div',{class:'overlay'});
  const modal=el('div',{class:'modal'});
  const buildContent=()=>`
    <div style="text-align:center;margin-bottom:22px">
      <div class="avatar" id="sf-ava" style="width:72px;height:72px;background:${avatarColor(form.name||'?')};font-size:26px;margin:0 auto;cursor:pointer;border:3px solid var(--border2);box-shadow:var(--shadow)">${form.avatar?`<img src="${form.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:initials(form.name||'?')}</div>
      <div style="font-size:11px;color:var(--text-muted);margin-top:7px">Click to change photo</div>
      <input id="sf-photo-inp" type="file" accept="image/*" style="display:none"/>
    </div>
    <div class="form-row"><div class="form-group"><label class="form-label">Full Name *</label><input id="sf-name" value="${escapeHtml(form.name)}" placeholder="Full name"/></div><div class="form-group"><label class="form-label">Username *</label><input id="sf-user" value="${escapeHtml(form.username)}" placeholder="Login username"/></div></div>
    <div class="form-row"><div class="form-group"><label class="form-label">Password *</label><input id="sf-pass" type="password" value="${escapeHtml(form.password)}" placeholder="Password"/></div><div class="form-group"><label class="form-label">Role *</label><select id="sf-role">${Object.entries(ROLES).filter(([k])=>k!=='superadmin').map(([k,v])=>`<option value="${k}" ${form.role===k?'selected':''}>${v.label}</option>`).join('')}</select></div></div>
    <div class="form-row"><div class="form-group"><label class="form-label">Email</label><input id="sf-email" type="email" value="${escapeHtml(form.email)}" placeholder="Email address"/></div><div class="form-group"><label class="form-label">Phone</label><input id="sf-phone" value="${escapeHtml(form.phone)}" placeholder="+256…"/></div></div>
    <div class="form-group"><label class="form-label">Extra Permissions</label><div class="perm-grid">${ALL_PERMISSIONS.map(p=>`<div class="perm-item ${form.permissions.includes(p)?'active':''}" data-perm="${p}"><div class="perm-check">${form.permissions.includes(p)?'✓':''}</div><span>${PERM_LABELS[p]}</span></div>`).join('')}</div></div>
    <div style="margin-top:14px"><label class="toggle-wrap"><div class="toggle ${form.active?'on':''}" id="sf-active-tog"></div><span style="font-size:13px">Account is Active</span></label></div>`;
  modal.innerHTML=`
    <div class="modal-header"><div style="font-weight:800;font-size:17px">${staff?'Edit Staff Profile':'Create Staff Profile'}</div><button class="btn-icon close-modal" style="font-size:20px">✕</button></div>
    <div class="modal-body" id="sf-content">${buildContent()}</div>
    <div class="modal-footer"><button class="btn-secondary close-modal">Cancel</button><button class="btn-primary" id="sf-save">${staff?'Save Changes':'Create Profile'}</button></div>`;
  overlay.appendChild(modal); document.body.appendChild(overlay);
  const wireStaff=()=>{
    $('sf-ava')?.addEventListener('click',()=>$('sf-photo-inp')?.click());
    $('sf-photo-inp')?.addEventListener('change',e=>{ const f=e.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=ev=>{ form.avatar=ev.target.result; rebuildSF(); }; r.readAsDataURL(f); });
    const sync=()=>{ form.name=$('sf-name')?.value||''; form.username=$('sf-user')?.value||''; form.password=$('sf-pass')?.value||''; form.email=$('sf-email')?.value||''; form.phone=$('sf-phone')?.value||''; form.role=$('sf-role')?.value||form.role; };
    ['sf-name','sf-user','sf-pass','sf-email','sf-phone'].forEach(id=>$(id)?.addEventListener('input',sync));
    $('sf-role')?.addEventListener('change',()=>{ form.role=$('sf-role').value; });
    $('sf-active-tog')?.addEventListener('click',()=>{ form.active=!form.active; $('sf-active-tog').classList.toggle('on',form.active); });
    document.querySelectorAll('.perm-item[data-perm]').forEach(item=>item.addEventListener('click',()=>{ const p=item.dataset.perm; if(form.permissions.includes(p)) form.permissions=form.permissions.filter(x=>x!==p); else form.permissions.push(p); item.classList.toggle('active',form.permissions.includes(p)); item.querySelector('.perm-check').textContent=form.permissions.includes(p)?'✓':''; }));
  };
  const rebuildSF=()=>{ $('sf-content').innerHTML=buildContent(); wireStaff(); };
  wireStaff();
  overlay.querySelectorAll('.close-modal').forEach(b=>b.addEventListener('click',()=>overlay.remove()));
  overlay.addEventListener('click',e=>{ if(e.target===overlay) overlay.remove(); });
  $('sf-save').addEventListener('click',async()=>{
    form.name=($('sf-name')?.value||'').trim(); form.username=($('sf-user')?.value||'').trim(); form.password=$('sf-pass')?.value||''; form.email=$('sf-email')?.value||''; form.phone=$('sf-phone')?.value||''; form.role=$('sf-role')?.value||form.role;
    if(!form.name||!form.username||!form.password){ showToast('Name, username and password are required.','danger'); return; }
    const dup=State.data.staff.find(s=>s.username===form.username&&s.id!==staff?.id);
    if(dup){ showToast('Username already taken.','danger'); return; }
    try { if(staff){ await saveStaff({...form,id:staff.id},true); showToast('Profile updated.'); } else { await saveStaff(form,false); showToast('Profile created.'); } await loadStaff(); overlay.remove(); renderSection(); }
    catch(err){ showToast(err.message,'danger'); }
  });
}

// ─── REPORTS ─────────────────────────────────────────────────
async function renderReports(){
  const members=State.data.members||[];
  const total=members.length, males=members.filter(m=>m.gender==='Male').length, females=members.filter(m=>m.gender==='Female').length;
  const totalFam=members.reduce((s,m)=>s+(m.family||[]).length,0);
  const areaCount={}, maritalCount={}, eduCount={}, monthlyData={};
  members.forEach(m=>{
    if(m.area) areaCount[m.area]=(areaCount[m.area]||0)+1;
    if(m.marital_status) maritalCount[m.marital_status]=(maritalCount[m.marital_status]||0)+1;
    if(m.education) eduCount[m.education]=(eduCount[m.education]||0)+1;
    const d=new Date(m.created_at), key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    monthlyData[key]=(monthlyData[key]||0)+1;
  });
  const months=Object.entries(monthlyData).sort(([a],[b])=>a.localeCompare(b)).slice(-12);
  const maxBar=months.length>0?Math.max(...months.map(m=>m[1])):1;
  const div=el('div');
  div.innerHTML=`
    <div class="page-header"><div style="font-size:22px;font-weight:900">Reports & Analytics</div></div>
    <div class="stat-grid">${[['Total Members',total],['Family Members',totalFam],['Areas / Centres',Object.keys(areaCount).length],['Avg Family Size',total>0?(totalFam/total).toFixed(1):'0']].map(([l,v])=>`<div class="stat-card"><div style="font-size:11px;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">${l}</div><div style="font-size:34px;font-weight:900">${v}</div></div>`).join('')}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px">
      <div class="card"><div style="font-weight:800;font-size:14px;margin-bottom:20px">Monthly Registrations</div>${months.length===0?'<div class="empty-state" style="padding:20px">No data yet</div>':`<div class="bar-chart">${months.map(([key,count])=>{ const pct=Math.round(count/maxBar*100); const label=key.slice(5); return `<div class="bar-col"><div class="bar-val">${count}</div><div class="bar" style="height:${pct}%"></div><div class="bar-label">${label}</div></div>`; }).join('')}</div>`}</div>
      <div class="card"><div style="font-weight:800;font-size:14px;margin-bottom:20px">Gender Distribution</div>${[['Male',males,'var(--info)'],['Female',females,'#8b5cf6']].map(([g,c,col])=>{ const pct=total>0?Math.round(c/total*100):0; return `<div style="margin-bottom:16px"><div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="font-weight:600">${g}</span><span style="font-weight:800;color:${col}">${c} (${pct}%)</span></div><div class="progress"><div class="progress-bar" style="width:${pct}%;background:${col}"></div></div></div>`; }).join('')}</div>
    </div>
    <div class="card"><div style="font-weight:800;font-size:14px;margin-bottom:18px">Members by Area / Centre</div>${Object.entries(areaCount).length===0?'<div class="empty-state" style="padding:20px">No data</div>':Object.entries(areaCount).sort((a,b)=>b[1]-a[1]).map(([area,count],i)=>`<div style="display:flex;align-items:center;gap:14px;padding:10px 0;border-bottom:1px solid var(--border)"><div style="width:24px;height:24px;border-radius:7px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--text-muted);flex-shrink:0">${i+1}</div><div style="flex:1"><div style="font-size:13px;font-weight:600;margin-bottom:5px">${escapeHtml(area)}</div><div class="progress"><div class="progress-bar" style="width:${total>0?Math.round(count/total*100):0}%"></div></div></div><div style="font-size:16px;font-weight:900;color:var(--accent);min-width:30px;text-align:right">${count}</div></div>`).join('')}</div>`;
  return div;
}

// ─── SETTINGS ────────────────────────────────────────────────
let settingsTab='account';
function renderSettings(){
  const div=el('div');
  div.innerHTML=`
    <div class="page-header"><div style="font-size:22px;font-weight:900">Settings</div></div>
    <div class="tab-bar">${[{id:'account',label:'My Account'},{id:'about',label:'About'}].map(t=>`<div class="tab ${settingsTab===t.id?'active':''}" data-stab="${t.id}">${t.label}</div>`).join('')}</div>
    <div id="settings-content"></div>`;
  requestAnimationFrame(()=>{
    div.querySelectorAll('.tab[data-stab]').forEach(t=>t.addEventListener('click',()=>{ settingsTab=t.dataset.stab; renderSettingsTab($('settings-content')); }));
    renderSettingsTab($('settings-content'));
  });
  return div;
}
async function renderSettingsTab(c){
  if(!c) return;
  if(settingsTab==='account'){
    const user=State.user;
    c.innerHTML=`
      <div class="card" style="max-width:520px">
        <div style="font-weight:800;font-size:15px;margin-bottom:18px">Account Information</div>
        <div class="form-group"><label class="form-label">Full Name</label><input id="acc-name" value="${escapeHtml(user.name)}"/></div>
        <div class="form-row"><div class="form-group"><label class="form-label">Email</label><input id="acc-email" type="email" value="${escapeHtml(user.email||'')}"/></div><div class="form-group"><label class="form-label">Phone</label><input id="acc-phone" value="${escapeHtml(user.phone||'')}"/></div></div>
        <div class="divider"></div>
        <div style="font-weight:700;font-size:14px;margin-bottom:16px">Change Password</div>
        <div class="form-row"><div class="form-group"><label class="form-label">New Password</label><input id="acc-new-pass" type="password" placeholder="New password"/></div><div class="form-group"><label class="form-label">Confirm Password</label><input id="acc-con-pass" type="password" placeholder="Confirm password"/></div></div>
        <button class="btn-primary" id="acc-save">Save Changes</button>
      </div>`;
    $('acc-save')?.addEventListener('click',async()=>{
      const name=($('acc-name')?.value||'').trim(), email=$('acc-email')?.value||'', phone=$('acc-phone')?.value||'', newP=$('acc-new-pass')?.value||'', conP=$('acc-con-pass')?.value||'';
      if(!name){ showToast('Name cannot be empty.','danger'); return; }
      if(newP&&newP!==conP){ showToast("Passwords don't match.",'danger'); return; }
      await saveStaff({...user,name,email,phone,...(newP?{password:newP}:{})},true);
      State.user={...State.user,name,email,phone,...(newP?{password:newP}:{})};
      saveSession(); showToast('Account updated.'); render();
    });
  } else {
    c.innerHTML=`
      <div class="card" style="max-width:520px;text-align:center">
        <div style="width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:32px;font-weight:900;color:#fff">B</div>
        <div style="font-size:18px;font-weight:900">${APP.orgFull}</div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:4px">Member Management System v${APP.version}</div>
        <div style="display:flex;align-items:center;justify-content:center;gap:4px;margin-top:12px">${['#000','#fcdc5f','#cc0001'].map(c=>`<div style="width:24px;height:5px;background:${c};border-radius:3px;border:${c==='#000'?'1px solid #444':'none'}"></div>`).join('')}<span style="font-size:11px;color:var(--text-muted);margin-left:8px">Republic of Uganda</span></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:24px">${[['Members',State.data.members.length],['Staff',State.data.staff.length],['Version',APP.version],['Database','PostgreSQL']].map(([k,v])=>`<div class="card-sm"><div style="font-size:11px;color:var(--text-muted)">${k}</div><div style="font-weight:800;font-size:18px;margin-top:4px">${v}</div></div>`).join('')}</div>
      </div>`;
  }
}

// ─── CONFIRM ─────────────────────────────────────────────────
function openConfirm(msg,onConfirm){
  const overlay=el('div',{class:'overlay'});
  const modal=el('div',{class:'modal modal-sm'});
  modal.innerHTML=`
    <div class="modal-header"><div style="font-weight:800;font-size:15px">Confirm Action</div><button class="btn-icon close-confirm" style="font-size:20px">✕</button></div>
    <div class="modal-body"><p style="font-size:14px;line-height:1.7">${escapeHtml(msg)}</p></div>
    <div class="modal-footer"><button class="btn-secondary close-confirm">Cancel</button><button class="btn-danger" id="conf-ok">Confirm</button></div>`;
  overlay.appendChild(modal); document.body.appendChild(overlay);
  overlay.querySelectorAll('.close-confirm').forEach(b=>b.addEventListener('click',()=>overlay.remove()));
  overlay.addEventListener('click',e=>{ if(e.target===overlay) overlay.remove(); });
  $('conf-ok').addEventListener('click',()=>{ overlay.remove(); onConfirm(); });
}

// ─── INIT ─────────────────────────────────────────────────────
document.body.classList.toggle('light',State.theme==='light');
const resumed=loadSession();
if(resumed){
  (async()=>{ await loadMembers(); await loadStaff(); render(); })();
} else {
  render();
}
</script>
